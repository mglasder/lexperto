meta:
  aktenzeichen: FAKE-002-2023
content:
  - name: sachverhalt
    content:
      - number: "A."
        text: "Der Kläger begehrt die Aufhebung eines Verwaltungsakts der Beklagten."
        annotation:
          title: "Antrag"
          description: ["Klageantrag auf Aufhebung"]
        subparagraphs: []
      - number: "B."
        text: "Der Verwaltungsakt betrifft die Ablehnung eines Gewerbegenehmigungsantrags."
        annotation:
          title: "Gegenstand"
          description: ["Gewerbegenehmigung abgelehnt"]
        subparagraphs: []
  - name: erwägungen
    content:
      - number: "1."
        text: "Die Klage ist zulässig."
        annotation:
          title: "Zulässigkeit"
          description: ["Klage ist zulässig"]
        subparagraphs: []
      - number: "2."
        text: "Die Klage ist begründet."
        annotation:
          title: "Begründetheit"
          description: ["Klage ist begründet"]
        subparagraphs: []
      - number: "3."
        text: "Die Kostenentscheidung folgt aus § 154 VwGO."
        annotation:
          title: "Kosten"
          description: ["Kostenentscheidung"]
        subparagraphs: []
  - name: entscheid
    content:
      - number: "1."
        text: "Der Verwaltungsakt wird aufgehoben."
        annotation:
          title: "Aufhebung"
          description: ["Verwaltungsakt aufgehoben"]
        subparagraphs: [] 