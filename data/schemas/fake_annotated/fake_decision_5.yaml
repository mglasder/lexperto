meta:
  aktenzeichen: FAKE-005-2023
content:
  - name: sachverhalt
    content:
      - number: "A."
        text: "Der Kläger begehrt die Aufhebung eines Verwaltungsakts der Beklagten. Der Antrag wurde am 25. Juni 2023 eingereicht. Die Einreichung erfolgte persönlich beim Gericht. Der Empfang wurde durch Unterschrift bestätigt."
        annotation:
          title: "Antrag, Einreichung und Empfang"
          description: ["Klageantrag auf Aufhebung", "Antrag eingereicht", "Persönlich eingereicht", "Unterschrift bestätigt"]
        subparagraphs: []
      - number: "B."
        text: "Der Verwaltungsakt betrifft die Ablehnung eines Gaststättengenehmigungsantrags."
        annotation:
          title: "Gegenstand"
          description: ["Gaststättengenehmigung abgelehnt"]
        subparagraphs:
          - number: "B.a"
            text: "Der Antrag betraf die Eröffnung einer Gaststätte."
            annotation:
              title: "Gaststätte"
              description: ["Eröffnung beantragt"]
            subparagraphs: []
          - number: "B.b"
            text: "Die Ablehnung erfolgte wegen fehlender Unterlagen."
            annotation:
              title: "Ablehnungsgrund"
              description: ["Fehlende Unterlagen"]
            subparagraphs:
              - number: "B.b.1"
                text: "Es fehlte der Nachweis der Zuverlässigkeit."
                annotation:
                  title: "Fehlende Unterlage"
                  description: ["Zuverlässigkeitsnachweis"]
                subparagraphs: []
              - number: "B.b.2"
                text: "Es fehlte der Nachweis der fachlichen Qualifikation."
                annotation:
                  title: "Fehlende Unterlage"
                  description: ["Fachliche Qualifikation"]
                subparagraphs: []
  - name: erwägungen
    content:
      - number: "1."
        text: "Die Klage ist zulässig. Die Klagefrist wurde gewahrt. Die Frist betrug einen Monat."
        annotation:
          title: "Zulässigkeit, Klagefrist und Fristdauer"
          description: ["Klage ist zulässig", "Frist gewahrt", "Ein Monat"]
        subparagraphs: []
      - number: "2."
        text: "Die Klage ist begründet."
        annotation:
          title: "Begründetheit"
          description: ["Klage ist begründet"]
        subparagraphs: []
  - name: entscheid
    content:
      - number: "1."
        text: "Der Verwaltungsakt wird aufgehoben."
        annotation:
          title: "Aufhebung"
          description: ["Verwaltungsakt aufgehoben"]
        subparagraphs: []
