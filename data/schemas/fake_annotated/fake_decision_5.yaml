meta:
  aktenzeichen: FAKE-005-2023
content:
  - name: sachverhalt
    content:
      - number: "A."
        text: "Der Kläger begehrt die Aufhebung eines Verwaltungsakts der Beklagten."
        annotation:
          title: "Antrag"
          description: ["Klageantrag auf Aufhebung"]
        subparagraphs:
          - number: "A.a"
            text: "Der Antrag wurde am 25. Juni 2023 eingereicht."
            annotation:
              title: "Einreichung"
              description: ["Antrag eingereicht"]
            subparagraphs:
              - number: "A.a.1"
                text: "Die Einreichung erfolgte persönlich beim Gericht."
                annotation:
                  title: "Einreichungsart"
                  description: ["Persönlich eingereicht"]
                subparagraphs:
                  - number: "A.a.1.1"
                    text: "Der Empfang wurde durch Unterschrift bestätigt."
                    annotation:
                      title: "Empfangsbestätigung"
                      description: ["Unterschrift bestätigt"]
                    subparagraphs: []
      - number: "B."
        text: "Der Verwaltungsakt betrifft die Ablehnung eines Gaststättengenehmigungsantrags."
        annotation:
          title: "Gegenstand"
          description: ["Gaststättengenehmigung abgelehnt"]
        subparagraphs:
          - number: "B.a"
            text: "Der Antrag betraf die Eröffnung einer Gaststätte."
            annotation:
              title: "Gaststätte"
              description: ["Eröffnung beantragt"]
            subparagraphs: []
          - number: "B.b"
            text: "Die Ablehnung erfolgte wegen fehlender Unterlagen."
            annotation:
              title: "Ablehnungsgrund"
              description: ["Fehlende Unterlagen"]
            subparagraphs:
              - number: "B.b.1"
                text: "Es fehlte der Nachweis der Zuverlässigkeit."
                annotation:
                  title: "Fehlende Unterlage"
                  description: ["Zuverlässigkeitsnachweis"]
                subparagraphs: []
  - name: erwägungen
    content:
      - number: "1."
        text: "Die Klage ist zulässig."
        annotation:
          title: "Zulässigkeit"
          description: ["Klage ist zulässig"]
        subparagraphs:
          - number: "1.a"
            text: "Die Klagefrist wurde gewahrt."
            annotation:
              title: "Klagefrist"
              description: ["Frist gewahrt"]
            subparagraphs:
              - number: "1.a.1"
                text: "Die Frist betrug einen Monat."
                annotation:
                  title: "Fristdauer"
                  description: ["Ein Monat"]
                subparagraphs: []
      - number: "2."
        text: "Die Klage ist begründet."
        annotation:
          title: "Begründetheit"
          description: ["Klage ist begründet"]
        subparagraphs: []
  - name: entscheid
    content:
      - number: "1."
        text: "Der Verwaltungsakt wird aufgehoben."
        annotation:
          title: "Aufhebung"
          description: ["Verwaltungsakt aufgehoben"]
        subparagraphs: []
