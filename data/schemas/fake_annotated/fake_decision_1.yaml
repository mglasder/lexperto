meta:
  aktenzeichen: FAKE-001-2023
content:
  - name: sachverhalt
    content:
      - number: "A."
        text: "Der Kläger begehrt die Aufhebung eines Verwaltungsakts der Beklagten."
        annotation:
          title: "Antrag"
          description: ["Klageantrag auf Aufhebung"]
        subparagraphs: []
      - number: "B."
        text: "Der Verwaltungsakt betrifft die Ablehnung eines Baugenehmigungsantrags."
        annotation:
          title: "Gegenstand"
          description: ["Baugenehmigung abgelehnt"]
        subparagraphs:
          - number: "B.a"
            text: "Der Antrag wurde am 15. März 2023 eingereicht."
            annotation:
              title: "Einreichung"
              description: ["Antrag eingereicht"]
            subparagraphs: []
  - name: erwägungen
    content:
      - number: "1."
        text: "Die Klage ist zulässig."
        annotation:
          title: "Zulässigkeit"
          description: ["Klage ist zulässig"]
        subparagraphs: []
      - number: "2."
        text: "Die Klage ist begründet."
        annotation:
          title: "Begründetheit"
          description: ["Klage ist begründet"]
        subparagraphs: []
  - name: entscheid
    content:
      - number: "1."
        text: "Der Verwaltungsakt wird aufgehoben."
        annotation:
          title: "Aufhebung"
          description: ["Verwaltungsakt aufgehoben"]
        subparagraphs: [] 