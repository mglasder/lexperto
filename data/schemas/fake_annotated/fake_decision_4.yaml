meta:
  aktenzeichen: FAKE-004-2023
content:
  - name: sachverhalt
    content:
      - number: "A."
        text: "Der Kläger begehrt die Aufhebung eines Verwaltungsakts der Beklagten. Der Antrag wurde am 10. Mai 2023 eingereicht. Die Einreichung erfolgte per Einschreiben."
        annotation:
          title: "Antrag und Einreichung"
          description: ["Klageantrag auf Aufhebung", "Antrag eingereicht", "Per Einschreiben"]
        subparagraphs: []
      - number: "B."
        text: "Der Verwaltungsakt betrifft die Ablehnung eines Baugenehmigungsantrags."
        annotation:
          title: "Gegenstand"
          description: ["Baugenehmigung abgelehnt"]
        subparagraphs:
          - number: "B.a"
            text: "Der Antrag betraf den Bau eines Einfamilienhauses."
            annotation:
              title: "Bauvorhaben"
              description: ["Einfamilienhaus"]
            subparagraphs: []
          - number: "B.b"
            text: "Die Ablehnung erfolgte wegen fehlender Unterlagen."
            annotation:
              title: "Ablehnungsgrund"
              description: ["Fehlende Unterlagen"]
            subparagraphs:
              - number: "B.b.1"
                text: "Es fehlte der Nachweis der Grundstückseigentümerschaft."
                annotation:
                  title: "Fehlende Unterlage"
                  description: ["Grundstückseigentümerschaft"]
                subparagraphs: []
              - number: "B.b.2"
                text: "Es fehlte der Nachweis der finanziellen Leistungsfähigkeit."
                annotation:
                  title: "Fehlende Unterlage"
                  description: ["Finanzielle Leistungsfähigkeit"]
                subparagraphs: []
  - name: erwägungen
    content:
      - number: "1."
        text: "Die Klage ist zulässig. Die Klagefrist wurde gewahrt."
        annotation:
          title: "Zulässigkeit und Klagefrist"
          description: ["Klage ist zulässig", "Frist gewahrt"]
        subparagraphs: []
      - number: "2."
        text: "Die Klage ist begründet."
        annotation:
          title: "Begründetheit"
          description: ["Klage ist begründet"]
        subparagraphs: []
  - name: entscheid
    content:
      - number: "1."
        text: "Der Verwaltungsakt wird aufgehoben."
        annotation:
          title: "Aufhebung"
          description: ["Verwaltungsakt aufgehoben"]
        subparagraphs: []
