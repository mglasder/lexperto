content:
- name: entscheid
  content:
  - number: '1.'
    text: Die Beschwerde wird teilweise gutgeheissen.
  - number: '2.'
    text: "Ziffer 2 des Dispositivs der Schlussverfügung vom 1. Oktober 2021 der Vorinstanz\
      \ wird im Sinne von E. 4.3.1 und E. 7.1 teilweise aufgehoben. Die Vorinstanz\
      \ wird angewiesen, die Änderungen in Ziffer 2 des Dispositivs gemäss E. 4.3.1\
      \ vorzunehmen. Im \0brigen wird die Beschwerde abgewiesen."
  - number: '3.'
    text: "Der Beschwerdef\0hrerin werden Verfahrenskosten von total Fr. 4\x01999.--\
      \ auferlegt. Der von ihr geleistete Kostenvorschuss in der H\0he von Fr. 5'000.--\
      \ wird zur Begleichung der Verfahrenskosten verwendet. Der Restbetrag von Fr.\
      \ 1'000.-- wird der Beschwerdef\0hrerin nach Eintritt der Rechtskraft dieses\
      \ Urteils zur\0ckerstattet."
  - number: '4.'
    text: "Die Vorinstanz wird verpflichtet, der Beschwerdef\0hrerin eine reduzierte\
      \ Parteientsch\0dcdigung von total Fr. 1'500.-- zu bezahlen."
  - number: '5.'
    text: "Dieses Urteil geht an die Beschwerdef\0hrerin und die Vorinstanz. F\0r\
      \ die Rechtsmittelbelehrung wird auf die n\0chste Seite verwiesen. Die vorsitzende\
      \ Richterin: Die Gerichtsschreiberin: Iris Widmer Ana Pajovic"
- name: erwägungen
  content:
  - number: '1.'
    text: ''
  - number: '1.1'
    text: Das Bundesverwaltungsgericht ist zur Beurteilung von Beschwerden gegen Schlussverfügungen
      der ESTV betreffend die internationale Amtshilfe in Steuersachen zuständig (vgl.
      Art. 19 Abs. 5 des Bundesgesetzes vom 28. September 2012 über die internationale
      Amtshilfe in Steuersachen [Steueramtshilfegesetz, StAhiG, SR 651.1] i.V.m. Art.
      31 ff. des Bundesgesetzes vom 17. Juni 2005 über das Bundesverwaltungsgericht
      [Verwaltungsgerichtsgesetz, VGG, SR 173.32]). Das Verfahren vor dem Bundesverwaltungsgericht
      richtet sich nach dem Bundesgesetz vom 20. Dezember 1968 über das Verwaltungsverfahren
      (Verwaltungsverfahrensgesetz, VwVG, SR 172.021), soweit das VGG nichts anderes
      bestimmt (Art. 37 VGG).
  - number: '1.2'
    text: Die Beschwerdeführerin hat am vorinstanzlichen Verfahren teilgenommen und
      ist als Adressatin der angefochtenen Schlussverfügung und als Person, die vom
      Amtshilfeersuchen betroffen ist, zur Beschwerdeführung legitimiert (vgl. Art.
      48 Abs. 1 VwVG und Art. 19 Abs. 2 StAhiG). Auf die form- und fristgerecht (vgl.
      Art. 50 Abs. 1 und Art. 52 Abs. 1 VwVG i.V.m. Art. 19 Abs. 5 StAhiG) eingereichte
      Beschwerde ist einzutreten.
  - number: '1.3'
    text: Landesrechtlich ist die internationale Amtshilfe in Steuersachen im Steueramtshilfegesetz
      geregelt, welches am 1. Februar 2013 in Kraft getreten ist. Abweichende Bestimmungen
      des im Einzelfall anwendbaren Abkommens bleiben vorbehalten (vgl. Art. 1 Abs.
      1 und 2 sowie Art. 24 StAhiG e contrario).
  - number: '1.4'
    text: Das Bundesverwaltungsgericht kann die angefochtene Schlussverfügung in vollem
      Umfang überprüfen. Die Beschwerdeführerin kann neben der Verletzung von Bundesrecht
      und der unrichtigen oder unvollständigen Seite 8 Feststellung des rechtserheblichen
      Sachverhalts auch die Unangemessenheit rügen (Art. 49 Bst. a bis c VwVG).
  - number: '1.5'
    text: 'Das Bundesverwaltungsgericht wendet im Beschwerdeverfahren das Bundesrecht
      von Amtes wegen an. Es ist gemäss Art. 62 Abs. 4 VwVG nicht an die Begründung
      der Begehren gebunden und kann die Beschwerde auch aus anderen als den geltend
      gemachten Gründen gutheissen (vgl. statt vieler: Urteil des BVGer A-4680/2021
      vom 19. August 2022 E. 2.2).'
  - number: '2.'
    text: ''
  - number: '2.1'
    text: 'Das vorliegende Amtshilfeersuchen betrifft die Steuerjahre 2011 bis 2018
      und stützt sich auf Art. 28 DBA CH-FR (in der hier anwendbaren Fassung gemäss
      Art. 7 des Zusatzabkommens vom 27. August 2009 [AS 2010 5683; nachfolgend: Zusatzabkommen
      2009]; Art. 11 Abs. 3 des Zusatzabkommens 2009) und auf Ziff. XI des im DBA
      CH-FR integrierten Zusatzprotokolls in der Fassung gemäss Art. 1 der Vereinbarung
      vom 25. Juni 2014 über die Änderung des Zusatzprotokolls zum revidierten Abkommen
      zwischen der Schweiz und Frankreich vom 9. September 1966 zur Vermeidung der
      Doppelbesteuerung auf dem Gebiet der Steuern vom Einkommen und vom Vermögen
      und zur Vermeidung von Steuerbetrug und Steuerflucht (AS 2016 1195, nachfolgend:
      Vereinbarung 2014). In den Übergangsbestimmungen sieht die Vereinbarung 2014
      ihre Anwendung auf Informationsbegehren betreffend Kalender- oder Geschäftsjahre,
      die ab dem 1. Januar 2010 beginnen, vor (Art. 2 der Vereinbarung 2014). Im Sinne
      einer Ausnahme findet Art. 1 Abs. 1 der Vereinbarung 2014 Anwendung auf Informationsbegehren
      über Sachverhalte, welche Zeiträume ab dem 1. Februar 2013 betreffen (Art. 2
      Abs. 3 der Vereinbarung 2014). Gemäss dem Bundesgericht beschränkt Art. 2 Abs.
      3 der Vereinbarung 2014 jedoch die Anwendung von Ziff. XI Abs. 3 Bst. a des
      Zusatzprotokolls ausschliesslich für – vorliegend nicht einschlägige – Gruppenersuchen
      auf Informationen betreffend Zeiträume ab dem 1. Februar 2013 (BGE 146 II 150
      E. 5.5.2 ff.).'
  - number: '2.2'
    text: ''
  - number: 2.2.1
    text: 'Gemäss Ziff. XI Abs. 3 des Zusatzprotokolls zum DBA CH-FR muss das Amtshilfeersuchen
      folgende Informationen enthalten: die Identität der in eine Prüfung oder Untersuchung
      einbezogenen Person, wobei diese Information mittels Angabe des Namens der betreffenden
      Person oder weiterer Informationen, welche ihre Identifikation ermöglichen,
      geliefert werden kann (Bst. a); die Zeitperiode, für welche die Informationen
      verlangt werden (Bst. b); die Beschreibung der verlangten Informationen sowie
      Angaben hinsichtlich der Form, in der der ersuchende Staat diese Informationen
      vom ersuchten Staat zu erhalten wünscht (Bst. c); den Steuerzweck, für den die
      Informationen verlangt werden (Bst. d) und soweit bekannt, den Namen und die
      Adresse des mutmasslichen Inhabers der verlangten Informationen (Bst. e). Diese
      Anforderungen gehen den ähnlichen Bestimmungen in Art. 6 Abs. 2 StAhiG vor (so
      auch Art. 1 Abs. 2 StAhiG; statt vieler: Urteil des BVGer A-3584/2021 vom 27.
      Juli 2023 E. 2.3).'
  - number: 2.2.2
    text: Enthält ein Amtshilfeersuchen alle Informationen, die gemäss dem anwendbaren
      Übereinkommen erforderlich sind, kann das Vorliegen einer sog. «fishing expedition»
      (vgl. hierzu E. 2.4.2) grundsätzlich verneint werden (vgl. Urteil des BGer 2C_953/2020
      vom 24. November 2021 E. 3.3; Urteil des BVGer A-5281/2021 vom 2. Mai 2022 E.
      6.1).
  - number: 2.2.3
    text: Die Auslegung von Amtshilfeversuchen muss im Lichte des von der ersuchenden
      Behörde verfolgten Zwecks und in einer Weise erfolgen, die den wirksamen Informationsaustausch
      zwischen den Vertragsparteien nicht behindert (vgl. Ziff. XI Abs. 4 des Zusatzprotokolls).
      Dies gebietet ebenso der völkergewohnheitsrechtliche Grundsatz, wonach Vertragsstaaten
      völkerrechtliche Verträge nach Treu und Glauben zu erfüllen haben (pacta sunt
      servanda, kodifiziert in Art. 26 des Wiener Übereinkommens vom 23. Mai 1969
      über das Recht der Verträge [VRK, SR 0.111]; vgl. BGE 147 II 116 E. 5.2; Urteil
      des BGer 2C_287/2019, 2C_288/2019 vom 13. Juli 2020 E. 3). Soweit vorliegend
      relevant, stellen die Grundsätze des Wiener Übereinkommens kodifiziertes Völkergewohnheitsrecht
      dar; sie sind von den schweizerischen Behörden zu beachten, obschon Frankreich
      nicht Vertragsstaat des Wiener Übereinkommens ist (vgl. BGE 146 II 150 E. 5.3.1
      m.w.H.).
  - number: '2.3'
    text: ''
  - number: 2.3.1
    text: Nach Ziff. XI Abs. 1 des Zusatzprotokolls zum DBA CH-FR stellt die zuständige
      Behörde des ersuchenden Staates ein Begehren erst dann, wenn alle in ihrem innerstaatlichen
      Steuerverfahren vorgesehenen üblichen Mittel zur Beschaffung der Information
      ausgeschöpft sind (sog. Subsidiaritätsprinzip, vgl. Art. 6 Abs. 2 Bst. g StAhiG).
  - number: 2.3.2
    text: Zur Einhaltung des Subsidiaritätsprinzips muss der ersuchende Staat nicht
      sämtliche innerstaatlichen Auskunftsmittel ausschöpfen, sondern lediglich diejenigen,
      die für ihn nicht mit unverhältnismässigen Schwierigkeiten verbunden sind (vgl.
      Urteile des BGer 2C_493/2019 vom 17. August 2020 E. 5.5; 2C_780/2018 vom 1.
      Februar 2021 E. 4.4). Es genügt, wenn der ersuchende Staat anhand innerstaatlich
      vorgesehener Mittel das Ermittlungsobjekt hinreichend präzisiert hat, so dass
      die Leistung von Amtshilfe ermöglicht wird (Urteil des BVGer A-4991/2016 vom
      29. November 2016 E. 5.2 und E. 11).
  - number: '2.4'
    text: ''
  - number: 2.4.1
    text: Gemäss Art. 28 Abs. 1 Satz 1 DBA CH-FR tauschen die zuständigen Behörden
      der beiden Vertragsstaaten unter sich diejenigen Informationen aus, die zur
      Durchführung des Abkommens oder zur Anwendung oder Durchsetzung des innerstaatlichen
      Rechts betreffend Steuern jeder Art und Bezeichnung, die für Rechnung der Vertragsstaaten
      oder ihrer politischen Unterabteilungen oder lokalen Körperschaften erhoben
      werden, voraussichtlich erheblich sind (vgl. dazu E. 2.8), soweit die diesem
      Recht entsprechende Besteuerung nicht dem Abkommen widerspricht. Der Informationsaustausch
      in Anwendung von Art. 28 DBA CH-FR ist nicht durch Art. 1 DBA CH-FR (persönlicher
      Geltungsbereich) und Art. 2 DBA CH-FR (sachlicher Geltungsbereich bzw. unter
      das Abkommen fallende Steuern) eingeschränkt (Art. 28 Abs. 1 Satz 2 DBA CH-FR).
  - number: 2.4.2
    text: Gemäss Ziff. XI Abs. 2 des Zusatzprotokolls zum DBA CH-FR besteht der Zweck
      der Verweisung auf «voraussichtlich erhebliche» Informationen in Art. 28 Abs.
      1 DBA CH-FR darin, einen möglichst breiten Informationsaustausch in Steuersachen
      zu gewährleisten, ohne dass die Vertragsstaaten «fishing expeditions» (unzulässige
      Beweisausforschung) durchführen oder Informationen verlangen können, deren Erheblichkeit
      für die Aufklärung der Steuerangelegenheiten bestimmter Steuerpflichtiger wenig
      wahrscheinlich ist (vgl. Urteil des BVGer A-4685/2021 vom 19. August 2022 E.
      3.6). Insofern bildet das Verbot der Beweisausforschung Ausdruck des Verhältnismässigkeitsgrundsatzes
      (vgl. Urteil des BVGer A-4163/2019 vom 22. April 2020 E. 3.1.2).
  - number: 2.4.3
    text: Wurde ein Gesuch zum Zweck der Beweisausforschung gestellt, wird gemäss
      innerstaatlichem Recht darauf nicht eingetreten (Art. 7 Bst. a StAhiG).
  - number: 2.4.4
    text: Als nach Art. 28 Abs. 1 DBA CH-FR zur Anwendung oder Durchsetzung des innerstaatlichen
      Rechts «voraussichtlich erheblich» gelten Informationen, die für den ersuchenden
      Staat notwendig sind, um eine in diesem Staat steuerpflichtige Person dort korrekt
      zu besteuern (BGE 143 II 185 E. 3.3.1; 141 II 436 E. 4.4.3; Urteil des BVGer
      A-4592/2018 vom 21. März 2019 E. 3.1.2). Um die Durchsetzung des Steuerrechts
      des ersuchenden Staats zu ermöglichen, können gemäss bundesgerichtlicher Rechtsprechung
      grundsätzlich sämtliche Informationen relevant sein, die ein Vertragsstaat für
      die Steuerveranlagung seiner Steuerpflichtigen benötigt (vgl. BGE 143 II 185
      E. 3.3.3). Gemäss bundesgerichtlicher Rechtsprechung kommt in Konstellationen,
      in welchen ein ausländischer Staat um Amtshilfe bezüglich einer natürlichen
      Person ersucht, die Begünstigte («Beneficiary») eines Trusts ist, für den eine
      Gesellschaft («underlying company») bei einer schweizerischen Bank ein Konto
      hält, grundsätzlich sämtlichen Bankdokumenten (insbesondere den Portfolio- und
      Kontoauszügen sowie den «Client Profiles») voraussichtliche Erheblichkeit zu
      (Urteil des BGer 2C_918/2020 vom 28. Dezember 2021 E. 4 ff.). So lassen namentlich
      Informationen in den «Client profiles» einer Bank Rückschlüsse auf die Verhältnisse
      und Beziehungen zwischen den wirtschaftlich berechtigten Personen und den formellen
      Kontoinhabern zu (vgl. Urteil des BGer 2C_703/2020 vom 15. März 2021 E. 7.4.3).
      Grundsätzlich voraussichtliche Erheblichkeit kommt sodann auch den sog. «Know
      Your Customer»-Dokumenten zu, da diese die Verhältnisse zwischen einer Bank
      und ihrem Kunden während der Dauer des Vermögensverwaltungsmandats festhalten
      (vgl. Urteil des BGer 2C_703/2020 vom 15. März 2021 E. 7.4.2; Urteile des BVGer
      3584/2021 vom 27. Juli 2023 E. 2.8; A-2177/2021 vom 22. September 2021 E. 4.3.3.3
      m.w.H.).
  - number: 2.4.5
    text: 'Die Voraussetzung der voraussichtlichen Erheblichkeit ist erfüllt, wenn
      im Zeitpunkt der Einreichung des Amtshilfeersuchens eine vernünftige Möglichkeit
      besteht, dass sich die verlangten Informationen als erheblich erweisen werden
      (BGE 143 II 185 E. 3.3.2). Keine Rolle spielt demgegenüber, ob sich diese Informationen
      nach deren Übermittlung für die ersuchende Behörde als nicht erheblich herausstellen
      (vgl. BGE 144 II 206 E. 4.3; 142 II 161 E. 2.1.1; zum Ganzen: Urteil des BVGer
      A-4603/2019 vom 17. August 2020 E. 2.3.3 m.w.H.).'
  - number: 2.4.6
    text: Ersuchte Informationen sind auch dann zu übermitteln, wenn sie zwecks Überprüfung
      schon vorhandener, aber nicht völlig zweifelsfreier Erkenntnisse der Behörden
      des ersuchenden Staates verlangt werden, solange sie die Voraussetzungen der
      voraussichtlichen Erheblichkeit erfüllen (sog. Verifikationszweck, vgl. Urteile
      des BVGer A-765/2019 vom 20. September 2019 E. 3.3.2.3; A-4144/2018 vom 28.
      Mai 2019 E. 3.1.2). Das Erfordernis der voraussichtlichen Erheblichkeit bedingt
      dabei nicht zwingend einen Informationsmehrwert im Vergleich zu den übrigen
      zu übermittelnden Informationen, sondern einen Zusammenhang zum im Amtshilfeersuchen
      dargestellten Sachverhalt. Die ersuchende Behörde ist daher auch nicht verpflichtet,
      im Ersuchen einen zusätzlichen Informationswert aufzuzeigen (Urteil des BGer
      2C_282/2021 vom 15. Juni 2022 E. 4.4.3).
  - number: 2.4.7
    text: 'Die voraussichtliche Erheblichkeit von Informationen muss sich bereits
      aus dem Amtshilfeersuchen ergeben. Nach der Edition der verlangten Unterlagen
      hat die ersuchte Behörde zu prüfen, ob die betreffenden Informationen für die
      Erhebung der Steuer voraussichtlich erheblich sind. Dem «voraussichtlich» kommt
      somit eine doppelte Bedeutung zu: der ersuchende Staat muss die Erheblichkeit
      voraussehen und im Amtshilfeersuchen geltend machen und der ersuchte Staat muss
      nur solche Informationen übermitteln, die voraussichtlich erheblich sind (vgl.
      BGE 143 II 185 E. 3.3.2; Urteil des BVGer A-272/2017 vom 5. Dezember 2017 E.
      2.2.2).'
  - number: 2.4.8
    text: 'Ob eine Information tatsächlich erheblich ist, hängt im Wesentlichen vom
      (Verfahrens-)Recht des ersuchenden Staates ab. Nach ständiger bundesgerichtlicher
      Rechtsprechung bedeutet dies freilich nicht, dass sich der ersuchte Staat im
      Rahmen des Amtshilfeverfahrens zum internen (Verfahrens-)Recht des ersuchenden
      Staates zu äussern hätte. Entsprechend kann in der Regel nur der ersuchende
      Staat abschliessend feststellen, ob eine Information tatsächlich erheblich ist
      (vgl. BGE 143 II 185 E. 3.3.2; 142 II 161 E. 2.1.1; Urteil des BGer 2C_918/2020
      vom 28. Dezember 2021 E. 4.3; statt vieler: Urteil des BVGer A-3584/2021 vom
      27. Juli 2023 E. 2.7.6). Die Rolle des ersuchten Staates beschränkt sich bei
      der Beurteilung der voraussichtlichen Erheblichkeit daher auf eine Prüfung der
      Plausibilität des Ersuchens (vgl. BGE 144 II 29 E. 4.2.2; 142 II 161 E. 2.1.1;
      Urteil des BGer 2C_282/2021 vom 15. Juni 2022 E. 4.2.2; Urteile des BVGer A-4144/2018
      vom 28. Mai 2019 E. 2.1.6; A-846/2018 vom 30. August 2018 E. 2.1.4 m.w.H.).
      Dabei hat die ersuchte Behörde nicht zu entscheiden, ob der im Ersuchen dargestellte
      Sachverhalt gänzlich der Realität entspricht, sondern sie muss nur überprüfen,
      ob die ersuchten Informationen einen Bezug zu diesem Sachverhalt haben und ob
      sie möglicherweise dazu geeignet sind, im ausländischen Verfahren verwendet
      zu werden (vgl. BGE 144 II 206 E. 4.3; 142 II 161 E. 2.1.1; Urteile des BGer
      2C_282/2021 vom 15. Juni 2022 E. 4.2.2; 2C_703/2020 vom 15. März 2021 E. 4.2.2;
      Urteile des BVGer A-4144/2018 vom 28. Mai 2019 E. 2.1.6; A-846/2018 vom 30.
      August 2018 E. 2.1.4 m.w.H.). Soweit das nationale Verfahrensrecht des ersuchenden
      Staates einer Verwertung der im Amtshilfeverfahren ersuchten Informationen entgegensteht,
      hat die betroffene Person dies im Prinzip vor den Behörden des ersuchenden Staates
      geltend zu machen (BGE 144 II 206 E. 4.6; 142 II 161 E. 2.2; Urteil des BGer
      2C_918/2020 vom 28. Dezember 2021 E. 4.3 m.w.H; Urteil des BVGer A-232/2022
      vom 16. Februar 2023 E. 2.3.4.2 m.w.H.). So ist insbesondere die Frage der Qualifikation
      von Truststrukturen, respektive wie und bei wem Mittelzuflüsse und Mittelabflüsse
      eines von einem Trust (indirekt) gehaltenen Bankkontos steuerrechtlich zu erfassen
      sind, im Steuerverfahren des ersuchenden Staates und nach dessen Recht zu beurteilen
      (vgl. Urteil des BGer 2C_918/2020 vom 28. Dezember 2021 E. 4.5.2 f.). Äussert
      sich die ersuchte Behörde zur rechtlichen Qualifikation der Struktur des vom
      Amtshilfeersuchen betroffenen Trusts, greift sie dem Steuerverfahren im ersuchenden
      Staat vor, was mit dem Zweck des Amtshilfeverfahrens nicht zu vereinbaren ist
      (vgl. Urteile des BGer 2C_918/2020 vom 28. Dezember 2021 E. 4.5.3; 2C_823/2020
      vom 13. Oktober 2020 E. 4.2).'
  - number: 2.4.9
    text: Der ersuchte Staat darf somit Auskünfte – mit der Begründung, dass die verlangten
      Informationen nicht «voraussichtlich erheblich» im Sinne der Amtshilfeklausel
      seien – nur verweigern, wenn ein Zusammenhang zwischen den verlangten Angaben
      und der im ersuchenden Staat durchgeführten Untersuchung unwahrscheinlich bzw.
      wenig wahrscheinlich erscheint (BGE 143 II 185 E. 3.2.2; 142 II 161 E. 2.1.1;
      Urteil des BVGer A-4588/2018 vom 22. Juli 2019 E. 3.4.3 m.w.H.). Der Begriff
      der voraussichtlichen Erheblichkeit bildet daher eine nicht besonders hohe Hürde
      für ein Amtshilfeersuchen (BGE 143 II 185 E. 3.3.2; 142 II 161 E. 2.1.1; Urteil
      des BVGer A-6037/2017 vom 8. Januar 2019 E. 2.4.3).
  - number: '2.5'
    text: ''
  - number: 2.5.1
    text: Ein wichtiges Element der internationalen Behördenzusammenarbeit bildet
      das völkerrechtliche Vertrauensprinzip. Diesem Grundsatz nach besteht – ausser
      bei offensichtlichem Rechtsmissbrauch oder bei berechtigten Fragen im Zusammenhang
      mit dem Schutz des schweizerischen oder Seite 14 internationalen Ordre public
      (vgl. Art. 7 StAhiG) – prinzipiell kein Anlass, an Sachverhaltsdarstellungen
      und Erklärungen anderer Staaten zu zweifeln (vgl. BGE 146 II 150 E. 7.1; 142
      II 218 E. 3.1; Urteile des BVGer A-765/2019 vom 20. September 2020 E. 2.2; A-381/2018
      vom 21. November 2018 E. 4.2.).
  - number: 2.5.2
    text: Aufgrund des völkerrechtlichen Vertrauensprinzips ist die ersuchte Behörde
      an die Darstellung des Sachverhalts im Amtshilfeersuchen gebunden, sofern diese
      nicht wegen offensichtlicher Fehler, Lücken oder Widersprüche sofort entkräftet
      werden kann (BGE 142 II 218 E. 3.1; 139 II 451 E. 2.2.1; Urteile des BVGer A-2259/2021
      vom 18. Februar 2022 E. 2.2; A-3773/2018 vom 8. Februar 2019 E. 2.6). Gleiches
      gilt für die vom ersuchenden Staat abgegebenen Erklärungen. Werden diese sofort
      entkräftet, kann der ersuchte Staat ihnen nicht mehr vertrauen (vgl. Urteile
      des BVGer A-2259/2021 vom 18. Februar 2022 E. 2.2; A-7622/2016 vom 23. Mai 2017
      E. 2.3). Das Vertrauensprinzip schliesst indessen nicht aus, dass der ersuchte
      Staat vom ersuchenden Staat zusätzliche Erklärungen verlangt, wenn ernsthafte
      Zweifel an der Einhaltung der völkerrechtlichen Grundsätze bestehen (BGE 146
      II 150 E. 7.1; 144 II 206 E. 4.4).
  - number: 2.5.3
    text: Bestreitet die betroffene Person den von der ersuchenden Behörde geschilderten
      Sachverhalt, so hat sie diesen mittels Urkunden klarerweise und entscheidend
      zu widerlegen (vgl. BGE 139 II 451 E. 2.3.3; Urteile des BVGer A-769/2017, A-776/2017,
      A-777/2017 vom 23. April 2019 E. 2.4.2; A-381/2018 vom 21. November 2018 E.
      4.2).
  - number: 2.5.4
    text: Soweit die Behörden des ersuchenden Staates verpflichtet sind, im Ersuchen
      den massgeblichen Sachverhalt darzulegen, kann von ihnen nicht erwartet werden,
      dass sie dies bereits lückenlos und völlig widerspruchsfrei tun. Dies wäre mit
      dem Sinn und Zweck der Amtshilfe (wie mit jenem der Rechtshilfe) nicht vereinbar,
      sollen doch aufgrund von Informationen und Unterlagen, die sich im ersuchten
      Staat befinden, bisher im Dunkeln gebliebene Punkte erst noch geklärt werden
      (vgl. BGE 142 II 161 E. 2.1.1; BVGE 2011/14 E. 2; Urteil des BVGer A-765/2019
      vom 20. September 2020 E. 2.1.6). Aus diesem Grund verlangt die Rechtsprechung
      von der ersuchenden Behörde nicht den strikten Beweis des Sachverhalts, sondern
      diese muss nur – aber immerhin – hinreichende Verdachtsmomente für dessen Vorliegen
      dartun (BGE 139 II 451 E. 2.1 und E. 2.2.1; 139 II 404 E. 7.2.2; Urteil des
      BVGer A-765/2019 vom 20. September 2020 E. 2.1.6).
  - number: 2.5.5
    text: In Konstellationen, in welchen die ersuchende Behörde im Amtshilfeersuchen
      keine Erklärung abgibt betreffend die Herkunft der Informationen, auf welche
      sich das Amtshilfeersuchen stützt; respektive, in welchen die betroffene Person
      nicht weiss, woher die ersuchende Behörde Kenntnis von einschlägigen Informationen
      erlangt hat, greift das Vertrauensprinzip ebenfalls und die legale Herkunft
      dieser Informationen ist grundsätzlich zu vermuten (vgl. Urteile des BGer 2C_773/2022
      vom 30. September 2022 E. 1.3.3; 2C_983/2015 vom 16. Februar 2017 E. 8.7.4;
      Urteil des BVGer A-4680/2021 vom 19. August 2022 E. 4.2.3). In diesem Zusammenhang
      hat das Bundesgericht klargestellt, dass es zur Widerlegung der vermuteten legalen
      Herkunft dieser Informationen nicht ausreicht, dass die vom Amtshilfeersuchen
      betroffene Person lediglich Hinweise (beispielsweise in Form von Dokumenten
      oder Medienberichten) vorbringt, gemäss welchen das Amtshilfeersuchen auf Handlungen
      beruhen würde, die nach schweizerischem Recht strafbar seien (Urteil des BGer
      2C_983/2015 vom 16. Februar 2017 E. 8.7.4). Solche Hinweise bzw. Indizien können
      gegebenenfalls ernsthafte Zweifel an der Einhaltung völkerrechtlicher Grundsätze
      durch den ersuchenden Staat begründen und eine Klärungsanfrage rechtfertigen,
      nicht jedoch die Verweigerung der Amtshilfe. Letztere setzt eine Widerlegung
      der Vermutung der Einhaltung der völkerrechtlichen Grundsätze bzw. des guten
      Glaubens des ersuchenden Staates voraus, welche wiederum auf nachgewiesenen
      und konkreten Elementen beruhen muss (vgl. E. 2.5.2 und E. 2.5.3 hiervor).
  - number: '2.6'
    text: ''
  - number: 2.6.1
    text: Informationen können im abkommensrechtlichen Sinne nur dann als voraussichtlich
      erheblich qualifiziert werden (vgl. E. 2.4), wenn sie (unter anderem oder ausschliesslich)
      Personen betreffen, deren unbeschränkte oder beschränkte Steuerpflicht im ersuchenden
      Staat während der massgeblichen Zeitspanne im Ersuchen geltend gemacht wird
      (vgl. Urteil des BVGer A-1948/2019 vom 7. November 2019 E. 2.4.3).
  - number: 2.6.2
    text: Der Umstand, dass eine betroffene Person in einem Staat als steuerlich ansässig
      gilt, schliesst indes nicht aus, dass diese Ansässigkeit von einem anderen Staat
      in Abrede gestellt wird, respektive dass in anderen Staaten tatsächlich eine
      beschränkte Steuerpflicht gegeben ist. Die Bestimmung des steuerlichen Wohnsitzes
      auf internationaler Ebene ist eine Grundsatzfrage, die eine detaillierte Prüfung
      der Situation voraussetzt und vom ersuchten Staat im Rahmen eines Amtshilfeverfahrens
      nicht geklärt werden kann. Ein möglicher Ansässigkeitskonflikt ist daher nicht
      im Rahmen eines Amtshilfeverfahrens, sondern in einem Verständigungsverfahren
      zu lösen (vgl. BGE 145 II 112 E. 2.2.2; 142 II 217 E. 3.6 f.; 142 II 161 E.
      2.2.2; Urteil des BGer 2C_109/2022 vom 30. Januar 2023 E. 4.2.1). Ein allfälliges
      Verfahren betreffend die Ansässigkeitsfrage der betroffenen Person muss zudem
      noch nicht entschieden worden sein, bevor ein Amtshilfeersuchen in Bezug auf
      die Besteuerung gestellt werden kann (Urteil des BVGer A-4917/2019 vom 22. Oktober
      2020 E. 3.1.2).
  - number: 2.6.3
    text: Das Bestehen einer Steuerpflicht in einem anderen Staat als dem ersuchenden
      Staat stellt sodann weder die Vermutung des guten Glaubens Seite 16 des ersuchenden
      Staates (vgl. E. 2.2.3) noch die wahrscheinliche Relevanz des Amtshilfeersuchens
      (vgl. E. 2.4) in Frage. Dies gilt gemäss bundesgerichtlicher Rechtsprechung
      insbesondere auch dann, wenn der ersuchende Staat in seinem Amtshilfeersuchen
      die Steuerpflicht der betroffenen Person nicht gesondert begründet aber ansonsten
      alle Informationen angibt, die nach dem anwendbaren Abkommen bzw. seinem Protokoll
      erforderlich sind (vgl. E. 2.2). Denn diese Informationen beziehen sich insbesondere
      auf den angestrebten steuerlichen Zweck, weshalb sie darauf schliessen lassen,
      dass der ersuchende Staat die betroffene Person als zu seinen Steuerpflichtigen
      gehörend betrachtet. Die Ansässigkeit in einem Drittstaat reicht somit auch
      nicht aus, damit die ersuchte Behörde von der ersuchenden Behörde Erklärungen
      zu den Anknüpfungspunkten an die geltend gemachte Ansässigkeit der betroffenen
      Person im ersuchenden Staat verlangen kann (BGE 142 II 218 E. 3.1; Urteil des
      BGer 2C_953/2020 vom 24. November 2021 E. 3.5 und E. 3.7). Deshalb ist es im
      Grundsatz unbehilflich, wenn sich die betroffene Person im Rahmen des Amtshilfeverfahrens
      auf eine (unbeschränkte) Steuerpflicht in einem anderen (als dem ersuchenden)
      Staat beruft (vgl. BGE 142 II 161 E. 2.2 ff.; Urteil des BGer 2C_109/2022 vom
      30. Januar 2023 E. 4.2.1; Urteil des BVGer A-4680/2021 vom 19. August 2022 E.
      3.6 in fine).
  - number: 2.6.4
    text: Die einzige Konstellation, in der es das Bundesgericht zulässt, dass die
      Schweiz als ersuchter Staat eine unbeschränkte Steuerpflicht, auf die sich der
      ersuchende Staat stützt, überprüft, ist diejenige, in der die betroffene Person
      (auch) in der Schweiz unbeschränkt steuerpflichtig ist. In dieser Situation
      einer potenziellen Doppelbesteuerung kann die Schweiz – ebenfalls unter Berücksichtigung
      des Vertrauensprinzips (vgl. E. 2.5) – überprüfen, ob der Anknüpfungspunkt an
      die vom ersuchenden Staat angewandte Steuer einem der Kriterien zur Bestimmung
      der steuerlichen Ansässigkeit im DBA zwischen der Schweiz und dem ersuchenden
      Staat entspricht. Hingegen hat die Schweiz als ersuchter Staat nicht zu beurteilen,
      Seite 17 ob eine tatsächliche steuerliche Doppelansässigkeit besteht oder nicht
      (BGE 145 II 112 E. 3; 142 II 161 E. 2.2.2; Urteil des BGer 2C_953/2020 vom 24.
      November 2021 E. 3.6, publiziert in SteuerRevue [StR] 77/2022 S. 166; Urteil
      des BVGer A-5281/2021 vom 2. Mai 2022 E. 7.2.2).
  - number: '2.7'
    text: Der ersuchende Staat hat bei der Verwendung der ersuchten Informationen
      das Spezialitätsprinzip einzuhalten. Gemäss Art. 28 Abs. 2 DBA CH-FR sind die
      Informationen, die ein Vertragsstaat im Rahmen der internationalen Steueramtshilfe
      erhalten hat, von diesem wie nach innerstaatlichem Recht geheim zu halten. Die
      Informationen dürfen nur Personen oder Behörden (einschliesslich der Gerichte
      und Verwaltungsbehörden) zugänglich gemacht werden, die mit der Veranlagung
      oder Erhebung, der Vollstreckung oder der Strafverfolgung, mit der Entscheidung
      von Rechtsmitteln hinsichtlich der in Art. 28 Abs. 1 DBA CH-FR genannten Steuern
      oder mit der Aufsicht über diese Funktionen befasst sind. Diese Personen oder
      Behörden dürfen die Informationen nur für die hiervor genannten Zwecke verwenden.
      Zudem dürfen die Informationen nur gegenüber derjenigen Person verwendet werden,
      gegen welche sich das Amtshilfeersuchen ausdrücklich richtet (BGB 147 II 13
      E. 3.1 ff.; Urteil des BGer 2C_780/2018 vom 1. Februar 2021 E. 3.7.4).
  - number: '2.8'
    text: ''
  - number: 2.8.1
    text: Die amtshilfespezifischen Informations- und Mitwirkungsrechte richten sich
      im Verfahren der ESTV nach Art. 14 ff. StAhiG; sie sind aus dem Anspruch auf
      rechtliches Gehör (Art. 29 Abs. 2 der Bundesverfassung der Schweizerischen Eidgenossenschaft
      vom 18. April 1999 [BV, SR 101]) abgeleitet (vgl. Urteil des BVGer A-6829/2017
      vom 10. August 2018 E. 2.3).
  - number: 2.8.2
    text: Gemäss Art. 14 Abs. 1 StAhiG informiert die ESTV die betroffene Person über
      die wesentlichen Teile des Amtshilfeersuchens. Sie informiert zudem auch diejenigen
      Personen über das Amtshilfeverfahren, von deren Beschwerdeberechtigung sie nach
      Art. 19 Abs. 2 StAhiG aufgrund der Akten ausgehen muss. Gemäss bundesgerichtlicher
      Rechtsprechung beschränkt sich diese Informationspflicht der ESTV auf Personen,
      deren Beschwerdeberechtigung offensichtlich ist (vgl. BGE 146 I 172 E. 7.3).
      Damit wird insbesondere berücksichtigt, dass die Person, gegen welche sich das
      Amtshilfeersuchen richtet, möglicherweise nicht möchte, dass ihre Identität
      und die Existenz des gegen sie eröffneten Verfahrens allen Personen bekannt
      gemacht werden, die im Sinne von Art. 19 Abs. 2 StAhiG beschwerdeberechtigt
      sein könnten (BGE 146 I 172 E. 7.3.2).
  - number: 2.8.3
    text: Als beschwerdeberechtigte Personen gelten die betroffene Person sowie weitere
      Personen unter den Voraussetzungen von Art. 48 VwVG (Art. 19 Abs. 2 StAhiG).
      Gemäss ständiger Rechtsprechung des Bundesgerichts gelten insbesondere die Inhaber
      eines Bankkontos, über welches im Amtshilfeverfahren Auskünfte erteilt werden
      sollen, als von der Informationserhebung und -übermittlung persönlich und direkt
      betroffen und somit als beschwerdeberechtigte Personen (vgl. BGE 139 II 404
      E. 2.1.1 und E. 2.3). Gleiches gilt, wenn die ersuchende Behörde Informationen
      über Personen zu erhalten wünscht, die an möglicherweise nicht deklarierten
      Vermögenswerten wirtschaftlich berechtigt sind, unabhängig davon, unter welchem
      Titel diese formell bei der Bank betreut werden (BGE 139 II 404 E. 2.1.1).
  - number: 2.8.4
    text: Die beschwerdeberechtigten Personen können sich am Verfahren beteiligen
      und Einsicht in die Akten nehmen (Art. 15 Abs. 1 StAhiG). Zudem können sie der
      Übermittlung der sie betreffenden Informationen an die ersuchende Behörde mittels
      schriftlicher – und unwiderruflicher – Erklärung zustimmen (Art. 16 Abs. 1 StAhiG).
      Betrifft die Zustimmungserklärung nur einen Teil der zur Übermittlung beabsichtigten
      Informationen, so wird gemäss Art. 16 Abs. 3 StAhiG für die übrigen Informationen
      das ordentliche Verfahren durchgeführt.
  - number: '2.9'
    text: ''
  - number: 2.9.1
    text: Fehlerhafte Entscheide bzw. Verfügungen sind nach bundesgerichtlicher Rechtsprechung
      nichtig, wenn der ihnen anhaftende Mangel besonders schwer ist, wenn er offensichtlich
      oder zumindest leicht erkennbar ist und wenn zudem die Rechtssicherheit durch
      die Annahme der Nichtigkeit nicht ernsthaft gefährdet wird. Inhaltliche Mängel
      führen nur ausnahmsweise zur Nichtigkeit. Als Nichtigkeitsgründe fallen vorab
      funktionelle und sachliche Unzuständigkeit der entscheidenden Behörde sowie
      krasse Verfahrensfehler in Betracht. Die Nichtigkeit eines Entscheids bzw. einer
      Verfügung ist von sämtlichen rechtsanwendenden Behörden jederzeit von Amtes
      wegen zu beachten (vgl. BGE 138 II 501 E. 3.1; 133 II 366 E. 3.1).
  - number: 2.9.2
    text: Das Bundesgericht hat sich im Zusammenhang mit der Wahrung des rechtlichen
      Gehörs von Drittbetroffenen und deren Informationsrechten bzw. Parteistellung
      im Amtshilfeverfahren (vgl. E. 2.9) mit der Frage der Nichtigkeit auseinandergesetzt.
      Es hat hierbei festgehalten, dass die Frage, wem im Sinne von Art. 14 Abs. 2
      StAhiG von Amtes wegen die Parteistellung eingeräumt werden muss, eine Wertung
      verlangt («suppose en principe une part d'appréciation»). Eine falsche Entscheidung
      der Vorinstanz über die Frage der Information von Drittbetroffenen führt daher
      grundsätzlich nicht zur Nichtigkeit der angefochtenen Schlussverfügung (BGE
      146 I 172 E. 7.6).
  - number: '3.'
    text: Im vorliegenden Fall ist strittig, ob das Amtshilfeersuchen vom 10. Mai
      2021 die formellen Voraussetzungen gemäss Ziff. XI Abs. 3 des Zusatzprotokolls
      zum DBA CH-FR erfüllt (E. 3.3 und E. 3.4). Ebenfalls strittig ist, ob und in
      welchem Umfang die Informationen, welche sich auf die vom Amtshilfeersuchen
      betroffenen Konten beziehen, für das französische Steuerverfahren voraussichtlich
      erheblich sein können (E. 4).
  - number: '3.1'
    text: 'Die Beschwerdeführerin rügt zunächst, dass die Vorinstanz nicht hätte auf
      das Amtshilfeersuchen der DGFP eintreten dürfen. Das Amtshilfeersuchen der DGFP
      erfülle die geltenden Anforderungen gemäss Ziff. XI Abs. 3 des Zusatzprotokolls
      zum DBA CH-FR nicht, da es verschiedene formelle Mängel aufweise. Im Einzelnen
      macht die Beschwerdeführerin Nachfolgendes geltend: Erstens fehle im Amtshilfeersuchen
      die notwendige Angabe zur Form, in welcher Frankreich die Informationen zu erhalten
      wünsche. Bereits aus diesem Grund sei darauf nicht einzutreten. Zweitens sei
      dem Amtshilfeersuchen nicht zu entnehmen, woher die französische Steuerbehörde
      die Information habe, dass sie (die Beschwerdeführerin) die im Amtshilfeersuchen
      genannten Konten (direkt oder indirekt über die erwähnten Trusts) halte. Wenn
      – wie in vorliegendem Fall – keinerlei Angaben zur Quelle der Information gemacht
      würden, auf welche sich das Amtshilfeersuchen stützt, hätte die Vorinstanz die
      Pflicht gehabt, bei der ersuchenden Behörde nach der Quelle bzw. Herkunft der
      betreffenden Kontoinformationen zu fragen. Der Schweiz als ersuchtem Staat sei
      es nur in Kenntnis der Herkunft der Informationen, auf welche der ersuchende
      Staat das Amtshilfeersuchen stützt, möglich, festzustellen bzw. zu überprüfen,
      ob gemäss Art. 7 Bst. c StAhiG eine im Anwendungsbereich des Schweizer Rechts
      strafbare Handlung beim Erlangen dieser Informationen vorliegen würde. Unterlasse
      es der ersuchende Staat gänzlich, sich zur Herkunft der ihm vorliegenden Informationen
      auszusprechen, müsse vorliegend – auch ohne entsprechende Nachfrage durch die
      Vorinstanz – davon ausgegangen werden, dass die Informationen mittels einer
      strafbaren Handlung erlangt worden seien. Damit verletze das Amtshilfeersuchen
      den Grundsatz von Treu und Glauben und die Schweiz dürfe nicht darauf eintreten.
      Drittens würden im Amtshilfeersuchen offensichtlich falsche Namens- und Adressangaben
      gemacht. Sie (die Beschwerdeführerin) sei seit […] geschieden und trage seither
      nur noch ihren Ledignamen […]. Zudem wohne sie seit [Datum innerhalb der des
      vom Amtshilfeersuchen umfassten Zeitraums] in [Drittstaat]. Bei der im Amtshilfeersuchen
      aufgeführten Adresse in Frankreich handle es sich um eine alte Adresse. Diese
      figuriere zwar auch auf den bei der Bank edierten «Beneficiaries List[s]» des
      G._______ Trusts. Die Adresse in Frankreich sei dort aber jeweils nur deshalb
      weiterhin aufgeführt, da die Gründer des Trusts die Adresse bereits vor [Jahr
      innerhalb des vom Amtshilfeersuchen umfassten Zeitraums] erhalten hätten und
      ihnen nur diese Adresse bekannt gewesen sei. Viertens enthalte das Amtshilfeersuchen
      keinerlei Anhaltspunkte zur Ansässigkeit der Beschwerdeführerin in Frankreich,
      respektive es würden keine Gründe genannt, weshalb die ersuchende Behörde davon
      ausgehe, dass sie (die Beschwerdeführerin) in Frankreich ansässig bzw. steuerpflichtig
      («résidente») sein soll. Sie (die Beschwerdeführerin) habe bereits im vorinstanzlichen
      Verfahren offizielle Dokumente eingereicht, die eindeutig beweisen würden, dass
      sie seit [Jahr innerhalb des vom Amtshilfeersuchen umfassten Zeitraums] in [Drittstaat]
      ansässig sei. Zudem werde ein Wegzug aus Frankreich amtlich registriert, womit
      dieser Umstand auch den französischen Steuerbehörden offensichtlich bekannt
      sein dürfte. Eine wirtschaftliche Anknüpfung zu Frankreich, die gegebenenfalls
      eine Steuerpflicht begründen könnte, bestehe sodann ebenfalls nicht. Das Amtshilfeersuchen
      sei daher als «fishing expedition» zu qualifizieren. In der vorliegenden Angelegenheit
      gehe es um höchst delikate Daten sie (die Beschwerdeführerin) betreffend, weshalb
      das Amtshilfeersuchen korrekt gestellt werden müsse. Einem solch falschen Amtshilfeersuchen
      wie dem vorliegenden zu entsprechen verletze nicht nur Bundesrecht, sondern
      sei «auch unter der unrichtigen und unvollständigen Feststellung des Sachverhalts
      zu subsumieren».'
  - number: '3.2'
    text: Die Vorinstanz entgegnet den Vorbringen der Beschwerdeführerin dahingehend,
      dass das vorliegende Amtshilfeersuchen sämtliche formellen Voraussetzungen erfülle.
      Namentlich könne nicht von falschen Namens- und Adressangaben gesprochen werden
      und auch sonst gelinge es der Seite 21 Beschwerdeführerin nicht, erhebliche
      Zweifel an den Erklärungen bzw. an der Sachverhaltsschilderung der ersuchenden
      Behörde zu wecken. Die von der Beschwerdeführerin als notwendig erachteten Klärungsanfragen
      seien nicht angezeigt, und auf das Amtshilfeersuchen sei zu Recht eingetreten
      worden.
  - number: '3.3'
    text: ''
  - number: 3.3.1
    text: Die Informationen bzw. Angaben, welche das Amtshilfeersuchen zu enthalten
      hat (vgl. E. 2.2), sind so auszulegen, dass sie einen wirksamen Informationsaustausch
      nicht behindern (vgl. E. 2.2.3).
  - number: 3.3.2
    text: Die DGFP hat im vorliegenden Ersuchen ausdrücklich nach Kopien gewisser
      Bankformulare und anderer analoger Dokumente ersucht. Insofern hat sie sich
      – entgegen den Ausführungen der Beschwerdeführerin – zur gewünschten Form, in
      welcher diese Informationen an sie übermittelt werden sollen, geäussert. Dass
      die DGFP die übrigen ersuchten Informationen nicht in einer bestimmten Form
      übermittelt wünscht, stellt sodann keinen formellen Mangel des Amtshilfeersuchens
      dar, sondern zeugt davon, dass die DGFP diese Informationen nicht in einer bestimmten
      Form benötigt. Denn die Angabe zur Form im Amtshilfeersuchen ist – entgegen
      der Auffassung der Beschwerdeführerin – nicht so zu verstehen, dass bei Fehlen
      einer Angabe zur gewünschten Übermittlungsform der Informationsaustausch verweigert
      werden kann. Eine solche Interpretation von Ziff. XI Abs. 3 Bst. c des Zusatzprotokolls
      zum DBA CH-FR würde einem wirksamen Informationsaustausch offensichtlich entgegenstehen.
      Vielmehr ist mit dieser Bestimmung gemeint, dass der ersuchende Staat die Übermittlung
      der erfragten Information auch in einer bestimmten Form ersuchen kann und der
      ersuchte Staat die Informationen – soweit möglich – in der gewünschten Form
      zu übermitteln hat. Dies ist namentlich für solche Fälle gedacht, in welchen
      der ersuchende Staat wegen Bestimmungen des nationalen Rechts (beispielsweise
      Bestimmungen zur Beweisverwertbarkeit im innerstaatlichen Verfahren) darauf
      angewiesen ist, die ersuchten Informationen in einer bestimmten Form zu erhalten
      (vgl. OECD-Kommentar, Model Tax Convention on Income and on Capital, Version
      2017, Ziff. 10.2 zu Art. 26).
  - number: 3.3.3
    text: 'Was die Namens- und Adressangabe im Amtshilfeersuchen betrifft, wonach
      es sich dabei um «offensichtlich falsche Angaben» handeln würde, so kann der
      Beschwerdeführerin aus den nachfolgenden Gründen nicht Seite 22 gefolgt werden:
      Zum einen hält Ziff. XI Abs. 3 Bst. a des Zusatzprotokolls fest, dass das Amtshilfeersuchen
      die Identität der betroffenen Person nennen muss. Dies kann mittels Angabe des
      Namens oder weiterer Informationen, welche die Identifikation der betroffenen
      Person ermöglichen, erfolgen. Die Namensangaben im vorliegenden Amtshilfeersuchen
      erlauben es ohne weiteres, die Beschwerdeführerin als vom Amtshilfeersuchen
      betroffene Person zu identifizieren. Der Ledigname der Beschwerdeführerin wird
      ausdrücklich in der Namensangabe im Amtshilfeersuchen erwähnt («née [Ledigname]»).
      Dass die Beschwerdeführerin (zumindest während einer gewissen Zeit) den ebenfalls
      im Amtshilfeersuchen erwähnten Nachnamen […] trug, bestreitet sie sodann nicht.
      Ferner macht sie auch nicht geltend, dass im Amtshilfeersuchen eine andere Person
      als sie gemeint sei. Zum anderen bestreitet die Beschwerdeführerin nicht, an
      der im Amtshilfeersuchen genannten Adresse in Frankreich gewohnt zu haben. Im
      Gegenteil führt sie in ihrer Beschwerde selbst aus, dass es sich dabei um ihre
      «alte Wohnadresse» handle. Zwar hat die Beschwerdeführerin Dokumente eingereicht,
      welche eine Wohnsitznahme in [Drittstaat] belegen würden und sie hat erwähnt,
      «im Jahr [Jahr innerhalb des vom Amtshilfeersuchen umfassten Zeitraums] von
      Frankreich nach [Drittstaat] umgezogen» zu sein, wo sich seither ihr Lebensmittelpunkt
      befinde. Die erfolgte Wohnsitznahme an einem anderen Ort ist jedoch nicht geeignet,
      um eindeutig nachzuweisen, dass damit der Wohnsitz in Frankreich tatsächlich
      aufgegeben wurde und die im Amtshilfeersuchen genannten Adresse in Frankreich
      für die Zeit ab [Datum innerhalb des vom Amtshilfeersuchen umfassten Zeitraums]
      offensichtlich ungültig ist. Dies gilt vorliegend umso mehr, als dass das Informationsschreiben
      der Vorinstanz vom 18. Juni 2021 (vgl. act. 26; Sachverhalt Bst. B.c) der Beschwerdeführerin
      am 25. Juni 2021 tatsächlich an der im Amtshilfeersuchen genannten Adresse in
      Frankreich zugestellt werden konnte (vgl. act. 31, Sendungsverfolgung der Post).
      Die im Amtshilfeersuchen genannte Adresse in Frankreich kann somit im ersuchten
      Zeitraum nicht als ungültig bzw. offensichtlich falsch betrachtet werden. Im
      Übrigen hat die Schweiz als ersuchter Staat die Frage nach dem (steuerrechtlichen)
      Wohnsitz im vorliegenden Amtshilfeverfahren ohnehin nicht zu untersuchen (vgl.
      E. 2.6.2).'
  - number: 3.3.4
    text: 'Was die Ansässigkeit bzw. Steuerpflicht der Beschwerdeführerin in Frankreich
      betrifft, so weist die Vorinstanz zu Recht darauf hin, dass diesbezügliche Fragen
      nicht im Amtshilfeverfahren zu behandeln sind und es bei möglichen Ansässigkeitskonflikten
      – jedenfalls wenn keine Ansässigkeit in der Schweiz geltend gemacht wird (vgl.
      E. 2.6.4) – namentlich nicht Seite 23 ausreicht, wenn sich die betroffene Person
      auf eine (unbeschränkte) Steuerpflicht in einem anderen (als dem ersuchenden)
      Staat beruft (vgl. E. 2.6.3). Im vorliegenden Fall gilt nichts anders. Insoweit
      sich die Beschwerdeführerin darauf beruft, ihre Beschwerde ziele nicht auf eine
      Überprüfung ihrer Steuerpflicht in Frankreich ab, sondern sie rüge eine fehlende
      Nennung von Anknüpfungspunkten zur behaupteten Ansässigkeit und damit einen
      formellen Mangel des Amtshilfeersuchens, so kann sie damit ebenfalls nichts
      zu ihren Gunsten ableiten. Das vorliegende Amtshilfeersuchen enthält hinreichend
      klare Informationen, um nachzuvollziehen, dass die französische Steuerbehörde
      davon ausgeht, dass die Beschwerdeführerin in Frankreich (unbeschränkt) steuerpflichtig
      ist: Das Amtshilfeersuchen bezeichnet die Beschwerdeführerin als «résidente
      fiscale française», welche «l’objet d’un contrôle par l’administration fiscale
      française sur la période du 01/01/2011 au 31/12/2018» darstelle. Zudem wird
      im Amtshilfeersuchen das Ziel benannt, das mit dem Ersuchen verfolgt werde (Überprüfung
      der Einkommenssteuer für die Jahre 2011 bis 2018, Überprüfung der Vermögenssteuer
      für die Jahre 2011 bis 2017, Bestimmung der Höhe allfälliger hinterzogener Steuern)
      und es werden die benötigten Informationen beschrieben sowie die Informationsinhaberin
      in der Schweiz genannt. Die Tatsache, dass die Beschwerdeführerin Unterlagen
      vorgelegt hat, die (zumindest seit [Datum innerhalb des vom Amtshilfeersuchen
      umfassten Zeitraums]) einen Wohnsitz in [Drittstaat] belegen und auf einen Lebensmittelpunkt
      in [Drittstaat] deuten würden, ist – entgegen der Auffassung der Beschwerdeführerin
      – nicht dazu geeignet, die Ausführungen der DGFP betreffend die Steuerpflicht
      der Beschwerdeführerin in Frankreich klarerweise zu widerlegen oder diese in
      Frage zu stellen (vgl. bereits E. 3.3.3 hiervor). Vielmehr gilt das Vertrauensprinzip
      auch hier (vgl. E. 2.6.3). Somit ist in vorliegendem Fall nicht zu beanstanden,
      dass die Vorinstanz von der ersuchenden Behörde keine zusätzlichen Erklärungen
      zu den Anknüpfungskriterien zur Ansässigkeit und Steuerpflicht der Beschwerdeführerin
      in Frankreich verlangt hat.'
  - number: 3.3.5
    text: Hinsichtlich der Herkunft der Informationen, auf welchen das Amtshilfeersuchen
      basiert, erklärt die ersuchende Behörde, dass die französische Steuerbehörde
      vermute bzw. über Informationen verfüge («dispose d’éléments»), dass die Beschwerdeführerin
      die konkret bezeichneten Bankkonten bei der Bank indirekt über verschiedene,
      ebenfalls konkret genannte, Trusts halte (vgl. Sachverhalt Bst. A.b). Der Umstand,
      dass sich die DGFP nicht weiter bzw. nicht konkreter zur Herkunft der Informationen
      im Amtshilfeersuchen äussert, führt im vorliegenden Fall – entgegen der Seite
      24 Auffassung der Beschwerdeführerin – weder zum Verdacht, noch stellt es einen
      Nachweis dafür dar, dass diese Informationen durch eine (gemäss schweizerischem
      Recht) strafbare Handlung erlangt worden sind. Die Auffassung der Beschwerdeführerin,
      wonach der ersuchte Staat bei fehlenden Erklärungen zur Herkunft der Informationen
      zwangsläufig davon ausgehen müsse, dass diese Informationen auf widerrechtliche
      Art und Weise erlangt worden sind, würde das Vertrauensprinzip gerade in sein
      Gegenteil verkehren (vgl. E. 2.5.5). Eine solche Auffassung wäre auch mit dem
      Grundsatz, wonach völkerrechtliche Verträge nach Treu und Glauben zu erfüllen
      sind, nicht vereinbar (vgl. E. 2.2.3). Ein Hinweis auf eine fragwürdige oder
      gar illegale Herkunft der Informationen im Amtshilfeersuchen kann ferner weder
      in der Nennung des Nachnamens, welchen die Beschwerdeführerin während der Dauer
      ihrer Ehe trug, noch in der Angabe der mutmasslich alten Adresse in Frankreich
      (vgl. hierzu E. 3.3.3) erblickt werden. Weitere Anhaltspunkte für eine strafbare
      Handlung bei der Erlangung der Kontoinformationen durch die französische Steuerbehörde
      nennt die Beschwerdeführerin sodann nicht. Dass die französische Steuerbehörde
      – wie im Amtshilfeersuchen erwähnt – tatsächlich eine Steuerprüfung betreffend
      die Beschwerdeführerin durchführt, bestreitet letztere im Übrigen nicht.
  - number: 3.3.6
    text: Somit gelingt es der Beschwerdeführerin nicht, die Korrektheit der Angaben
      im Amtshilfeersuchen oder die legale Herkunft der Informationen, auf welchen
      das Amtshilfeersuchen basiert, klarerweise zu widerlegen oder ernsthafte Zweifel
      daran zu begründen. Folglich ist das vorliegende Amtshilfeersuchen weder als
      offensichtlich mangelhaft zu qualifizieren noch ist zu beanstanden, dass die
      Vorinstanz von Klärungsanfragen an die ersuchende Behörde abgesehen hat. Dementsprechend
      kann auch nicht von einer unvollständigen bzw. unrichtigen Feststellung des
      Sachverhalts durch die Vorinstanz gesprochen werden.
  - number: '3.4'
    text: Als Zwischenfazit ist aufgrund des hiervor Gesagten festzuhalten, dass das
      beschwerdegegenständliche Amtshilfeersuchen die formellen Voraussetzungen gemäss
      Ziff. XI Abs. 3 des Zusatzprotokolls zum DBA CH-FR (vgl. E. 2.2) erfüllt. Das
      Ersuchen der DGFP beinhaltet für einen bestimmten Zeitraum konkrete Fragen und
      es beschreibt konkret die verlangten Informationen, die sich auf eine identifizierte
      (betroffene) Person im Rahmen einer in Frankreich laufenden Steueruntersuchung
      sowie auf eine identifizierte Informationsinhaberin in der Schweiz beziehen
      (vgl. Sachverhalt Bst. A.b). Zudem wurde das Subsidiaritätsprinzip (vgl. E.
      2.4 und Sachverhalt Bst. A.d) unbestrittenermassen eingehalten. Rechtsprechungsgemäss
      kann das vorliegende Amtshilfeersuchen aufgrund der Einhaltung der formellen
      Anforderungen – entgegen der Meinung der Beschwerdeführerin – daher nicht als
      «fishing expedition» betrachtet werden (vgl. E. 2.3.2). Dies hat zur Folge,
      dass der Antrag der Beschwerdeführerin, auf das Amtshilfeersuchen sei nicht
      einzutreten, abzuweisen ist. Gleiches gilt für den (Eventual-)Antrag der Beschwerdeführerin
      auf Rückweisung der Sache an die Vorinstanz zur Vornahme der beantragten Klärungsanfragen
      (vgl. Sachverhalt Bst. D.a). Dieser Antrag ist ebenfalls abzuweisen.
  - number: '4.'
    text: ''
  - number: '4.1'
    text: Die Beschwerdeführerin bestreitet sodann (gesamthaft) die voraussichtliche
      Erheblichkeit der zur Übermittlung vorgesehenen Informationen. Zur Begründung
      führt sie aus, dass die im Amtshilfeersuchen enthaltenen (fehlerhaften bzw.
      unvollständigen) Informationen nicht mit den zur Übermittlung vorgesehenen Informationen
      übereinstimmen würden. Frankreich ersuche nämlich einzig um Informationen zu
      Konten, welche sie (die Beschwerdeführerin) selbst halte. Aus den zur Übermittlung
      vorgesehenen Formularen A und T betreffend die jeweiligen Konten bzw. Kundenbeziehungen
      mit der Bank gehe aber eindeutig hervor, dass sie (die Beschwerdeführerin) lediglich
      Begünstigte der betroffenen Trusts sei. Da sie – so die Beschwerdeführerin weiter
      – aber weder als Kontoinhaberin noch als an den Konten wirtschaftlich Berechtigte
      gelten könne und auch über keine Vollmacht an den Konten verfüge, halte sie
      diese Konten nicht. Zudem seien die im Amtshilfeersuchen erwähnten Bankkonten
      erst in den Jahren [Jahre innerhalb des vom Amtshilfeersuchen umfassten Zeitraums]
      eröffnet worden. Indem die zur Übermittlung vorgesehenen Kontoinformationen
      erst die Zeitperiode ab [Jahr innerhalb des vom Amtshilfeersuchen umfassenden
      Zeitraums] beträfen, würden sie nicht in die Steuerperiode [Steuerperioden innerhalb
      des vom Amtshilfeersuchen umfassten Zeitraums] fallen, in welcher sie (die Beschwerdeführerin)
      noch in Frankreich ansässig gewesen sei. Folglich könnten die Kontoinformationen
      sie betreffend nicht dem Ermittlungsobjekt in Frankreich entsprechen und müssen
      (gesamthaft) als nicht erheblich qualifiziert werden.
  - number: '4.2'
    text: ''
  - number: 4.2.1
    text: Wie bereits ausgeführt, sind die im vorliegenden Amtshilfeersuchen enthaltenen
      Informationen weder offensichtlich unklar noch eindeutig fehler- oder lückenhaft
      (vgl. E. 3.3 f.). Die DGFP möchte gemäss den Ausführungen im vorliegenden Amtshilfeersuchen
      überprüfen, ob die betroffene Person als Steuerpflichtige ihren Deklarationspflichten
      nachgekommen ist. Sie (die DGFP) geht davon aus, dass die im Amtshilfeersuchen
      genannten Konten durch die Beschwerdeführerin gehalten werden und zwar indirekt
      über die im Amtshilfeersuchen genannten Trusts. Die DGFP möchte in vorliegendem
      Fall mit den im Amtshilfeersuchen gestellten Fragen insbesondere Informationen
      zu Vermögensständen der nämlichen Konten sowie zu allfälligen darauf eingegangenen
      Einkünften (Zinserträge, Dividenden, etc.) erhalten und ersucht hierfür um Zustellung
      namentlich von Kopien der Formulare A, I, S und T. Zudem erfragt die DGFP dieselben
      Informationen zu allfälligen weiteren Bankkonten, welche die Beschwerdeführerin
      direkt oder indirekt als Kontoinhaberin hält, bei welchen sie aus Sicht der
      betroffenen Bank als wirtschaftlich Berechtigte gilt und/oder für welche sie
      über eine Zeichnungsberechtigung verfügt (vgl. Sachverhalt Bst. A.b und A.c).
      Da die ersuchende Behörde im Amtshilfeersuchen zum Ausdruck bringt, dass sie
      die Beschwerdeführerin als (indirekte) Halterin bzw. Inhaberin der nämlichen
      Bankkonten erachtet, gelten diese Bankkonten – entgegen der Auffassung der Beschwerdeführerin
      – als klarerweise vom Amtshilfeersuchen erfasst. Hingegen bildet die Frage der
      wirtschaftlichen Berechtigung bzw. der steuerrechtlichen Zurechnung der auf
      den Konten bei der Bank deponierten Vermögenswerte Gegenstand des französischen
      Steuerverfahrens und ist im vorliegenden Amtshilfeverfahren nicht näher zu prüfen
      (vgl. E. 2.4.8). Gleiches gilt für die Frage der einkommenssteuerrechtlichen
      Relevanz allfälliger Ausschüttungen von diesen Konten.
  - number: 4.2.2
    text: Zur Übermittlung vorgesehen sind konkret die erfragten Kontoauszüge mit
      den ebenfalls erfragten Kontoständen, die sonstigen Kontoauszüge sowie die Formulare
      A und T für die im Amtshilfeersuchen genannten Bankkonten. Die Beschwerdeführerin
      ist bei der Bank als eine von verschiedenen Begünstigten des G._______ Trusts
      verzeichnet (vgl. Beilage «Beneficiaries List» zum Formular T für die jeweiligen
      Bankkonten). Der G._______ Trust ist wiederum in den bei der Bank edierten Dokumenten
      als wirtschaftlich Berechtigter bzw. als einer von mehreren wirtschaftlich Berechtigten
      verzeichnet (vgl. Beilage «Addendum to Declaration of Identity of Beneficial
      Owner[s]» zum Formular A für die jeweiligen Bankkonten); als Vertragspartner
      der Bank («contracting partner») sind entweder die Trustees oder verschiedene,
      als «underlying company» zur Vertretung des G._______ Trusts berechtigte Unternehmen
      aufgeführt (vgl. Formulare A und T für die jeweiligen Bankkonten).
  - number: 4.2.3
    text: Der im Amtshilfeersuchen genannte Sachverhalt hängt mit den verlangten Informationen
      und Dokumenten rechtsgenügend zusammen. Die ersuchten Informationen sind in
      Übereinstimmung mit der bundesgerichtlichen Rechtsprechung (vgl. E. 2.4.4) in
      vorliegender Konstellation zudem geeignet, um die Beziehung der Beschwerdeführerin
      zu den vom Amtshilfeverfahren betroffenen Bankkonten zu klären und um die Vermögens-
      und Einkommenssituation der Beschwerdeführerin für den vom Amtshilfeersuchen
      betroffenen Zeitraum zu erhellen. Ebenso können diese Informationen der Festsetzung
      allfällig hinterzogener Steuern dienen. Damit entsprechen sie dem Zweck des
      Amtshilfeersuchens und sind sie dazu geeignet, im ausländischen Steuerverfahren
      gegen die Beschwerdeführerin als betroffene Person verwendet zu werden. Dies
      gilt insbesondere auch für die zu den Formularen T zugehörigen Listen der Begünstigten
      des G._______ Trusts («Beneficiaries List[s]»). Entgegen der Auffassung der
      Beschwerdeführerin bilden die Listen der Begünstigten Teil des Formulars T,
      weshalb sie als ausdrücklich erfragt und in Anwendung des Vertrauensprinzips
      (vgl. E. 2.5) als voraussichtlich erheblich gelten. Somit ist der Antrag der
      Beschwerdeführerin, es sei der Vorinstanz zu untersagen, der ersuchenden Behörde
      im vorliegenden Amtshilfeverfahren irgendwelche Informationen und Akten, in
      denen die Beschwerdeführerin erwähnt oder aufgeführt ist, auszuhändigen oder
      zu erteilen bzw. zugänglich zu machen (vgl. Sachverhalt Bst. D.a), abzuweisen.
      Der Subeventualantrag der Beschwerdeführerin, die Liste der Begünstigten [des
      Trusts] sei nicht zu übermitteln (vgl. Sachverhalt Bst. D.a), ist ebenfalls
      abzuweisen.
  - number: '4.3'
    text: ''
  - number: 4.3.1
    text: 'Wie soeben ausgeführt (vgl. E. 4.2.1 hiervor) ist die Frage, ob die Beschwerdeführerin
      als Begünstigte des G._______ Trusts als (direkt oder indirekt) an den nämlichen
      Konten wirtschaftlich Berechtigte gilt, nicht im vorliegenden Amtshilfeverfahren
      zu klären. Die Vorinstanz beabsichtigt allerdings als Teilantwort betreffend
      die jeweiligen Konten die Erklärung «…dont [A._______] est une des ayants droit
      économiques» zu übermitteln. Damit nimmt sie eine Qualifikation vor, die ihr
      im vorliegenden Fall Seite 28 nicht zusteht, denn eine diesbezügliche Beurteilung
      hat durch die französische Steuerbehörde im innerstaatlichen Verfahren zu erfolgen
      (vgl. E. 2.4.8). Der Subeventualantrag der Beschwerdeführerin ist entsprechend
      teilweise gutzuheissen. Die Vorinstanz ist anzuweisen, bei den Antworten zu
      den jeweiligen Bankkonten (Ziffer 2 des Dispositivs) den Passus «…dont [A._______]
      est une des ayants droit économiques» zu streichen bzw. mit dem folgenden Passus
      zu ersetzen: «… dont [A._______] est mentionnée dans le formulaire T comme une
      des bénéficiaires du [G._______ Trust]».'
  - number: 4.3.2
    text: Die Beschwerdeführerin beantragt zudem (ebenfalls subeventualiter), dass
      in jedem Absatz über die Kontobeziehungen ergänzend zu erwähnen sei, dass «[A._______]
      n’est ni titulaire, ni ayant droit économique, ni est-elle bénéficiaire d’une
      procuration sur ce compte mentionné» (vgl. Sachverhalt Bst. D.a). Eine solche
      Ergänzung ist vorliegend nicht angezeigt und dieser Subeventualantrag der Beschwerdeführerin
      ist abzuweisen. Wie hiervor bereits ausgeführt (vgl. E. 4.2.2 f.), ist namentlich
      in den zum jeweiligen Bankformular T zugehörigen «Beneficiaries Lists» ersichtlich,
      in welcher Beziehung die Beschwerdeführerin zum G._______ Trust bzw. zu den
      jeweiligen Bankkonten steht. Mit anderen Worten geht für die ersuchende Behörde
      aus diesen Angaben hervor, welche Rolle die Beschwerdeführerin – zumindest aus
      Sicht der Bank – bei den jeweiligen Bankkonten spielt. Ob die Beschwerdeführerin
      aus Sicht der französischen Steuerbehörde darum allenfalls als indirekte Kontoinhaberin
      oder indirekt wirtschaftlich Berechtigte qualifiziert werden kann oder nicht,
      ist eine Frage des französischen Rechts und im Amtshilfeverfahren nicht – auch
      nicht durch die Beschwerdeführerin – zu beurteilen (vgl. E. 2.4.8 und E. 4.3.1).
      Bestreitet die Beschwerdeführerin eine steuerrechtlich relevante Beziehung zu
      den vom Amtshilfeersuchen betroffenen Konten, kann sie dies im Verfahren vor
      den französischen Behörden geltend machen (vgl. E. 2.4.8). Im Übrigen erweisen
      sich die Listen mit den Begünstigten des G._______ Trusts auch dann als voraussichtlich
      erheblich, wenn sie der ersuchenden Behörde dazu dienen sollten, ihre Vermutung,
      wonach die Beschwerdeführerin die vom Amtshilfeersuchen betroffenen Konten (indirekt)
      halte, zu widerlegen (vgl. E. 2.4.6).
  - number: 4.3.3
    text: Sodann ist mit Blick auf das hiervor Gesagte die zur Übermittlung beabsichtigte
      Antwort der Vorinstanz auf die Fragen b) und c) des Amtshilfeersuchens, wonach
      «[A._______] n’entretenait pas d’autre relation bancaire auprès de la [Bank
      B._______ Ltd.] en tant que titulaire, ayant droit économique et/ou bénéficiaire
      d’une procuration» nicht zu beanstanden. Unter den vorliegenden Umständen und
      unter Berücksichtigung der zu übermittelnden Bankunterlagen (vgl. E. 4.2.2)
      wird damit – entgegen der Auffassung der Beschwerdeführerin – nämlich insbesondere
      nicht (indirekt) zum Ausdruck gebracht, dass die Beschwerdeführerin «titulaire»,
      «ayant droit économique» oder «bénéficiaire d’une procuration» der vom Amtshilfeersuchen
      betroffenen Konten sei.
  - number: '5.'
    text: ''
  - number: '5.1'
    text: Abschliessend ist auf die Rüge der Beschwerdeführerin einzugehen, die Zustimmungserklärungen
      des G._______ Trusts und der Gesellschaf- ten (vgl. Sachverhalt Bst. B.g) seien
      nichtig, da die Vorinstanz diese in vorliegendem Fall zu Unrecht als beschwerdeberechtigte
      Personen qualifiziert habe.
  - number: '5.2'
    text: Der Auffassung der Beschwerdeführerin kann nicht gefolgt werden. Die Vorinstanz
      verweist in der angefochtenen Schlussverfügung zurecht auf die – ebenfalls im
      Rahmen der internationalen Amtshilfe in Steuersachen ergangene und vorliegend
      einschlägige – Rechtsprechung des Bundesgerichts. Demnach gilt die Inhaberin
      eines Bankkontos, über welches Auskünfte erteilt werden sollen, als beschwerdeberechtigte
      Person im Sinne von Art. 19 Abs. 2 StAhiG (vgl. E. 2.8.3). Der G._______ Trust
      ist – zumindest aus Sicht der Bank – wirtschaftlich Berechtigter an den im vorliegenden
      Amtshilfeersuchen erwähnten Konten bei der Bank (vgl. Formulare A zu den jeweiligen
      Kontobeziehungen). Die formellen Vertragspartner der Bank sind entweder die
      Trustees oder Unternehmen, die gemäss Bankformular T zur Eröffnung eines Kontos
      bei der Bank für den Trust berechtigt sind (vgl. E. 4.2.2). Als Kontoinhaber,
      respektive als Vertragspartnerinnen der Bank sind sie von der Informationserhebung
      und -übermittlung persönlich und direkt betroffen, auch wenn sie selbst nicht
      von der Steueruntersuchung in Frankreich direkt betroffen sind. Die Beschwerdeberechtigung
      ist zudem offensichtlich, weshalb die von der Vorinstanz von Amtes wegen gewährte
      Parteistellung rechtens war (vgl. E. 2.8.2 und E. 2.9.2). Somit sind die Zustimmungserklärungen
      des Trusts sowie der diesen vertretungsbefugten Unternehmen als beschwerdeberechtigte
      Personen rechtsgültig erfolgt und nicht nichtig. Der diesbezügliche Antrag der
      Beschwerdeführerin ist daher abzuweisen.
  - number: '6.'
    text: ''
  - number: '6.1'
    text: Andere Gründe, die der Amtshilfe in vorliegendem Fall entgegenstehen, werden
      von der Beschwerdeführerin nicht geltend gemacht und sind auch nicht ersichtlich.
  - number: '6.2'
    text: Somit erweist sich die Beschwerde einzig betreffend die Angabe der Vorinstanz,
      wonach die Beschwerdeführerin bei den betroffenen Konten als «une des ayants
      droit économiques» gelte, als begründet. Der diesbezügliche Subeventualantrag
      der Beschwerdeführerin ist insofern gutzuheissen, als dass die Vorinstanz anzuweisen
      ist, Ziffer 2 des Dispositivs der angefochtenen Schlussverfügung gemäss E. 4.3.1
      abzuändern.
  - number: '7.'
    text: ''
  - number: '7.1'
    text: Nach dem Gesagten ist die Beschwerde teilweise gutzuheissen. Damit dringt
      die Beschwerdeführerin mit ihren Subeventualanträgen teilweise durch. Im Resultat
      sind die Antworten (unter Bst. a des Ersuchens, vgl. Sachverhalt Bst. A.c) zu
      den sieben Bankkonten zumindest teilweise nicht wie von der Vorinstanz vorgesehen
      zu übermitteln (E. 4.3.1). Angesichts dessen, dass die Vorinstanz mit der beabsichtigten
      Bezeichnung der Beschwerdeführerin als «une des ayant droit économiques» an
      den vom Amtshilfeersuchen betroffenen Konten eine unzulässige Qualifikation
      vorgenommen hat (vgl. E. 4.3.1), rechtfertigt es sich, von einem Obsiegen der
      Beschwerdeführerin im Umfang von rund 1/5 auszugehen.
  - number: '7.2'
    text: Im Übrigen ist die Beschwerde abzuweisen.
  - number: '8.'
    text: ''
  - number: '8.1'
    text: Die Verfahrenskosten werden in der Regel der unterliegenden Partei auferlegt.
      Unterliegt diese nur teilweise, so werden die Verfahrenskosten ermässigt (Art.
      63 Abs. 1 VwVG). Insgesamt sind die Verfahrenskosten auf Fr. 5’000.-- festzusetzen
      (vgl. Art. 2 Abs. 1 in Verbindung mit Art. 4 des Reglements vom 21. Februar
      2008 über die Kosten und Entschädigungen vor dem Bundesverwaltungsgericht [VGKE,
      SR 173.320.2]) und der teilweise obsiegenden Beschwerdeführerin im Umfang von
      Fr. 4’000.-- aufzuerlegen. Letzterer Betrag ist dem geleisteten Kostenvorschuss
      von total Fr. 5’000.-- zu entnehmen. Der Restbetrag von Fr. 1’000.-- ist der
      Beschwerdeführerin nach Eintritt der Rechtskraft des vorliegenden Urteils zurückzuerstatten.
      Der Vorinstanz sind keine Verfahrenskosten aufzuerlegen (Art. 63 Abs. 2 VwVG).
  - number: '8.2'
    text: 'Die Vorinstanz hat der teilweise obsiegenden Beschwerdeführerin die ihr
      erwachsenen notwendigen Kosten in entsprechend reduziertem Umfang zu entschädigen
      (Art. 64 Abs. 1 und 2 VwVG; Art. 7 ff. VGKE). Die Parteientschädigung ist aufgrund
      der eingereichten Kostennote festzusetzen (Art. 14 VGKE). Bei Fehlen einer Kostennote
      wird die Entschädigung aufgrund der Akten festgesetzt (Art. 14 Abs. 2 VGKE).
      Das Anwaltshonorar wird nach dem notwendigen Zeitaufwand bemessen (Art. 10 Abs.
      1 VGKE). Angesichts dieser klaren reglementarischen Grundlagen kann nach der
      geltenden Rechtsprechung namentlich bei anwaltlicher Vertretung auf eine Aufforderung
      zur Einreichung einer Kostennote verzichtet werden (vgl. zum Ganzen: Urteil
      des BGer 2C_422/2011 vom 9. Januar 2012 E. 2; Urteil des BVGer A-471/2021 vom
      27. Juni 2022 E. 5.2). Vorliegend hat die Rechtsvertretung der Beschwerdeführerin
      keine Kostennote eingereicht. Die reduzierte Parteientschädigung der Beschwerdeführerin
      für die ihr erwachsenen notwendigen Auslagen ist vorliegend unter Berücksichtigung
      der gesamten Umstände praxisgemäss auf Fr. 1’500.-- festzusetzen.'
  - number: '9.'
    text: Dieser Entscheid auf dem Gebiet der internationalen Amtshilfe in Steuersachen
      kann gemäss Art. 83 Bst. h des Bundesgerichtsgesetzes vom 17. Juni 2005 (BGG,
      SR 173.110) innerhalb von 10 Tagen nur dann mit Beschwerde in öffentlich-rechtlichen
      Angelegenheiten an das Bundesgericht weitergezogen werden, wenn sich eine Rechtsfrage
      von grundsätzlicher Bedeutung stellt oder wenn es sich aus anderen Gründen um
      einen besonders bedeutenden Fall im Sinne von Art. 84 Abs. 2 BGG handelt (Art.
      84a und Art. 100 Abs. 2 Bst. b BGG). Ob dies der Fall ist, entscheidet das Bundesgericht.
- name: sachverhalt
  content:
  - number: A.
    text: ''
  - number: A.a
    text: 'Die Direction Générale des Finances Publiques, Direction Nationale

      des Vérifications de Situations Fiscales von Frankreich (nachfolgend:

      DGFP oder ersuchende Behörde), hat am 10. Mai 2021 und gestützt auf

      Art. 28 des Abkommens vom 9. September 1966 zwischen der Schweiz

      und Frankreich zur Vermeidung der Doppelbesteuerung auf dem Gebiet

      der Steuern vom Einkommen und vom Vermögen und zur Vermeidung von

      Steuerbetrug und Steuerflucht (SR 0.672.934.91; nachfolgend: DBA CH-

      FR) ein Amtshilfeersuchen betreffend A._______ (nachfolgend: betroffene

      Person) an die Eidgenössische Steuerverwaltung (nachfolgend: ESTV) ge-

      richtet. Als Informationsinhaberin wurde die Bank B._______ Ltd. (nachfol-

      gend: Bank) genannt.'
  - number: A.b
    text: 'Die DGFP erklärt im Amtshilfeersuchen, dass die französische Steuer-

      behörde betreffend die betroffene Person für die Steuerperiode vom

      1. Januar 2011 bis 31. Dezember 2018 eine Prüfung durchführe

      («[A._______] fait l’objet d’un contrôle par l’administration fiscale française

      sur la période du 01/01/2011 au 31/12/2018»). In Bezug auf den Sachver-

      halt ist dem Amtshilfeersuchen zusammengefasst Folgendes zu entneh-

      men:

      Die französische Steuerbehörde würde über Hinweise («éléments») verfü-

      gen, gemäss welchen die betroffene Person die Konten mit den Nummern

      […], […], […], […], […], […] und […] bei der Bank halten würde. Die Konten

      würden dabei indirekt über die Trusts («via les trusts») C._______ Limited,

      D._______ Limited, E._______ Limited, F._______ Limited und G._______

      Trust gehalten. Die betroffene Person habe die genannten Bankkonten ge-

      genüber der französischen Steuerbehörde nicht deklariert. Als «résidente

      fiscale française» müsse die betroffene Person als Steuerpflichtige jedoch

      zusammen mit ihrer Einkommens- oder Gewinn- und Verlustdeklaration die

      Referenzen der Bankkonten angeben, die im Laufe des von der Deklara-

      tion betroffenen Jahres im Ausland eröffnet, genutzt oder geschlossen wur-

      den. Die Deklaration beziehe sich auf alle Konten, die im Ausland von der

      Steuerpflichtigen als Inhaberin oder Zeichnungsbevollmächtigte eröffnet,

      geschlossen oder genutzt werden, wenn die Steuerpflichtige dabei für sich

      selbst oder für eine Person mit Wohnsitz im Ausland handle. Ebenso

      müsse sie ihr gesamtes Einkommen aus französischen und ausländischen

      Quellen sowie ihr gesamtes Vermögen in Frankreich und im Ausland an-

      geben.

      Trotz einer im Rahmen der Steuerprüfung ergangenen Anfrage durch die

      französische Steuerbehörde, habe die Steuerpflichtige keinerlei Informati-

      onen zu den «revenus générés par ce compte» sowie zur Höhe des Gut-

      habens per 1. Januar der überprüften Steuerperiode eingereicht.

      Die Steuerpflichtige habe im Rahmen der Steuerprüfung die Möglichkeit,

      Auszüge von Finanzkonten aller Art sowie von Girokonten, die von ihr und

      den Mitgliedern ihres «foyer fiscal» für private Transaktionen während des

      überprüften Zeitraums genutzt wurden, einzureichen. Entscheidet sich die

      Steuerpflichtige gegen eine solche Mitwirkung, sieht sich die französische

      Steuerbehörde gezwungen, die Auszüge im Rahmen der internationalen

      Amtshilfe erhältlich zu machen. Im vorliegenden Fall habe die Steuerpflich-

      tige von der Möglichkeit der Einreichung der Kontoauszüge keinen Ge-

      brauch gemacht. Daher sei die französische Steuerbehörde verpflichtet,

      die entsprechenden Informationen über die internationale Amtshilfe zu er-

      langen.

      Das vorliegende Amtshilfeersuchen ziele somit darauf ab, Unterlagen zu

      erhalten, um die Höhe des Vermögens und der Einkünfte zu ermitteln, die

      der französischen Steuerbehörde möglicherweise nicht gemeldet worden

      seien. Zudem seien die erbetenen Auskünfte für die französische Steuer-

      behörde notwendig, um die Höhe von hinterzogenen Steuern festzustellen.'
  - number: A.c
    text: 'Die DGFP ersuchte für jedes der im Amtshilfeersuchen genannten

      Konten bei der Bank (vgl. Sachverhalt Bst. A.b hiervor) um die Erteilung

      folgender Auskünfte:

      (a) Veuillez communiquer:

      1. Les états de fortune au 1er janvier des années 2011 au 2019.

      2. Les relevés sur la période du 01/01/2011 au 31/12/2018, précisant les

      apports et les prélèvements enregistrés sur cette période ainsi que les

      gains financiers générés. Veuillez indiquer la date, le montant et la na-

      ture des revenus perçus (intérêts, dividendes, plus-values).

      3. La copie du formulaire A, I, S, T ou tout document analogue.

      4. En cas de clôture du compte, veuillez indiquer la date du transfert des

      avoirs ainsi que la banque, le compte de destination et le territoire con-

      cerné.

      (b) Veuillez indiquer les références des autres comptes bancaires dont le

      contribuable serait directement ou indirectement titulaire, quelles que

      soient les structures interposées, ou ayant-droit économique au sein

      de cette banque, ainsi que ceux pour lesquels il disposerait d’une pro-

      curation.

      (c) Veuillez communiquer les éléments demandés au point a) pour les

      comptes visés au point b).

      '
  - number: A.d
    text: 'Abschliessend erklärt die DGFP im Amtshilfeersuchen, dass sämtliche

      durch das vorliegenden Amtshilfeersuchen erhaltenen Auskünfte vertrau-

      lich behandelt und nur für solche Zwecke verwendet werden würden, die

      im dem Antrag zugrundeliegenden Abkommen genehmigt worden seien;

      dass das Amtshilfeersuchen mit dem diesem zugrundeliegenden Abkom-

      men vereinbar sei und auch mit den Rechtsvorschriften des ersuchenden

      Staates und der Verwaltungspraxis der ersuchenden Behörde überein-

      stimme; dass die erfragten Auskünfte nach den geltenden Rechtsvorschrif-

      ten und der Verwaltungspraxis von der ersuchenden Behörde ebenfalls er-

      langt werden könnten; dass die ersuchende Behörde alle in ihrem Hoheits-

      gebiet verfügbaren Mittel zur Beschaffung der ersuchten Informationen

      ausgeschöpft habe, mit Ausnahme derjenigen, die unverhältnismässige

      Schwierigkeiten verursachen würden.'
  - number: B.
    text: ''
  - number: B.a
    text: 'Am 17. Mai 2021 ersuchte die ESTV die Bank um Zustellung der er-

      suchten Informationen bzw. Dokumente. Zudem wurde die Bank ersucht,

      die betroffene Person sowie die Gesellschaften E._______ Limited,

      C._______ Limited, D._______ Limited, F._______ Limited und den

      G._______ Trust als beschwerdeberechtigte Personen über das laufende

      Amtshilfeverfahren zu informieren und aufzufordern, eine zur Zustellung

      bevollmächtigte Person in der Schweiz zu bezeichnen.'
  - number: B.b
    text: 'Die Bank kam der Editionsaufforderung fristgerecht nach und setzte

      die ESTV darüber in Kenntnis, dass sie die jeweiligen Kontoinhaber – zu

      welchen nebst dem G._______ Trust und den hiervor genannten Gesell-

      schaften auch die H._______ Limited und I._______ SARL gehören – über

      das laufende Amtshilfeverfahren informiert habe; mangels bestehender

      Kundenbeziehung und aktueller Kontaktdaten habe eine solche Informa-

      tion gegenüber der E._______ Limited nicht erfolgen können (vgl. act. 12).

      Weiter teilte die Bank mit, dass auch die betroffene Person nicht über das

      Seite 4

      Amtshilfeverfahren habe informiert werden können, da diese lediglich Be-

      günstigte des betroffenen Kontoinhabers sei. Diesfalls sei die Bank nicht

      befugt, die betroffene Person direkt zu kontaktieren (vgl. act. 13).'
  - number: B.c
    text: 'Am 18. Juni 2021 setzte die ESTV nach erfolgter Ermächtigung durch

      die ersuchende Behörde die betroffene Person über das Amtshilfeersu-

      chen in Kenntnis und ersuchte sie um Bekanntgabe einer Zustelladresse

      in der Schweiz, sofern sie sich am Amtshilfeverfahren in der Schweiz be-

      teiligen wolle.'
  - number: B.d
    text: 'Am 23. Juni 2021 zeigte die Rechtsvertreterin der Gesellschaften

      C._______ Limited, D._______ Limited, H._______ Limited, F._______ Li-

      mited, I._______ SARL und des G._______ Trust das Mandatsverhältnis

      an. Sie ersuchte um Akteneinsicht, welche von der ESTV gewährt wurde.'
  - number: B.e
    text: 'Am 2. Juli 2021 zeigten Rechtsanwältin Claudia Durgnat und Rechts-

      anwalt Marco S. Marty gegenüber der ESTV das Mandatsverhältnis zur

      betroffenen Person an und ersuchten gleichzeitig um Akteneinsicht. Diese

      wurde am 12. August 2021 gewährt und die betroffene Person zur Stel-

      lungnahme zur beabsichtigten Informationsübermittlung aufgefordert. Zu-

      dem wies die ESTV die betroffene Person auf die Möglichkeit des verein-

      fachten Verfahrens mittels Zustimmung zur Informationsübermittlung hin.'
  - number: B.f
    text: 'Am 3. Juli 2021 setzte die ESTV die E._______ Limited durch Veröf-

      fentlichung im Bundesblatt über das Amtshilfeersuchen in Kenntnis und

      setzte ihr eine Frist zur Bezeichnung einer zustellungsbevollmächtigten

      Person in der Schweiz. Die E._______ Limited kam dieser Aufforderung

      nicht nach.'
  - number: B.g
    text: 'Am 18. August 2021 übermittelten die C._______ Limited, die

      D._______ Limited, die F._______ Limited, die H._______ Limited, die

      I._______ SARL, die F._______ Limited sowie der G._______ Trust (nach-

      folgend gemeinsam: beschwerdeberechtigte Personen) der ESTV jeweils

      eine Zustimmungserklärung zur Informationsübermittlung im vereinfachten

      Verfahren.'
  - number: B.h
    text: 'Am 6. September 2021 reichte die betroffene Person eine Stellung-

      ahme zur beabsichtigten Beantwortung des Amtshilfeersuchens durch die

      ESTV ein.'
  - number: C.
    text: 'Mangels Zustimmung der betroffenen Person zum Informationsaustausch

      Seite 5

      erging am 1. Oktober 2021 die Schlussverfügung der ESTV gegenüber der

      betroffenen Person. Die ESTV kam darin nach erfolgter Prüfung des Ersu-

      chens und der Vorbringen in der Stellungnahme der betroffenen Person

      zum Schluss, dass der ersuchenden Behörde Amtshilfe zu leisten sei (Zif-

      fer 1 des Dispositivs).

      In Ziffer 2 des Dispositivs nannte die ESTV als Antwort auf die Frage a)

      des Amtshilfeersuchens (vgl. Sachverhalt Bst. A.c) die bei der Bank edier-

      ten Informationen und Dokumente betreffend die im Amtshilfeersuchen ge-

      nannten Bankkonten. Dabei nannte die ESTV zu jeder Kontobeziehung die

      Namen der Kontoinhaber und erklärte, dass die Beschwerdeführerin am

      jeweiligen Konto wirtschaftlich berechtigt sei («… dont [A._______] est une

      des ayants droit économiques»). […]. Auf die Fragen b) und c) des Amts-

      hilfeersuchens (vgl. Sachverhalt Bst. A.c) beabsichtigte die ESTV die fol-

      gende Erklärung zu übermitteln: «[A._______] n’entretenait pas d’autres

      relations bancaires auprès de la banque [B._______ Ltd.] en tant que titu-

      laire, ayant droit économique et/ou bénéficiaire d’une procuration ».

      In Ziffer 3 des Dispositivs wies die ESTV den Antrag der betroffenen Per-

      son auf Abweisung des Amtshilfeersuchens wie auch den Antrag auf Un-

      gültigerklärung der von den beschwerdeberechtigten Personen eingereich-

      ten Zustimmungserklärungen ab.

      In Ziffer 4 des Dispositivs verfügte die ESTV, sie werde die DGFP auf das

      Spezialitätsprinzip (Bst. a) sowie auf die Verpflichtung zur Geheimhaltung

      der Informationen (Bst. b) hinweisen.'
  - number: D.
    text: ''
  - number: D.a
    text: 'Am 1. November 2021 erhebt die betroffene Person (nachfolgend: Be-

      schwerdeführerin) gegen die Schlussverfügung der ESTV vom 1. Oktober

      2021 Beschwerde an das Bundesverwaltungsgericht. Die Beschwerdefüh-

      rerin beantragt, es sei dem Amtshilfeersuchen sie betreffend nicht nachzu-

      kommen (Ziff. 1); es sei der ESTV zu untersagen, der ersuchenden Be-

      hörde in der vorliegenden Angelegenheit irgendwelche Informationen und

      Akten auszuhändigen oder zu erteilen bzw. zugänglich zu machen, in de-

      nen sie (die Beschwerdeführerin) erwähnt oder aufgeführt werde (Ziff. 2);

      es seien die Zustimmungserklärungen der beschwerdeberechtigten Perso-

      nen zum vereinfachten Verfahren für ungültig zu erklären und nicht zu be-

      achten (Ziff. 3).

      Seite 6

      Eventualiter beantragt die Beschwerdeführerin, die ESTV sei anzuweisen,

      das Amtshilfeersuchen an die ersuchende Behörde zurückzuweisen und

      um folgende Erklärungen zu ersuchen (Ziff. 4):

      a) Begründung und Nennung von Anhaltspunkten, warum Frankreich da-

      von ausgehe, dass die Beschwerdeführerin nach ihrem Wegzug im

      Jahre [Jahr innerhalb des vom Amtshilfeersuchen umfassten Zeit-

      raums] weiterhin in Frankreich steuerpflichtig sei.

      b) Begründung, warum das Amtshilfeersuchen auf einen falschen Namen

      und eine falsche Adresse ausgestellt wurde.

      c) Begründung, wie sie [die französischen Steuerbehörden; Präzisierung

      durch das Bundesverwaltungsgericht] zu den Informationen über die

      Konti in der Schweiz gekommen sind, respektive eine Bestätigung,

      dass diese nicht durch nach schweizerischem Recht strafbare Hand-

      lungen erlangt wurden.

      Subeventualiter beantragt die Beschwerdeführerin, es sei die ESTV anzu-

      weisen, die folgenden Korrekturen in der geplanten Übermittlung an Frank-

      reich vorzunehmen (Ziff. 5):

      a) In jedem Absatz über die Kontobeziehungen sei die Bezeichnung «…

      dont [A._______] est une des ayants droit économiques» wegzulassen.

      b) In jedem Absatz über die Kontobeziehungen sei zu erwähnen:

      «[A._______] n’est ni titulaire, ni ayant droit économique, ni est-elle bé-

      néficiaire d’une procuration sur ce compte mentionné ».

      c) Die vom ersuchenden Staat gewünschten Daten seien zu übermitteln

      (Kontoauszüge, Kontostand und Formulare A und T), nicht jedoch die

      Liste der Begünstigten.

      Die Beschwerdeführerin beantragt zudem, die Kosten- und Entschädi-

      gungsfolgen seien der ESTV aufzuerlegen (Ziff. 6); eventualiter seien «der

      Beschwerdeführerin ihre Verfahrenskosten (zz. MwSt) zu Lasten der

      Staatskasse zu nehmen» (Ziff. 7).'
  - number: D.b
    text: 'In ihrer Vernehmlassung vom 10. Januar 2022 beantragt die ESTV

      (nachfolgend: Vorinstanz) die kostenpflichtige Abweisung der Beschwerde.'
  - number: D.c
    text: Die Beschwerdeführerin reicht am 8. Februar 2022 ihre Replik ein.
  - number: D.d
    text: 'Mit Eingabe vom 25. Februar 2022 verzichtet die Vorinstanz auf eine

      weitere Stellungnahme und verweist auf die Ausführungen in ihrer Ver-

      nehmlassung vom 10. Januar 2022.

      Auf die detaillierten Vorbringen der Verfahrensbeteiligten und die einge-

      reichten Unterlagen wird – sofern sie für den Entscheid wesentlich sind –

      in den Erwägungen näher eingegangen.'
