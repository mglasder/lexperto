meta: null
content:
- name: entscheid
  content:
  - number: '1.'
    text: Die Beschwerde wird abgewiesen.
  - number: '2.'
    text: Die Verfahrenskosten von Fr. 5'000.- werden der Beschwerdeführerin auferlegt.
      Der in gleicher Höhe geleistete Kostenvorschuss wird für die Be- zahlung der
      Verfahrenskosten verwendet.
  - number: '3.'
    text: Es wird keine Parteientschädigung zugesprochen.
  - number: '4.'
    text: Dieses Urteil geht an die Beschwerdeführerin und die Vorinstanz. Für die
      Rechtsmittelbelehrung wird auf die nächste Seite verwiesen.
- name: erwägungen
  content:
  - number: '1.'
    text: ''
  - number: '1.1'
    text: Das Bundesverwaltungsgericht ist zur Beurteilung von Beschwerden gegen Schlussverfügungen
      der ESTV im Bereich der internationalen Amtshilfe in Steuersachen zuständig
      (Art. 19 Abs. 1 und 5 des Bundesgesetzes vom 28. September 2012 über die internationale
      Amtshilfe in Steuersachen [StAhiG, SR 651.1] i.V.m. Art. 31 ff. des Bundesgesetzes
      vom 17. Juni 2005 über das Bundesverwaltungsgericht [VGG, SR 173.32]).
  - number: '1.2'
    text: Das Rechtsmittelverfahren vor dem Bundesverwaltungsgericht richtet sich
      nach dem Bundesgesetz vom 20. Dezember 1968 über das Verwaltungsverfahren (VwVG,
      SR 172.021), soweit das VGG nichts anderes bestimmt (Art. 37 VGG).
  - number: '1.3'
    text: Die Beschwerdeführerin ist zur Erhebung der Beschwerde legitimiert (Art.
      19 Abs. 2 StAhiG, Art. 48 Abs. 1 VwVG). Auf die frist- und formgerecht eingereichte
      Beschwerde ist einzutreten (Art. 50 Abs. 1 VwVG, Art. 52 Abs. 1 VwVG).
  - number: '2.'
    text: ''
  - number: '2.1'
    text: Mit Beschwerde an das Bundesverwaltungsgericht kann die Verletzung von Bundesrecht
      einschliesslich Überschreitung oder Missbrauch des Ermessens, die unrichtige
      oder unvollständige Feststellung des rechtserheblichen Sachverhaltes und die
      Unangemessenheit gerügt werden (Art. 49 VwVG).
  - number: '2.2'
    text: Das Bundesverwaltungsgericht wendet im Beschwerdeverfahren das Bundesrecht
      von Amtes wegen an. Es ist gemäss Art. 62 Abs. 4 VwVG nicht an die Begründung
      der Begehren gebunden und kann die Beschwerde auch aus anderen als den geltend
      gemachten Gründen gutheissen oder abweisen.
  - number: '3.'
    text: ''
  - number: '3.1'
    text: Landesrechtlich ist die internationale Amtshilfe in Steuersachen im Steueramtshilfegesetz
      geregelt, welches am 1. Februar 2013 in Kraft getreten ist. Abweichende Bestimmungen
      des im Einzelfall anwendbaren Abkommens bleiben vorbehalten (Art. 1 Abs. 2 StAhiG).
  - number: '3.2'
    text: 'Das Amtshilfeersuchen der DSCF stützt sich auf Art. 28 DBA CH-FR (in der
      hier anwendbaren Fassung gemäss Art. 7 des Zusatzabkommens vom 27. August 2009
      [AS 2010 5683; nachfolgend: Zusatzabkommen 2009]; Art. 11 Abs. 3 des Zusatzabkommens
      2009) und auf Ziff. XI des im DBA CH-FR integrierten Zusatzprotokolls in der
      Fassung gemäss Art. 1 der Vereinbarung vom 25. Juni 2014 über die Änderung des
      Zusatzprotokolls zum revidierten Abkommen zwischen der Schweiz und Frankreich
      vom 9. September 1966 zur Vermeidung der Doppelbesteuerung auf dem Gebiet der
      Steuern vom Einkommen und vom Vermögen und zur Vermeidung von Steuerbetrug und
      Steuerflucht (AS 2016 1195; nachfolgend: Vereinbarung 2014).'
  - number: '3.3'
    text: In den Übergangsbestimmungen sieht die Vereinbarung 2014 ihre Anwendung
      auf Informationsbegehren betreffend Kalender- oder Geschäftsjahre, die ab dem
      1. Januar 2010 beginnen, vor (Art. 2 Abs. 2 der Vereinbarung 2014). Im Sinne
      einer Ausnahme findet Art. 1 Abs. 1 der Vereinbarung 2014 Anwendung auf Informationsbegehren
      über Sachverhalte, welche Zeiträume ab dem 1. Februar 2013 betreffen (Art. 2
      Abs. 3 der Vereinbarung 2014). Gemäss dem Bundesgericht beschränkt Art. 2 Abs.
      3 der Vereinbarung 2014 jedoch die Anwendung von Ziff. XI Abs. 3 Bst. a des
      Zusatzprotokolls ausschliesslich für Gruppenersuchen auf Informationen betreffend
      Zeiträume ab dem 1. Februar 2013 (BGE 146 II 150 E. 5.5.2 ff.).
  - number: '3.4'
    text: ''
  - number: 3.4.1
    text: 'Gemäss Ziff. XI Abs. 3 des Zusatzprotokolls muss das Amtshilfegesuch folgende
      Informationen enthalten: die Identität der in eine Prüfung oder Untersuchung
      einbezogenen Person, wobei diese Information mittels Angabe des Namens der betreffenden
      Person oder weiterer Informationen, welche ihre Identifikation ermöglichen,
      geliefert werden kann (Bst. a), die Zeitperiode, für welche die Informationen
      verlangt werden (Bst. b), die Beschreibung der verlangten Informationen sowie
      Angaben hinsichtlich der Form, in der der ersuchende Staat diese Informationen
      vom ersuchten Staat zu erhalten wünscht (Bst. c), den Steuerzweck, für den die
      Informationen verlangt werden (Bst. d) und soweit bekannt, den Namen und die
      Adresse des mutmasslichen Inhabers der verlangten Informationen (Bst. e). Die
      Buchstaben a) – e) sind so auszulegen, dass sie einen wirksamen Informationsaustausch
      für die Anwendung von Artikel 28 DBA CH-FR nicht behindern.'
  - number: 3.4.2
    text: Nach Ziff. XI Abs. 1 des Zusatzprotokolls zum DBA CH-FR stellt die zuständige
      Behörde des ersuchenden Staates ein Amtshilfebegehren im Sinne von Art. 28 DBA
      CH-FR «erst dann, wenn alle in seinem innerstaatlichen Steuerverfahren vorgesehenen
      üblichen Mittel zur Beschaffung der Information ausgeschöpft sind» (sog. Subsidiaritätsprinzip;
      vgl. Art. 6 Abs. 2 Bst. g StAhiG).
  - number: '3.5'
    text: Gemäss Art. 28 Abs. 1 erster Satz DBA CH-FR tauschen die zuständigen Behörden
      der Vertragsstaaten die Informationen aus, die zur Durchführung dieses Abkommens
      oder zur Anwendung oder Durchsetzung des innerstaatlichen Rechts betreffend
      Steuern jeder Art und Bezeichnung, die für Rechnung der Vertragsstaaten oder
      ihrer politischen Unterabteilungen oder lokalen Körperschaften erhoben werden,
      voraussichtlich erheblich sind, soweit die diesem Recht entsprechende Besteuerung
      nicht dem Abkommen widerspricht.
  - number: '3.6'
    text: Der Verweis auf «voraussichtlich erhebliche» Informationen in Art. 28 Abs.
      1 DBA CH-FR soll einen möglichst breiten Informationsaustausch in Steuersachen
      gewährleisten, ohne dass die Vertragsstaaten eine «fishing expedition» durchführen
      oder Informationen verlangen können, deren Erheblichkeit für die Aufklärung
      der Steuerangelegenheiten bestimmter Steuerpflichtiger wenig wahrscheinlich
      ist (Ziff. XI 2. Abs. des Zusatzprotokolls). Die Voraussetzung der voraussichtlichen
      Erheblichkeit der beantragten Informationen gilt als erfüllt, wenn zum Zeitpunkt
      der Einreichung des Amtshilfegesuchs bei vernünftiger Betrachtung die Möglichkeit
      besteht, dass sich die Informationen als erheblich erweisen. Keine Rolle spielt,
      ob sich die Informationen nach ihrer Übermittelung als unerheblich herausstellen.
      Die Beurteilung der voraussichtlichen Erheblichkeit obliegt in erster Linie
      dem ersuchenden Staat. Der ersuchte Staat beschränkt sich auf die Prüfung, ob
      die verlangten Informationen mit dem im Ersuchen dargelegten Sachverhalt zusammenhängen
      und sich möglicherweise für die Verwendung im ausländischen Verfahren eignen
      (sog. Plausibilitätsprüfung) und er kann die Übermittlung von Informationen
      nur verweigern, wenn er sicher ist, dass sie für den ersuchenden Staat nicht
      sachdienlich sind (BGE 144 II 206 E. 4.3, 142 II 161 E. 2.1.1). Einem Amtshilfeersuchen
      fehlt es demnach an der voraussichtlichen Erheblichkeit, wenn es zur Beschaffung
      von Beweismitteln aufs Geratewohl und ohne konkreten Zusammenhang zum laufenden
      Steuerverfahren gestellt wird («fishing expedition»; BGE 146 II 150 E. 6.1.2).
      Das Verbot der «fishing expedition» entspricht dem Grundsatz der Verhältnismässigkeit
      (Art. 5 Abs. 2 BV), der zwingend einzuhalten ist (Urteil des BVGer A-1562/2018
      vom 3. August 2020 E. 2.4.2). Selbst ein nachgewiesener Wohnsitz ausserhalb
      des ersuchenden Staates würde nach der Rechtsprechung des Bundesgerichts grundsätzlich
      nicht ausreichen, um die voraussichtliche Erheblichkeit der zu übermittelnden
      Informationen zu verneinen, da der ersuchte Staat die Frage des steuerrechtlichen
      Wohnsitzes im Amtshilfeverfahren grundsätzlich nicht zu untersuchen hat (s.
      Urteil des BGer 2C_953/2020 vom 24. November 2021 E. 3.5 mit Hinweisen auf BGE
      142 II 161 und 142 II 218).
  - number: '3.7'
    text: Nach der bundesgerichtlichen Rechtsprechung sind sämtliche von den Informationsinhaberinnen
      erhaltenen Bankunterlagen grundsätzlich zu den erbetenen Informationen zu zählen.
      Die Verwendung des Ausdrucks "held by" in einem Amtshilfeersuchen impliziert
      nicht, dass das Ersuchen sich auf die direkt gehaltenen Bankkonten beschränken
      würde. Insbesondere nicht, wenn die ersuchende Behörde ausdrücklich betont,
      dass sie Informationen über die von ihr identifizierten Bankkonten anfordere
      und ausdrücklich darauf hinweist, dass ihr Ersuchen nicht auf diese Konten beschränkt
      ist (BGE 147 II 116 E. 5.3.1 ff. sowie Urteil des BVGer A-4426/2019 vom 28.
      Oktober 2020 E. 4.6.3). Selbst die Details zu den Konten, an welchen die betroffene
      Person gemäss den edierten Unterlagen (nur) wirtschaftlich berechtigt ist, die
      sie selber aber nicht direkt hält, sind nach der bundesgerichtlichen Rechtsprechung
      als erfragt zu betrachten (BGE 147 II 116 E. 5.3.1 ff.).
  - number: '3.8'
    text: Nach Art. 28 Abs. 2 DBA CH-FR sind alle Informationen, die ein Vertragsstaat
      nach Absatz 1 erhalten hat, ebenso geheim zu halten wie die aufgrund des innerstaatlichen
      Rechts dieses Staates beschafften Informationen und dürfen nur den Personen
      oder Behörden (einschliesslich der Gerichte und der Verwaltungsbehörden) zugänglich
      gemacht werden, die mit der Veranlagung oder der Erhebung, mit der Vollstreckung
      oder der Strafverfolgung oder mit der Entscheidung von Rechtsmitteln hinsichtlich
      der in Absatz 1 genannten Steuern oder mit der Aufsicht darüber befasst sind.
      Diese Personen oder Behörden dürfen die Informationen nur für diese Zwecke verwenden
      (sog. Spezialitätsprinzip, vgl. BGE 147 II 13 E. 3.4). Sie dürfen die Informationen
      in einem öffentlichen Gerichtsverfahren oder in einer Gerichtsentscheidung offenlegen.
      Ungeachtet der vorstehenden Bestimmungen kann ein Vertragsstaat die erhaltenen
      Informationen für andere Zwecke verwenden, wenn solche Informationen nach dem
      Recht beider Staaten für solche andere Zwecke verwendet werden dürfen und die
      zuständige Behörde des ersuchten Staates dieser anderen Verwendung zustimmt.
  - number: '3.9'
    text: Der Grundsatz von Treu und Glauben (Art. 26 des Wiener Übereinkommens vom
      23. Mai 1969 über das Recht der Verträge [VRK, SR 0.111]) führt im Rahmen der
      Amtshilfe in Steuersachen dazu, dass der ersuchte Staat grundsätzlich an die
      Angaben des ersuchenden Staates gebunden ist, soweit diese nicht aufgrund von
      Fehlern, Lücken oder offensichtlichen Widersprüchen sofort entkräftet werden
      können (BGE 144 II 206 E. 4.4, 142 II 218 E. 3.3; Urteil des BVGer A-1562/2018
      vom 3. August 2020 E. 2.5). Auf diesem Vertrauen gründet letztlich das ganze
      Amtshilfeverfahren (vgl. statt vieler Urteil des BVGer A-4192/2020, A-4194/2020,
      A-4196/2020 vom 25. März 2021 E. 2.5.1). Das völkerrechtliche Vertrauensprinzip
      spielt auch eine Rolle in Bezug auf das Spezialitätsprinzip. Gestützt auf das
      Vertrauensprinzip kann grundsätzlich als selbstverständlich vorausgesetzt werden,
      dass der Spezialitätsgrundsatz durch Staaten eingehalten wird, die mit der Schweiz
      durch einen Amts- oder Rechtshilfevertrag verbunden sind, ohne dass die Einholung
      einer ausdrücklichen Zusicherung notwendig wäre (vgl. BGE 128 II 407 E. 3.2
      und 4.3.1, 115 Ib 373 E. 8, 107 Ib 264 E. 4b). Folglich ist die Wahrung des
      Grundsatzes erst bei konkreten Anhaltspunkten auf eine zweckwidrige Verwendung
      im ersuchenden Staat zu überprüfen bzw. eine entsprechende Zusicherung einzuholen
      (vgl. BGE 146 II 150 E. 7.3, 128 II 407 E. 3.2; BVGE 2018 III/1 E. 2.9.1).
  - number: '3.10'
    text: Die Anonymisierung von Urteilen im Bereich der internationalen Amtshilfe
      in Steuersachen entspricht der geltenden Praxis des Bundesverwaltungsgerichts
      (siehe Art. 8 Abs. 1 des Informationsreglements für das Bundesverwaltungsgericht
      vom 21. Februar 2008 [SR 173.320.4]).
  - number: '4.'
    text: ''
  - number: '4.1'
    text: Im vorliegenden Fall ist vorwegzunehmen, dass das Ersuchen der DSCF konkrete
      Fragen beinhaltet, die sich auf eine identifizierte (betroffene) Person im Rahmen
      einer im ersuchenden Staat laufenden Untersuchung beziehen, weshalb das zu beurteilenden
      Amtshilfeersuchen der DSCF die formellen Voraussetzungen gemäss Ziff. XI Abs.
      3 des Zusatzprotokolls erfüllt (E. 3.4.1). Ziff. XI Abs. 3 des Zusatzprotokolls
      setzt gerade nicht voraus, dass das Amtshilfeersuchen über die Herkunft der
      Daten Angaben beinhalten müsste (vgl. E. 3.4.1). Das Ersuchen erweist sich damit
      als hinreichend konkret.
  - number: '4.2'
    text: ''
  - number: 4.2.1
    text: Es ist grundsätzlich Sache des ersuchenden Staats zu bestimmen, welche Informationen
      für die Besteuerung voraussichtlich erheblich sind (vgl. E. 3.6). Die DSCF möchte
      mit den Ersuchen überprüfen, ob die betroffene Person den steuerlichen Deklarationspflichten
      nachgekommen ist («l'administration fiscale française procède à la vérification
      des obligations déclaratives»). Denn die DSCF hegt die Vermutung, dass die betroffene
      Person das ausländische Konto nicht deklariert hat («l'examen des déclarations
      de revenus souscrites par […] au titre des années 2011 à 2020 démontre qu'ils
      n'ont pas coché la case afférente à la détention d'un compte à l'étranger»).
      Die DSCF hat umfassende Auskünfte über sämtliche Bankverbindungen erbeten, zu
      welchen die betroffene Person in Verbindung steht («Les références des autres
      comptes bancaires dont le contribuable serait directement ou indirectement titulaire»).
      Damit gehören in casu in Übereinstimmung mit der bundesgerichtlichen Rechtsprechung
      grundsätzlich sämtliche von der Informationsinhaberin erhaltenen Bankunterlagen
      zu den erbetenen Informationen (vgl. E. 3.7; s. auch das Urteil des BVGer A-4426/2019
      vom 28. Oktober 2020 E. 4.6.3). Dies gilt auch für das von der Beschwerdeführerin
      als Inhaberin gehaltene Konto, an welchem die betroffene Person bevollmächtigt
      ist.
  - number: 4.2.2
    text: Sämtliche von der DSCF im Zusammenhang mit der Besteuerung der betroffenen
      Person ersuchten Informationen erscheinen vorliegend auch grundsätzlich als
      geeignet, die Einkommensbesteuerung und damit die Steuersituation der betroffenen
      Person in Frankreich zu beeinflussen. Der in dem Ersuchen genannte Sachverhalt
      hängt überdies mit den verlangten Informationen sowie den ersuchten Dokumenten
      rechtsgenügend zusammen. Die ersuchten Informationen sind demnach dazu geeignet,
      im ausländischen Steuerverfahren gegen die betroffene Person verwendet zu werden.
      Dies gilt selbstredend auch für ein bereits im Jahr 2014 saldiertes Konto.
  - number: 4.2.3
    text: Der blosse Umstand, dass die Beschwerdeführerin nicht weiss, woher die französische
      Steuerbehörde Kenntnis über das Konto der betroffenen Person bei der Bank erlangt
      hat, lässt keinen Schluss auf ein rechtswidriges oder gegen Treu und Glauben
      verstossendes Verhalten der ersuchenden Behörde zu. Die unsubstantiierten Behauptungen
      der Beschwerdeführerin zur unklaren Herkunft der Daten vermögen keine ernsthaften
      Zweifel zu wecken. Eine Rückfrage an die ersuchende Behörde oder gar ein Abweichen
      vom völkerrechtlichen Vertrauensprinzips ist nicht angebracht (vgl. E. 3.9).
      Damit ist in casu – in Übereinstimmung mit den Erwägungen in der Schlussverfügung
      der Vorinstanz – die voraussichtliche Erheblichkeit von grundsätzlich sämtlichen
      zur Übermittlung vorgesehenen Informationen gegeben.
  - number: 4.2.4
    text: 'Wie die Beschwerdeführerin richtigerweise festhält, ist sie nicht die formell
      betroffene Person des Amtshilfeverfahrens. Bei ihr handelt es sich aber um eine
      Drittperson, deren Namen nicht rein zufällig in den verlangten Dokumenten auftaucht
      (vgl. zu «fruit d’un pur hasard»: Urteil des BGer 2C_287/2019 vom 13. Juli 2020
      E. 5). Denn sie ist Inhaberin des fraglichen Kontos, an dem die betroffene Person,
      ihr Ehemann, eine Vollmacht hat. Es findet damit auch keine «Ausweitung» des
      Ersuchens statt, wie die Beschwerdeführerin fälschlicherweise vorbringt.'
  - number: '4.3'
    text: Sodann besteht mit Blick auf das völkerrechtliche Vertrauensprinzip (vgl.
      E. 3.9) hier kein Anlass, an der in dem Ersuchen enthaltenen Erklärung, dass
      grundsätzlich alle in Frankreich verfügbaren Mittel zur Informationsbeschaffung
      genutzt wurden («elle a utilisé tous les moyens disponibles sur son propre territoire
      pour obtenir les renseignements, excepté ceux qui donneraient lieu à des difficultés
      disproportionnées»), zu zweifeln. Die Beschwerdeführerin hat nämlich keine konkreten
      Anhaltspunkte für eine fehlende Ausschöpfung aller üblichen, in Frankreich den
      Steuerbehörden zur Verfügung stehenden Mittel der Informationsbeschaffung dargetan
      und vermag keine ernsthaften Zweifel an der Richtigkeit der erwähnten, im Ersuchen
      abgegebenen Erklärung der DSCF zu wecken. Zumal das Subsidiaritätsprinzip nicht
      verlangt, dass alle verfügbaren, sondern bloss die üblichen Mittel ausgeschöpft
      werden (E. 3.4.2). Dem Amtshilfeersuchen ist zu entnehmen, dass die betroffene
      Person entgegen ihrer Verpflichtung ausländische Bankkonten nicht deklariert
      hat. Geht wie im vorliegenden Fall die ersuchende Behörde davon aus, dass die
      betroffene Person über solche Konten verfügt, muss es ihr möglich sein, ein
      entsprechendes Amtshilfebegehren an jenen Staat zu richten, in welchem das nicht
      deklarierte Vermögen vermutet wird. Der Umstand, dass die betroffene Person
      bereits über ein sehr fortgeschrittenes Alter verfügt, kann daran grundsätzlich
      nichts ändern. Von der Vermutung, dass der ersuchende Staat seinen vertraglichen
      Verpflichtungen nachkam und die üblichen der Steuerbehörden zur Verfügung stehenden
      Mittel – wie zugesichert – ausgeschöpft hat, ist in casu angesichts der von
      der Beschwerdeführerin vorgebrachten Argumente sowie Behauptungen (es liege
      eine «Unzulässigkeit des französischen Amtshilfegesuchens aufgrund nicht ausgeschöpfter
      Mittel» vor) nicht abzurücken. In den Vorbringen der Beschwerdeführerin kann
      kein rechtsgenügender Grund erblickt werden, wonach die im Zusammenhang mit
      dem Ersuchen von der ESTV beabsichtigte Amtshilfe gestützt auf das Subsidiaritätsprinzip
      zu verweigern wäre.
  - number: '4.4'
    text: Schliesslich entspricht die Anonymisierung von Urteilen im Bereich der internationalen
      Amtshilfe in Steuersachen der Praxis des Bundesverwaltungsgerichts, weshalb
      das vorliegende Urteil entsprechend in anonymisierter Form aufzulegen und auf
      der Internetseite des Bundesverwaltungsgerichts zu publizieren sein wird (E.
      3.10). Die diesbezüglichen Ausführungen der Beschwerdeführerin erweisen sich
      insoweit als gegenstandslos.
  - number: '4.5'
    text: Weitere Gründe, welche der Gewährung der Amtshilfe entgegenstehen könnten,
      sind nicht ersichtlich.
  - number: '5.'
    text: Nach dem Gesagten sind die Voraussetzungen für die in der Schlussverfügung
      vom 23. September 2021 vorgesehene Amtshilfeleistung erfüllt. Die Beschwerde
      ist abzuweisen.
  - number: '6.'
    text: ''
  - number: '6.1'
    text: Bei diesem Ausgang des Verfahrens hat die Beschwerdeführerin die auf Fr.
      5'000.- festzusetzenden Verfahrenskosten zu tragen (Art. 63 Abs. 1 VwVG und
      Art. 2 Abs. 1 in Verbindung mit Art. 4 des Reglements vom 21. Februar 2008 über
      die Kosten und Entschädigungen vor dem Bundesverwaltungsgericht [VGKE, SR 173.320.2]).
      Der in gleicher Höhe einbezahlte Kostenvorschuss ist zur Bezahlung der Verfahrenskosten
      zu verwenden.
  - number: '6.2'
    text: Der unterliegenden Beschwerdeführerin ist keine Parteientschädigung zuzusprechen
      (Art. 64 Abs. 1 VwVG e contrario und Art. 7 Abs. 1 VGKE e contrario).
- name: sachverhalt
  content:
  - number: A.
    text: 'Mit dem Schreiben vom 8. Juni 2021 stellte die französische Steuerbe-

      hörde, die Direction spécialisée de contrôle fiscal Est (nachfolgend: DSCF

      oder ersuchende Behörde), gestützt auf Art. 28 des Abkommens vom

      9. September 1966 zwischen der Schweiz und Frankreich zur Vermeidung

      der Doppelbesteuerung auf dem Gebiet der Steuern vom Einkommen und

      vom Vermögen und zur Vermeidung von Steuerbetrug und Steuerflucht

      (DBA CH-FR, SR 0.672.934.91) ein Amtshilfeersuchen an die Eidgenössi-

      che Steuerverwaltung (nachfolgend: ESTV oder Vorinstanz).'
  - number: B.
    text: "Als vom Ersuchen betroffene Person nannte die ersuchende Behörde\nA._______\
      \ (nachfolgend: betroffene Person). Als Informations-\ninhaberin in der Schweiz\
      \ wurde die B._______ AG (heute: […]; nachfol-\ngend: Bank) genannt. Die Informationen\
      \ würden für die Erhebung der fran-\nzösischen Einkommenssteuer (\x171contr\0\
      f4le et recouvrement des imp\0f4ts\x187) f\0fcr\ndie Steuerjahre 2011 bis 2020\
      \ ben\0f6tigt."
  - number: C.
    text: "Die DSCF ersuchte die ESTV f\0fcr das im Ersuchen aufgef\0fchrte Konto\
      \ im\nWesentlichen um die \0dcbermittlung der folgenden Informationen f\0fcr\
      \ den\nZeitraum vom 1. Januar 2011 bis 31. Dezember 2020:\na)\n- Les \0e9tats\
      \ de fortune au 1er janvier des ann\0e9es 2011 \0e0 2020;\n- Les relev\0e9s\
      \ sur la p\0e9riode du 01/01/2011 au 31/12/2020, pr\0e9cisant les\napports et\
