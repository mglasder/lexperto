      - Anträge auf Aufhebung der Schlussverfügung und Verweigerung der Amtshilfe
      - Anträge auf Rückweisung zur Nachholung der Zustellungsnachweise und Anpassung
        der Dokumente
      - Anträge auf Schwärzung und Anpassung spezifischer Informationen und Annexunterlagen
      - Begründung der fehlenden steuerlichen Ansässigkeit im relevanten Zeitraum
      - Darlegung des fehlenden wirtschaftlichen Zentrums in Frankreich
      - Bestreitung des Erhalts einer Aufforderung zur Offenlegung der Kontoinformationen
      - Behauptung der unzulässigen spontanen Amtshilfe
      - Infragestellung der Relevanz der Angaben zu Zahlungsempfängern für die französischen
        Steuerbehörden
  - number: F.
    text: Am 4. Januar 2024 reicht die Vorinstanz die amtlichen Akten ein und verzichtet
      auf eine Vernehmlassung. Sie verweist vollumfänglich auf ihre Schlussverfügung.
      Auf die Vorgehen der Parteien sowie die Akten wird „sofern sie für den Entscheid
      wesentlich sind“ in den Erwägungen näher eingegangen.
    subparagraphs: []
