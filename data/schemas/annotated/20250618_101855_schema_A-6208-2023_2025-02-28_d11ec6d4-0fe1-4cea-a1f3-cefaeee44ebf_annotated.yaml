      - Anordnung der Leistung der ersuchten Amtshilfe
      - Bestimmung der zu übermittelnden Informationen zu Bankkonten und Kreditkarten
      - Hinweis an die ersuchende Behörde zur Verwendungsbeschränkung der übermittelten
        Informationen
  - number: E.
    text: ''
    subparagraphs:
    - number: E.a
      text: 'Am 10. November 2023 erhob die betroffene Person (nachfolgend auch: Beschwerdeführer)
        gegen die Schlussverfügung der ESTV vom 11. Oktober 2023 Beschwerde an das
        Bundesverwaltungsgericht mit folgenden Anträgen:

        1. Es sei die Schlussverfügung der ESTV vom 11. Oktober 2023 aufzuheben und
        es sei keine Amtshilfe zu leisten.

        2. Subeventualiter sei die Sache an die ESTV zur Einholung des Nachweises
        der Zustellung sowie Vornahme der gesetzeskonformen Anpassungen und Schwärzung
        zurückzuweisen.

        3. Sub-Subeventualiter seien die Informationen und die Annex 1 bis 4 wie folgt
        zu schwärzen bzw. anzupassen und erst in revidierter Form oder gar nicht auszutauschen:

        Antwort auf Frage a) hat wie folgt zu lauten:

        "Selon les informations fournies par la banque B._______, Monsieur A._______
        est titulaire et ayant droit économique du compte (Kontonummer) ouvert Ie
        (Datum). Veuillez trouver, en annexe 1, les états de fortune et les relevés
        de ledit compte et en annexe 2 le formulaire A. Ledit compte n''a pas été
        clos pendant la période concerné."

        Streichung von:

        Aussi, Monsieur A._______ est titulaire de 4 cartes de crédit auprès C._______,
        liés à la relation bancaire (Kontonummer) susmentionné, avec ces identifications:

        VISA Gold n. (Kontonummer)

        MC Gold n. (Kontonummer)

        VISA Cl n. (Kontonummer)

        MC Cl n. (Kontonummer)

        Veuillez trouver, en annexe 3, les relevés de compte desdites cartes de crédit
        et en annexe 4 les relatifs formulaires d''ouverture.

        Annex 1

        Schwärzung der Überweisungen betreffend folgende Personen:

        D._______ (S. 8, S. 91, S. 124, S. 148, S. 149, S. 229, S. 242);

        E._______ (S. 244);

        Maître F._______ (S. 73, S. 82, S. 92),

        Maître G._______ (S. 73, S. 92),

        Maître H._______ (S. 73, S. 197, S. 243),

        I._______ (S. 73, S. 92).

        Annex 3

        Annex 3 ist nicht auszutauschen.

        Annex 4

        Annex 4 ist nicht auszutauschen.

        4. Alles unter Kosten- und Entschädigungsfolgen zulasten des Bundes.'
      subparagraphs: []
      annotation:
        title: Darlegung der Beschwerdeanträge gegen die Schlussverfügung der ESTV
        description:
        - Antrag auf Aufhebung der Schlussverfügung der ESTV vom 11. Oktober 2023
        - Antrag auf Verweigerung der Amtshilfe
        - Antrag auf Rückweisung zur Einholung des Zustellungsnachweises und gesetzeskonformer
          Anpassungen sowie Schwärzungen
        - Antrag auf Schwärzung und Anpassung spezifischer Informationen und Annexdokumente
        - Antrag auf Kosten- und Entschädigungsfolgen zulasten des Bundes
    - number: E.b
      text: Zur Begründung bringt der Beschwerdeführer insbesondere vor, er habe in
        den Jahren 2018 bis 2021 in (ö) (Überseegebiet des Vereinigten Königreichs)
        gelebt. Er habe in diesen Jahren über keine relevante Wohnstätte in Frankreich
        verfügt. Das Zentrum seiner wirtschaftlichen Interessen habe sich in den Jahren
        2018 bis 2021 nicht in Frankreich befunden. Entgegen der Behauptung im Ersuchen
        habe er nie eine Aufforderung der französischen Steuerverwaltung erhalten,
        Informationen zum Konto Nr. (Kontonummer) offenzulegen. Weil keine Ansässigkeit
        bestehe, komme das Amtshilfeersuchen einer „abfishing expedition“ gleich.
        Im Übrigen sei nach den Kreditkartenabrechnungen und Eröffnungsunterlagen
        gar nicht gefragt worden. Insofern liege eine unzulässige spontane Amtshilfe
        vor. Es sei zudem nicht ersichtlich, inwiefern Angaben über die Identität
        von Zahlungsempfängern für die französischen Steuerbehörden relevant sein
        könnten.
      subparagraphs: []
      annotation:
        title: Vorbringen zur Wohnsitz- und Wirtschaftssitzfrage sowie zur Zulässigkeit
          des Amtshilfeersuchens
        description:
        - Behauptung des fehlenden Wohnsitzes in Frankreich in den Jahren 2018 bis
          2021
        - Behauptung des fehlenden Zentrums der wirtschaftlichen Interessen in Frankreich
          in den Jahren 2018 bis 2021
        - Bestreitung des Erhalts einer Aufforderung zur Offenlegung von Kontoinformationen
          durch die französische Steuerverwaltung
        - Behauptung der Unzulässigkeit des Amtshilfeersuchens als „abfishing expedition“
          mangels Ansässigkeit
        - Behauptung der unzulässigen spontanen Amtshilfe aufgrund fehlender Nachfrage
          zu Kreditkartenabrechnungen und Eröffnungsunterlagen
        - Infragestellung der Relevanz von Angaben zur Identität von Zahlungsempfängern
          für die französischen Steuerbehörden
    annotation:
      title: Darlegung der Beschwerdeanträge und Begründung der Beschwerdeführers
        zur Amtshilfe
      description:
      - Einreichung der Beschwerde gegen die Schlussverfügung der Eidgenössischen
