  - number: D.
    text: Die ESTV erliess am 11. Oktober 2023 eine Schlussverfügung. Sie verfügte
      die Leistung der ersuchten Amtshilfe (Dispo.-Ziff. 1). Sie übermittle die Informationen
      zum Bankkonto bei der Bank 1 sowie Informationen zu vier Kreditkarten bei der
      Bank 2 (Dispo.-Ziff. 2). Die ESTV werde die ersuchende Behörde darauf hinweisen,
      dass die genannten Informationen im ersuchenden Staat nur in Verfahren gegen
      die betroffene Person verwendet werden dürften (Dispo.-Ziff. 3).
    subparagraphs: []
    annotation:
      title: Verfügung der Amtshilfe durch die Eidgenössische Steuerverwaltung
      description:
