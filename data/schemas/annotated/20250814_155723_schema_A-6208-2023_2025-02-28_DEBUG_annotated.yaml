meta: null
content:
- name: entscheid
  content:
  - number: '1.'
    text: Die Beschwerde wird abgewiesen
    subparagraphs: []
    annotation:
      title: Entscheidung über die Beschwerde
      description:
      - Feststellung der Entscheidung über das mit der Beschwerde verfolgte Rechtsbegehren
      - Bestimmung der prozessualen Rechtsfolge und damit der Beendigung des Verfahrens
        durch die dispositive Entscheidung
  is_structured: true
- name: erwägungen
  content:
  - number: '1.'
    text: ''
    subparagraphs:
    - number: '1.1'
      text: "Dem vorliegenden Verfahren liegt ein Amtshilfeersuchen der ersuchenden\
        \ franz\x0246sischen Steuerbeh\x0246rde vom 19. April 2023 gest\x025Ctzt auf\
        \ Art. 28 des DBA CH-FR zugrunde. Die Durchf\x025Chrung dieser Abkommensbestimmung\
        \ richtet sich \x0253 unter Vorbehalt abweichender Regelungen im DBA CH-FR\
        \ \x0253 nach dem Bundesgesetz vom 28. September 2012 \x0253ber die internationale\
        \ Amtshilfe in Steuersachen (StAhiG, SR 651.1; vgl. Art. 1 Abs. 1 und 2 sowie\
        \ Art. 24 StAhiG e contrario)."
      subparagraphs: []
      annotation:
        title: Anwendbares Recht für die Durchführung des Amtshilfeersuchens nach
          Artikel 28 des Doppelbesteuerungsabkommens Schweiz–Frankreich
        description:
        - Vorliegen und Herkunft des Amtshilfeersuchens (ersuchende französische Steuerbehörde,
          Datum des Ersuchens 19. April 2023)
        - Rechtsgrundlage des Ersuchens im Abkommen (Artikel 28 des Doppelbesteuerungsabkommens
          Schweiz–Frankreich)
        - Anwendbares schweizerisches Verfahrensrecht für die Durchführung des Ersuchens
          (Bundesgesetz vom 28. September 2012 über die internationale Amtshilfe in
          Steuersachen)
        - Beziehung zwischen Abkommensrecht und StAhiG (Anwendung des StAhiG vorbehaltlich
          abweichender Regelungen im Abkommen)
        - Relevanz der zitierten StAhiG-Bestimmungen für die Anwendbarkeit des StAhiG
          (Artikel 1 Absatz 1 und 2 sowie Artikel 24 des StAhiG)
    annotation:
      title: Anwendbares Verfahrensrecht für ein Amtshilfeersuchen nach Artikel 28
        des Doppelbesteuerungsabkommens zwischen der Schweiz und Frankreich
      description:
      - Vorliegen eines Amtshilfeersuchens der französischen Steuerbehörde vom 19.
        April 2023
      - 'Rechtsgrundlage des Ersuchens: Artikel 28 des Doppelbesteuerungsabkommens
        zwischen der Schweiz und Frankreich'
      - Geltung des Bundesgesetzes vom 28. September 2012 über die internationale
        Amtshilfe in Steuersachen für die Durchführung der Amtshilfe, vorbehaltlich
        abweichender Regelungen im Doppelbesteuerungsabkommen (Artikel 1 Absatz 1
        und 2 sowie Artikel 24)
  is_structured: true
- name: sachverhalt
  content:
  - number: A.
    text: ''
    subparagraphs:
    - number: A.a
      text: 'Am (Datum) richtete die französische Steuerbehörde, die Direction Nationale
        des Vérifications de Situations Fiscales (nachfolgend: ersuchende Behörde)
        betreffend A._______ (nachfolgend: betroffene Person) gestützt auf Art. 28
        des Abkommens vom 9. September 1966 zwischen der Schweiz und Frankreich zur
        Vermeidung der Doppelbesteuerung auf dem Gebiet der Steuern vom Einkommen
        und vom Vermögen und zur Vermeidung von Steuerbetrug und Steuerflucht (SR
        0.672.934.91, DBA CH-FR) ein Amtshilfeersuchen an die Eidgenössische Steuerverwaltung
        (ESTV; nachfolgend auch: Vorinstanz).'
      subparagraphs: []
      annotation:
        title: Amtshilfeersuchen der französischen Steuerbehörde gestützt auf Art.
          28 des Abkommens Schweiz–Frankreich betreffend eine betroffene Person
        description:
        - Abgabe des Amtshilfeersuchens durch die Direction Nationale des Vérifications
          de Situations Fiscales als ersuchende französische Steuerbehörde
        - 'Rechtsgrundlage des Ersuchens: Art. 28 des Abkommens vom 9. September 1966
          zwischen der Schweiz und Frankreich zur Vermeidung der Doppelbesteuerung
          und zur Vermeidung von Steuerbetrug und Steuerflucht'
        - 'Betroffene Person: Identität und Rolle von A._______ im Ersuchen'
        - 'Empfänger und Zuständigkeit: Eingang des Ersuchens bei der Eidgenössischen
          Steuerverwaltung als zuständige schweizerische Behörde'
        - Zeitpunkt des Ersuchens (Datum) und dessen Relevanz für das Verfahren
    annotation:
      title: Amtshilfeersuchen der französischen Steuerbehörde an die Eidgenössische
        Steuerverwaltung gestützt auf Art. 28 des Doppelbesteuerungsabkommens Schweiz–Frankreich
      description:
      - Identität und Rechtsstellung der ersuchenden Behörde (Direction Nationale
        des Vérifications de Situations Fiscales)
      - Identität und Zuständigkeit der empfangenden Behörde (Eidgenössische Steuerverwaltung)
      - Rechtsgrundlage des Ersuchens (Art. 28 des Abkommens vom 9. September 1966
        zwischen der Schweiz und Frankreich zur Vermeidung der Doppelbesteuerung und
        zur Vermeidung von Steuerbetrug und Steuerflucht)
      - Betroffene Person des Ersuchens (A._______) als Gegenstand der Amtshilfe
      - Gegenstand und Zweck der Amtshilfe (Steuern vom Einkommen und vom Vermögen
        sowie Verhinderung von Steuerbetrug und Steuerflucht)
      - Zeitlicher Anknüpfungspunkt des Ersuchens (Datum des Eingangs des Amtshilfeersuchens)
  is_structured: true
