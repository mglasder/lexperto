        - Relevanz von Art. 7 Abs. 1 des Verwaltungsgerichtsgesetzes des Kantons E
          für den Ausschluss von Parteientschädigungen
        - Bedeutung von Art. 7 Abs. 3 des Verwaltungsgerichtsgesetzes des Kantons
          E für die Nichtzusprechung von Parteientschädigungen
    annotation:
