      description:
      - Zuständigkeit und Verpflichtung der unterliegenden Parteien zur Tragung der
        Verfahrenskosten
      - Festlegung der Höhe der Verfahrenskosten für das vereinigte Verfahren
      - Verwendung der einbezahlten Kostenvorschüsse zur Deckung der Verfahrenskosten
      - Entscheidung über den Anspruch auf Parteientschädigungen
  - number: '6.'
    text: "Dieser Entscheid auf dem Gebiet der internationalen Amtshilfe in Steuersachen\
      \ kann gem\x022 Art. 83 Bst. h des Bundesgerichtsgesetzes vom 17. Juni 2005\
      \ (BGG, SR 173.110) innerhalb von 10 Tagen nur dann mit Beschwerde in \x024ffentlich-rechtlichen\
      \ Angelegenheiten an das Bundesgericht weitergezogen werden, wenn sich eine\
      \ Rechtsfrage von grunds\x022tzlicher Bedeutung stellt oder wenn es sich aus\
      \ anderen Gr\x025cnden um einen besonders bedeutenden Fall im Sinne von Art.\
      \ 84 Abs. 2 BGG handelt (Art. 84a und Art. 100 Abs. 2 Bst. b BGG). Ob dies der\
      \ Fall ist, entscheidet das Bundesgericht."
    subparagraphs: []
    annotation:
      title: Rechtsmittelbelehrung und Zulässigkeitsvoraussetzungen der Beschwerde
        an das Bundesgericht
      description:
      - Anwendbarkeit von Art. 83 Bst. h BGG auf Entscheide im Bereich der internationalen
        Amtshilfe in Steuersachen
      - Frist von 10 Tagen für die Einreichung der Beschwerde in öffentlich-rechtlichen
        Angelegenheiten
      - 'Voraussetzungen für die Zulässigkeit der Beschwerde: Vorliegen einer Rechtsfrage
        von grundsätzlicher Bedeutung'
      - 'Voraussetzungen für die Zulässigkeit der Beschwerde: Vorliegen eines besonders
        bedeutenden Falls gemäss Art. 84 Abs. 2 BGG'
      - Zuständigkeit des Bundesgerichts zur Entscheidung über die Zulässigkeit der
        Beschwerde
  is_structured: true
- name: sachverhalt
  content:
  - number: A.
    text: 'Am 6. Dezember 2022 richtete die Direction Générale des Finances Publiques
      von Frankreich (nachfolgend: DGFP oder ersuchende Behörde) ein Amtshilfegesuch
      an die Eidgenössische Steuerverwaltung (nachfolgend: ESTV). Das Ersuchen stützt
      sich auf Art. 28 des Abkommens vom 9. September 1966 zwischen der Schweiz und
      Frankreich zur Vermeidung der Doppelbesteuerung auf dem Gebiet der Steuern vom
      Einkommen und vom Vermögen und zur Vermeidung von Steuerbetrug und Steuerflucht
      (SR 0.672.934.91; nachfolgend: DBA CH-FR) sowie dessen Zusatzprotokoll (nachfolgend:
      Zusatzprotokoll).'
    subparagraphs: []
    annotation:
      title: Einleitung des Amtshilfegesuchs durch die französische Finanzbehörde
      description:
      - Absendung des Amtshilfegesuchs durch die Direction Générale des Finances Publiques
        Frankreichs
      - Rechtsgrundlage des Amtshilfegesuchs im bilateralen Doppelbesteuerungsabkommen
        zwischen der Schweiz und Frankreich
      - Bezug auf das Zusatzprotokoll zum Doppelbesteuerungsabkommen
      - Adressierung des Gesuchs an die Eidgenössische Steuerverwaltung
  - number: B.
    text: ''
    subparagraphs:
    - number: B.a
      text: 'Die DGFP ersucht darin um Informationen über die in der Schweiz ansässige
        A._______ GmbH (beschwerdeberechtigte Person; nachfolgend auch: schweizerische
        Gruppengesellschaft), weil diese für die Besteuerung der in Frankreich domizilierten
        Gruppengesellschaft B._______ SAS (betroffene Person; nachfolgend auch: französische
        Gruppengesellschaft) voraussichtlich erheblich seien. Betroffen seien französische
        Körperschafts- und Quellensteuern für die Jahre 2019 bis 2021.'
      subparagraphs: []
      annotation:
        title: Erhebung von Informationen zur Besteuerung grenzüberschreitender Gruppengesellschaften
        description:
        - Ersuchen um Informationen über die in der Schweiz ansässige Gruppengesellschaft
        - Bezug der Informationen zur Besteuerung der in Frankreich domizilierten
          Gruppengesellschaft
        - Betroffenheit französischer Körperschafts- und Quellensteuern für bestimmte
          Steuerjahre
    - number: B.b
      text: Die DGFP bestätigte im Ersuchen zudem, dass die Informationen gemäss den
        Gesetzen und der gewöhnlichen Verwaltungspraxis des ersuchenden Staates bei
        Vorliegen vergleichbarer Umstände erhältlich wären sowie dass alle auf dem
        eigenen Staatsgebiet zur Verfügung stehenden Mittel ausgeschöpft worden seien,
        mit Ausnahme solcher, die mit unverhältnismässigem Aufwand verbunden gewesen
        wären. Ebenfalls bestätigt wurde die Einhaltung der geltenden Vorschriften
        an die Geheimhaltung bzw. Vertraulichkeit sowie an die zweckkonforme Verwendung
        der ersuchten Informationen.
      subparagraphs: []
      annotation:
        title: Bestätigung der Voraussetzungen für die Amtshilfe und Einhaltung von
          Geheimhaltungs- und Verwendungsanforderungen
        description:
        - Verfügbarkeit der ersuchten Informationen nach den Gesetzen und der Verwaltungspraxis
          des ersuchenden Staates bei vergleichbaren Umständen
        - Ausschöpfung aller auf dem eigenen Staatsgebiet verfügbaren Mittel zur Informationsbeschaffung
          mit Ausnahme unverhältnismässiger Aufwände
        - Einhaltung der Vorschriften zur Geheimhaltung und Vertraulichkeit der ersuchten
          Informationen
        - Sicherstellung der zweckkonformen Verwendung der ersuchten Informationen
    - number: B.c
      text: 'Bezüglich des Sachverhalts führte die DGFP im Wesentlichen aus, die C._______
        BVBA (fortan: belgische Gruppengesellschaft) habe den französischen Gesellschaften
        D.______ SAS und E._______ SAS (Tochtergesellschaften der französischen Gruppengesellschaft)
        per 1. Januar 2014 zu denselben Konditionen je ein Darlehen ("loan agreement")
        gewährt. Die französische Gruppengesellschaft habe in der Folge im Jahre 2015
        mittels Absorptionsfusion die zwei Tochtergesellschaften und damit auch die
        Rechte und Pflichten aus den genannten Darlehen im Gesamtbetrag von EUR [XXX’XXX’XXX.-],
        welche zu 5 % zu verzinsen seien, übernommen. Weiter führte die DGFP betreffend
        das bis zum 31. Dezember 2019 geltende französische Steuerrecht aus, an verbundene
        Gesellschaften bezahlte Zinsen seien bloss dann abzugsfähig, wenn (i) die
        vereinbarten Zinsen einer Besteuerung von mindestens einem Viertel der französischen
        Steuer unterlägen und (ii) der Zinssatz entweder (a) einer gesetzlich festgelegten
        Pauschale entspreche oder, (b) sofern er diese übersteige, dem Drittvergleich
        standhalte. Für die Steuerperioden 2020 bis 2021 verweist die DGFP auf Art.
        205 B CGI, ihre Umsetzungsbestimmung der Anti-Steuervermeidungsrichtlinie
        der Europäischen Union ("ATAD 2"). Demnach könne jede Zahlung, die im Rahmen
        eines Finanzinstruments geleistet werde und eine asymmetrische steuerliche
        Behandlung (Abzug Aufwand / Nichtberücksichtigung Ertrag) aufgrund unterschiedlicher
        Qualifikation des Finanzinstruments oder der Zahlung bewirke, dazu führen,
        dass der Abzug beim französischen Zahlungsschuldner in Frage gestellt bzw.
        nicht zugelassen werde. Dies gelte, so die DGFP, auch bei einer Reihe von
        Transaktionen zwischen verbundenen Unternehmen mit Ansässigkeiten in verschiedenen
        Ländern. Die französische Gruppengesellschaft – so die DGFP weiter – sei der
        Auffassung nachgewiesen zu haben, dass die an die belgische Gruppengesellschaft
        bezahlten Zinsen in Belgien ausreichend versteuert worden seien, die Steuerverwaltung
        Belgien habe dies denn auch bestätigt, und dass der Zinssatz von 5 % marktüblich
        sei, was mittels einer Studie untermauert worden sei. Die französische Gruppengesellschaft
        habe zudem vorgebracht, die belgische Gruppengesellschaft leihe selber zu
        4.75 %, einem Zinssatz nahe bei 5 %. Bei diesem Zinssatz (4.75 %) – so die
        DGFP weiter – handle es sich jedoch um einen gruppeninternen Zinssatz, zumal
        die belgische Gruppengesellschaft (nach Angaben der belgischen Steuerverwaltung)
        das "loan agreement" mit ebenfalls am 1. Januar 2014 emittierten Anleihen
        finanziere, welche zum einen seitens der schweizerischen Gruppengesellschaft
        (1''000 Anleihen zu je EUR [X’XXX.-], ausmachend EUR [X’XXX’XXX.-]) und zum
        anderen seitens einer amerikanischen Gruppengesellschaft (123''800 Anleihen
        zu je EUR [X’XXX.-], ausmachend EUR [XXX’XXX’XXX.-]) gezeichnet worden seien.
        Die DGFP erklärt sodann, dass die ersuchten Informationen es ihr ermöglichen
        würden, die Marktüblichkeit des Darlehenszinses sowie den nicht missbräuchlichen
        Charakter der Mindestbesteuerung der Zinserträge in Belgien im Rahmen der
        gruppeninternen Finanzierungskette ("chaîne de financement") zu überprüfen.
        Die französische Steuerverwaltung benötige für diese Prüfung – soweit sie
        die schweizerische Gruppengesellschaft betreffe – die Hilfe der schweizerischen
        Steuerbehörden. Das vorliegende Gesuch – so die DGFP weiter – betreffe die
        Geschäftsjahre 2019, 2020 und 2021 und folge auf ein früheres Amtshilfegesuch
        in der vorliegenden Sache, das bis heute (d.h. bis zum Zeitpunkt des Ersuchens;
        vgl. auch Sachverhalt Bst. B.e in limine) unbeantwortet geblieben sei, zumal
        es gemäss den schweizerischen Behörden Gegenstand eines laufenden Verfahrens
        vor eidgenössischen Gerichten sei.'
      subparagraphs: []
      annotation:
        title: Darstellung der gruppeninternen Darlehensverhältnisse und steuerrechtlichen
          Rahmenbedingungen in Frankreich und Belgien
        description:
        - Gewährung und Konditionen der Darlehen zwischen belgischer und französischen
          Gruppengesellschaften
        - Absorptionsfusion der französischen Tochtergesellschaften und Übernahme
          der Darlehensrechte und -pflichten
        - Anwendbarkeit und Voraussetzungen des französischen Steuerrechts für Zinsabzüge
          bei verbundenen Gesellschaften bis 2019
        - Relevanz von Art. 205 B CGI und der Anti-Steuervermeidungsrichtlinie der
          Europäischen Union für die Steuerperioden 2020 bis 2021
        - Behauptete ausreichende Versteuerung der Zinsen in Belgien und Nachweis
          der Marktüblichkeit des Zinssatzes
        - Finanzierung der belgischen Gruppengesellschaft durch Anleihen der schweizerischen
          und amerikanischen Gruppengesellschaften
        - Erforderlichkeit der Amtshilfe der schweizerischen Steuerbehörden zur Prüfung
          der Marktüblichkeit und Nichtmissbräuchlichkeit der Zinserträge
        - Bezug des Amtshilfegesuchs auf die Geschäftsjahre 2019 bis 2021 und Zusammenhang
          mit einem früheren, noch unbeantworteten Amtshilfegesuch
    - number: B.d
      text: 'Im Einzelnen ersuchte die DGFP die ESTV um folgende Informationen: "
        Au titre de la période du 01/01/2019 au 31/12/2021 : a) copie des statuts
        ; b) copie des procès-verbaux de conseil d''administration et d''assemblée
        générale (ils peuvent être postérieurs à 2018) ; c) copie des bilans, comptes
        de résultats et annexes ; d) copie des déclarations fiscales déposées ; e)
        copie des déclarations fiscales déposées au titre de l''éventuelle intégration
        fiscale ; f) copie des avis d''imposition ; g) copie de tout ‹ ruling › (agrément)
        concernant [A._______ GmbH]. Pour les années 2019 à 2021 : h) Veuillez indiquer
        le montant des intérêts comptabilisés par [A._______ GmbH] au titre de l’application
        du ‹ bond subscription agreement › ; i) Veuillez indiquer le taux d’imposition,
        prévu par les législations suisse et cantonale, des intérêts perçus dans ce
        cadre par [A._______ GmbH] en provenance de [C._______ BVBA] ; j) Veuillez
        préciser le taux d''imposition effectivement appliqué à ces intérêts ; k)
        [A._______ GmbH] bénéficie-t-elle d''un agrément de la part de l''administration
        fiscale suisse ou cantonale au titre de son activité d''une manière générale
        ou au titre des intérêts perçus de [C._______ BVBA] (si oui, veuillez le mettre
        à disposition) ; l) Existe-t-il une explication, fiscale ou non, connue des
        autorités fiscales suisses à la structuration du ‹ bond souscription agreement
        ›, [A._______ GmbH] souscrivant à 1.000 ‹ bonds › tandis que [F._______ LLC]
        souscrit à 123.800 ‹ bonds › ; m) Veuillez indiquer comment [A._______ GmbH]
        finance la souscription à l''emprunt obligataire ; n) En cas de financement
        par endettement (prêt, obligations etc.), veuillez préciser le nom et la localisation
        de l’entité concernée, les sommes en cause et les conditions juridiques et
        financières appliquées (joindre le contrat) ; o) Si l''entité finançant [A._______
        GmbH] est suisse, veuillez fournir la réponse à l''ensemble des questions
        de la demande d''assistance ; p) Veuillez répondre à la question immédiatement
        précédente ad libitum, aussi longtemps qu’une société suisse sera concernée.
        Veuillez fournir une copie des éléments suivants : q) contrat(s) de financement
        de tous ordres (emprunt, obligation, etc.) de [A._______ GmbH] ; r) tout ‹
        ruling › (agrément) accordé à [A._______ GmbH] sur la période."'
      subparagraphs: []
      annotation:
        title: Anforderung detaillierter steuerlicher und finanzieller Informationen
          durch die ausländische Behörde
        description:
        - Anforderung von Gesellschaftsstatuten und Protokollen der Verwaltungs- und
          Generalversammlungen
        - Anforderung von Jahresabschlüssen, Erfolgsrechnungen und Anhängen
        - Anforderung von eingereichten Steuererklärungen und allfälligen Steuerintegrationserklärungen
        - Anforderung von Steuerveranlagungsverfügungen
        - Anforderung von Steuerentscheiden und rulings bezüglich der betroffenen
          Gesellschaft
        - Anforderung von Angaben zu Zinsbeträgen und deren steuerlicher Behandlung
          im Zusammenhang mit einem Bond Subscription Agreement
        - Anforderung von Informationen zu Steuerbewilligungen und deren Geltungsbereich
        - Anforderung von Erklärungen zur wirtschaftlichen und steuerlichen Strukturierung
          des Bond Subscription Agreements
        - Anforderung von Angaben zur Finanzierung der Anleihezeichnung einschließlich
          Vertragsunterlagen
        - Anforderung von Informationen über involvierte schweizerische Gesellschaften
          und deren steuerliche Behandlung
    - number: B.e
      text: Im vorliegenden Amtshilfegesuch nahm die DGFP u.a. Bezug auf ihr Amtshilfegesuch
        vom 23. Dezember 2019 betreffend die Jahre 2014 bis 2018 (vgl. Sachverhalt
        Bst. B.c letzter Absatz). Dieses basierte ebenfalls auf dem hier beschriebenen
        Sachverhalt. Das entsprechende Verfahren wurde mit Urteil des BVGer A-2453/2021
        vom 3. Mai 2023 abgeschlossen. Im Rahmen des Amtshilfegesuchs vom 23. Dezember
        2019 betreffend die Jahre 2014 bis 2018 stellte die ESTV bei der DGFP eine
        Rückfrage betreffend die voraussichtliche Erheblichkeit der im (damaligen)
        Ersuchen angeforderten Informationen über die schweizerische Gruppengesellschaft
        sowie betreffend die Aktualität des (damaligen) Ersuchens. Daraufhin erläuterte
        die DGFP, die ersuchten Informationen (allgemeine Steuerinformationen zur
        schweizerischen Gruppengesellschaft einschließlich der Statuten, Protokolle
        der Verwaltungsratssitzungen und Gesellschafterversammlungen, Jahresrechnungen,
        Steuererklärungen, Veranlagungsverfügungen sowie alle «Steuerrulings» betreffend
        die schweizerische Seite 5 Gruppengesellschaft) würden benötigt, um die Marktüblichkeit
        des von der belgischen Gruppengesellschaft gegenüber der französischen Gruppengesellschaft
        verlangten Zinssatzes zu bestreiten sowie um zu überprüfen, ob die belgische
        Gruppengesellschaft innerhalb der gruppeninternen Finanzierung des Darlehens
        lediglich zu Verschleierungszwecken in die Finanzierungskette zwischen der
        französischen Gruppengesellschaft und der schweizerischen Gruppengesellschaft
        eingeschoben worden sei. Ergänzend erklärte die DGFP, dass sie namentlich
        feststellen wolle, ob es sich bei der schweizerischen Gruppengesellschaft
        lediglich um eine «leere Hülle» handle. Sollte die schweizerische Gruppengesellschaft
        keine wirtschaftliche Tätigkeit ausüben sowie den Schweizer Behörden unbekannt
        sein und von einer Steuerfirma verwaltet werden, würde dies gegebenenfalls
        Hinweise auf ein Steuerkonstrukt («indice de montage») liefern (vgl. Urteil
        des BVGer A-2453/2021 vom 3. Mai 2023 Sachverhalt Bst. I sowie E. 3.2.1).
      subparagraphs: []
      annotation:
        title: Bezugnahme auf vorangegangenes Amtshilfegesuch und Klärung der Erheblichkeit
          und Aktualität der angeforderten Informationen
        description:
        - Verweis auf das frühere Amtshilfegesuch vom 23. Dezember 2019 und dessen
          Verfahrensabschluss
        - Bezug des aktuellen Gesuchs auf denselben Sachverhalt wie das frühere Gesuch
        - Rückfrage der Eidgenössischen Steuerverwaltung zur Erheblichkeit der angeforderten
          Informationen
        - Rückfrage der Eidgenössischen Steuerverwaltung zur Aktualität des früheren
          Ersuchens
        - Erläuterung der DGFP zum Zweck der angeforderten allgemeinen Steuerinformationen
          der schweizerischen Gruppengesellschaft
        - Prüfung der Marktüblichkeit des Zinssatzes zwischen belgischer und französischer
          Gruppengesellschaft
        - Überprüfung der Rolle der belgischen Gruppengesellschaft in der gruppeninternen
          Finanzierungskette
        - Feststellung, ob die schweizerische Gruppengesellschaft eine wirtschaftliche
          Tätigkeit ausübt oder eine «leere Hülle» darstellt
        - Ermittlung möglicher Hinweise auf ein Steuerkonstrukt bei fehlender wirtschaftlicher
          Tätigkeit und Verwaltung durch eine Steuerfirma
    annotation:
      title: Darstellung des Amtshilfegesuchs und zugrundeliegender Sachverhalt zur
        gruppeninternen Finanzierung und Steuerprüfung
      description:
      - Anliegen der ersuchenden Steuerbehörde bezüglich Informationen zur schweizerischen
        Gruppengesellschaft
      - Bestätigung der Erfüllung der gesetzlichen und verwaltungspraxisbezogenen
        Voraussetzungen für das Amtshilfegesuch
      - Darstellung der gruppeninternen Darlehensstruktur und relevanter steuerlicher
        Rahmenbedingungen in Frankreich und Belgien
      - Begründung der Erheblichkeit der ersuchten Informationen für die Prüfung der
        Marktüblichkeit und Nichtmissbräuchlichkeit der Zinserträge
      - Detaillierte Auflistung der von der schweizerischen Steuerverwaltung zu liefernden
        Informationen und Dokumente
      - Bezugnahme auf ein früheres Amtshilfegesuch mit ähnlichem Sachverhalt und
        dessen Verfahrensstand
      - Zweck der Informationsbeschaffung zur Überprüfung der wirtschaftlichen Substanz
        und möglichen Steuerkonstrukte der schweizerischen Gruppengesellschaft
  - number: C.
    text: ''
    subparagraphs:
    - number: C.a
      text: Mit Editionsverfügung vom 9. Dezember 2022 forderte die ESTV die schweizerische
        Gruppengesellschaft dazu auf, ihr die ersuchten Informationen zuzustellen
        sowie die im Ausland ansässige französische Gruppengesellschaft über das laufende
        Amtshilfeverfahren zu informieren und diese aufzufordern, eine zur Zustellung
        bevollmächtigte Person in der Schweiz zu bezeichnen. Dieser Aufforderung kam
        die schweizerische Gruppengesellschaft nach. Mit Schreiben vom 9. Januar 2023
        teilte sie der ESTV zudem mit, dass sie von der französischen Gruppengesellschaft
        als Zustellungsbevollmächtigte in der Schweiz bestimmt worden sei.
      subparagraphs: []
      annotation:
        title: Durchführung der Editionsverfügung und Benennung einer Zustellungsbevollmächtigten
        description:
        - Aufforderung der ESTV an die schweizerische Gruppengesellschaft zur Übermittlung
          ersuchter Informationen
        - Aufforderung zur Information der im Ausland ansässigen französischen Gruppengesellschaft
          über das Amtshilfeverfahren
        - Aufforderung zur Benennung einer in der Schweiz bevollmächtigten Zustellungsbevollmächtigten
          durch die französische Gruppengesellschaft
        - Erfüllung der Editionsverfügung durch die schweizerische Gruppengesellschaft
        - Mitteilung der Benennung der Zustellungsbevollmächtigten an die ESTV
    - number: C.b
      text: 'Ebenfalls am 9. Dezember 2022 forderte die ESTV das Steueramt des Kantons
        (…) (nachfolgend: kantonales Steueramt) auf, ihr die ersuchten Informationen
        zuzustellen. Das kantonale Steueramt kam dieser Aufforderung nach.'
      subparagraphs: []
      annotation:
        title: Anforderung und Übermittlung von Informationen durch das kantonale
          Steueramt
        description:
        - Anforderung von Informationen durch die Eidgenössische Steuerverwaltung
        - Reaktion des kantonalen Steueramts auf die Anforderung
        - Übermittlung der ersuchten Informationen durch das kantonale Steueramt
    annotation:
      title: Verfahren zur Informationsbeschaffung und Zustellungsbevollmächtigung
        im Amtshilfeverfahren
      description:
      - Aufforderung der schweizerischen Gruppengesellschaft zur Übermittlung der
        ersuchten Informationen
      - Aufforderung zur Information und Benennung einer Zustellungsbevollmächtigten
        durch die im Ausland ansässige Gruppengesellschaft
      - Erfüllung der Aufforderung durch die schweizerische Gruppengesellschaft
      - Aufforderung des kantonalen Steueramts zur Übermittlung der ersuchten Informationen
      - Erfüllung der Aufforderung durch das kantonale Steueramt
  - number: D.
    text: Mangels Zustimmungen zum Informationsaustausch erging am 22. August 2023
      sowohl gegenüber der französischen Gruppengesellschaft als auch gegenüber der
      schweizerischen Gruppengesellschaft je eine Schlussverfügung. Die ESTV kam nach
      erfolgter Prüfung des Ersuchens zum Schluss, dass der ersuchenden Behörde Amtshilfe
      betreffend die französische Gruppengesellschaft zu leisten sei (Ziffer 1 des
      Dispositivs beider Schlussverfügungen). Seite 6 In Ziffer 2 des Dispositivs
      (beider Schlussverfügungen) nannte die ESTV die bei der schweizerischen Gruppengesellschaft
      und dem kantonalen Steueramt edierten und zu übermittelnden Informationen und
      Dokumente betreffend die schweizerische Gruppengesellschaft. Zur Übermittlung
      vorgesehen sind namentlich Auskünfte zu Statuten, Protokolle der Geschäftsleitungssitzungen
      und Gesellschafterversammlungen, Bilanzen, Erfolgsrechnungen, Steuererklärungen,
      Veranlagungsverfügungen, Rulings, die Summe der unter dem «bond subscription
      agreement» vereinnahmten Zinsen, Angaben zu den Gewinnsteuersätzen und zur Höhe
      der effektiv entrichteten Steuern, Angaben betreffend Finanzierung der in Frage
      stehenden Anleihen sowie die Vorlage von Finanzierungsvereinbarungen aller Art.
      Zudem wies die ESTV darauf hin, dass nicht amtshilfefähige Informationen, die
      nicht hätten ausgesondert werden konnten, geschwärzt worden seien. In Ziffer
      3 (französische Gruppengesellschaft) bzw. Ziffer 4 (schweizerischen Gruppengesellschaft)
      des jeweiligen Dispositivs verfügte die ESTV, sie werde die DGFP auf den Grundsatz
      der Geheimhaltung der Informationen sowie auf das Spezialitätsprinzip hinweisen.
    subparagraphs: []
    annotation:
      title: Ergehen und Inhalt der Schlussverfügungen zur Amtshilfe bei fehlenden
        Zustimmungen zum Informationsaustausch
      description:
      - Ergehen der Schlussverfügungen gegenüber der französischen und schweizerischen
        Gruppengesellschaft mangels Zustimmungen zum Informationsaustausch
      - Entscheidung der Eidgenössischen Steuerverwaltung über die Leistung der Amtshilfe
        betreffend die französische Gruppengesellschaft
      - Bestimmung der zu übermittelnden Informationen und Dokumente bei der schweizerischen
        Gruppengesellschaft
      - Auflistung der konkreten Auskünfte und Unterlagen, die übermittelt werden
        sollen
      - Hinweis auf Schwärzung nicht amtshilfefähiger Informationen
      - Verfügung zur Belehrung der empfangenden Behörde über Geheimhaltungspflicht
        und Spezialitätsprinzip
  - number: E.
    text: 'Mit je einer Eingabe vom 22. September 2023 erhoben sowohl die schweizerische
      Gruppengesellschaft (nachfolgend auch: Beschwerdeführerin 1) als auch die französische
      Gruppengesellschaft (nachfolgend auch: Beschwerdeführerin 2, zusammen: die Beschwerdeführerinnen)
      jeweils Beschwerde beim Bundesverwaltungsgericht gegen die sie betreffende Schlussverfügung
      vom 22. August 2023. Sie beantragen in erster Linie, die Schlussverfügungen
      seien aufzuheben und auf das Amtshilfeersuchen sei nicht einzutreten, eventualiter
      sei das Amtshilfeersuchen abzuweisen und der DGFP im vorinstanzlichen Verfahren
      keine Amtshilfe zu leisten. Eventualiter beantragen die Beschwerdeführerinnen,
      es sei Ziffer 2 des Dispositivs der angefochtenen Schlussverfügungen aufzuheben
      und sämtliche zur Übermittlung vorgesehenen Informationen und Unterlagen betreffend
      die Steuerperiode 2019 gemäss Auflistung in Beilage 33 (der Beschwerden) auszusondern
      und von der Übermittlung auszunehmen. Subeventualiter seien die darin enthaltenen
      Informationen betreffend die Steuerperiode 2019 vorgängig zur Übermittlung zu
      schwärzen und nur in entsprechend geschwärzter Form zu übermitteln; alles unter
      Kosten- und Entschädigungsfolgen zu Lasten der Eidgenossenschaft. Seite 7 In
      prozessualer Hinsicht beantragen die Beschwerdeführerinnen, die Beschwerdeverfahren
      betreffend die Beschwerdeführerin 1 und dasjenige betreffend die Beschwerdeführerin
      2 seien zu vereinigen.'
    subparagraphs: []
    annotation:
      title: Darlegung der Beschwerdeanträge und Verfahrensanträge der Beschwerdeführerinnen
      description:
      - Erhebung von Beschwerden gegen die Schlussverfügungen vom 22. August 2023
      - Anträge auf Aufhebung der Schlussverfügungen
      - Anträge auf Nichtantritt oder Abweisung des Amtshilfeersuchens
      - Anträge auf Einschränkung der übermittelten Informationen und Unterlagen betreffend
        die Steuerperiode 2019
      - Anträge auf Kosten- und Entschädigungsfolgen zu Lasten der Eidgenossenschaft
      - Antrag auf Vereinigung der Beschwerdeverfahren der beiden Beschwerdeführerinnen
  - number: F.
    text: Mit Verfügung vom 23. Oktober 2023 verfügte das Bundesverwaltungsgericht,
      dass die Beschwerdeverfahren A-5153/2023 sowie A-5155/2023 vereinigt und unter
      der Verfahrensnummer A-5153/2023 weitergeführt würden.
    subparagraphs: []
    annotation:
      title: Verfügung zur Vereinheitlichung von Beschwerdeverfahren
      description:
      - Anordnung der Vereinigung mehrerer Beschwerdeverfahren
      - Festlegung der Verfahrensnummer für das zusammengeführte Verfahren
      - Datum und formelle Grundlage der Verfügung
  - number: G.
    text: Mit Vernehmlassung vom 1. Dezember 2023 beantragt die ESTV die kostenpflichtige
      Abweisung der Beschwerden.
    subparagraphs: []
    annotation:
      title: Antrag der Eidgenössischen Steuerverwaltung zur Verfahrensbeendigung
      description:
      - Einreichung der Vernehmlassung durch die Eidgenössische Steuerverwaltung
      - Antrag auf kostenpflichtige Abweisung der Beschwerden
  - number: H.
    text: Mit Replik vom 12. Januar 2024 halten die Beschwerdeführerinnen an ihren
      Rechtsbegehren fest. Auf die detaillierten Vorbringen der Verfahrensbeteiligten
      und die eingereichten Unterlagen wird – sofern sie für den Entscheid wesentlich
      sind – in den Erwägungen näher eingegangen.
    subparagraphs: []
    annotation:
      title: Bestätigung der Rechtsbegehren und Verweis auf wesentliche Verfahrensunterlagen
      description:
      - Beharren der Beschwerdeführerinnen auf ihren Rechtsbegehren
      - Berücksichtigung der detaillierten Vorbringen der Verfahrensbeteiligten
      - Einbezug der eingereichten Unterlagen bei wesentlicher Relevanz für den Entscheid
  is_structured: true
