meta: null
content:
- name: entscheid
  content:
  - number: '1.'
    text: Die Beschwerde wird abgewiesen
    subparagraphs: []
    annotation:
      title: Entscheid über die Beschwerde
      description:
      - Annahme oder Abweisung der Beschwerde
  - number: '2.'
    text: Die Verfahrenskosten von Fr. 5’000.-- werden dem Beschwerdeführer auferlegt.
      Der einbezahlte Kostenvorschuss in gleicher Höhe wird zur Bezahlung der Verfahrenskosten
      verwendet.
    subparagraphs: []
    annotation:
      title: Entscheidung über die Verfahrenskostenlast und Verwendung des Kostenvorschusses
      description:
      - Auferlegung der Verfahrenskosten auf die Partei
      - Verwendung des einbezahlten Kostenvorschusses zur Deckung der Verfahrenskosten
  - number: '3.'
    text: Es wird keine Parteientschädigung zugesprochen.
    subparagraphs: []
    annotation:
      title: Entscheidung über Parteientschädigung
      description:
      - Zuständigkeit zur Entscheidung über Parteientschädigung
      - Vorliegen von Voraussetzungen für die Zusprechung einer Parteientschädigung
      - Rechtsfolgen bei Nichtzusprechung einer Parteientschädigung
  - number: '4.'
    text: Dieses Urteil geht an den Beschwerdeführer und die Vorinstanz.
    subparagraphs: []
    annotation:
      title: Adressierung und Zustellung des Urteils
      description:
      - Bestimmung der Empfänger des Urteils
      - Zustellung des Urteils an die Parteien und die Vorinstanz
  is_structured: true
- name: erwägungen
  content:
  - number: '1.'
    text: ''
    subparagraphs:
    - number: '1.1'
      text: "Dem vorliegenden Verfahren liegt ein Amtshilfeersuchen der ersuchenden\
        \ franz\x0246sischen Steuerbeh\x0246rde vom 19. April 2023 gest\x025Ctzt auf\
        \ Art. 28 des DBA CH-FR zugrunde. Die Durchf\x025Chrung dieser Abkommensbestimmung\
        \ richtet sich \x0253 unter Vorbehalt abweichender Regelungen im DBA CH-FR\
        \ \x0253 nach dem Bundesgesetz vom 28. September 2012 \x0253ber die internationale\
        \ Amtshilfe in Steuersachen (StAhiG, SR 651.1; vgl. Art. 1 Abs. 1 und 2 sowie\
        \ Art. 24 StAhiG e contrario)."
      subparagraphs: []
      annotation:
        title: Grundlage und Anwendbarkeit des Amtshilfeersuchens im Steuerbereich
        description:
        - Vorliegen eines Amtshilfeersuchens der ausländischen Steuerbehörde
        - Rechtsgrundlage des Amtshilfeersuchens im bilateralen Steuerabkommen
        - Anwendbarkeit des Bundesgesetzes über die internationale Amtshilfe in Steuersachen
        - Vorrang und Vorbehalt abweichender Regelungen im bilateralen Steuerabkommen
    - number: '1.2'
      text: "Das Bundesverwaltungsgericht ist zur Beurteilung von Beschwerden gegen\
        \ Schlussverf\x025C6gungen der ESTV betreffend die internationale Amtshilfe\
        \ in Steuersachen zust\x025C4ndig (vgl. Art. 19 Abs. 5 StAhiG i.V.m. Art.\
        \ 31 ff. des Bundesgesetzes vom 17. Juni 2005 \x0253ber das Bundesverwaltungsgericht\
        \ [Verwaltungsgerichtsgesetz, VGG, SR 173.32]). Das Verfahren vor dem Bundesverwaltungsgericht\
        \ richtet sich nach dem Bundesgesetz vom 20. Dezember 1968 \x0253ber das Verwaltungsverfahren\
        \ (Verwaltungsverfahrensgesetz, VwVG, SR 172.021), soweit das VGG nichts anderes\
        \ bestimmt (Art. 37 VGG)."
      subparagraphs: []
      annotation:
        title: Zuständigkeit und Verfahrensgrundlagen des Bundesverwaltungsgerichts
          bei Beschwerden gegen Schlussverfügungen der ESTV
        description:
        - Zuständigkeit des Bundesverwaltungsgerichts für Beschwerden gegen Schlussverfügungen
          der ESTV zur internationalen Amtshilfe in Steuersachen
        - Anwendbarkeit des Verwaltungsgerichtsgesetzes in Verbindung mit dem Bundesgesetz
          über das Bundesverwaltungsgericht
        - Anwendbarkeit des Verwaltungsverfahrensgesetzes auf das Verfahren vor dem
          Bundesverwaltungsgericht
    - number: '1.3'
      text: "Der Beschwerdef\x025CChrer hat am vorinstanzlichen Verfahren teilgenommen\
        \ und ist als Adressat der angefochtenen Schlussverf\x025C6gung und als Person,\
        \ die vom Amtshilfeersuchen betroffen ist, zur Beschwerdef\x025Chrung legitimiert\
        \ (vgl. Art. 48 Abs. 1 VwVG und Art. 19 Abs. 2 StAhiG). Auf die form- und\
        \ fristgerecht (vgl. Art. 50 Abs. 1 und Art. 52 Abs. 1 VwVG i.V.m. Art. 19\
        \ Abs. 5 StAhiG) eingereichte Beschwerde ist einzutreten."
      subparagraphs: []
      annotation:
        title: Prüfung der Legitimation und Zulässigkeit der Beschwerde
        description:
        - Teilnahme des Beschwerdeführers am vorinstanzlichen Verfahren
        - Legitimation des Beschwerdeführers als Adressat der angefochtenen Schlussverfügung
        - Legitimation des Beschwerdeführers als von Amtshilfeersuchen betroffene
          Person
        - Form- und fristgerechte Einreichung der Beschwerde
        - Zulässigkeit des Eintritts auf die Beschwerde
    - number: '1.4'
      text: "Das Bundesverwaltungsgericht kann die angefochtene Schlussverf\x025C6gung\
        \ in vollem Umfang \x025CFCberpr\x025CFCfen. Der Beschwerdef\x025CChrer kann\
        \ neben der Verletzung von Bundesrecht und der unrichtigen oder unvollst\x02\
        5Cndigen Feststellung des rechtserheblichen Sachverhalts auch die Unangemessenheit\
        \ r\x025CFCgen (Art. 49 Bst. a bis c VwVG)."
      subparagraphs: []
      annotation:
        title: Umfang und Prüfungsgründe der Beschwerde vor dem Bundesverwaltungsgericht
        description:
        - Vollständige Überprüfung der angefochtenen Schlussverfügung durch das Bundesverwaltungsgericht
        - Rüge der Verletzung von Bundesrecht durch den Beschwerdeführer
        - Rüge der unrichtigen oder unvollständigen Feststellung des rechtserheblichen
          Sachverhalts
        - Rüge der Unangemessenheit der Verfügung
    annotation:
      title: Verfahrensgrundlagen und Zuständigkeit im Amtshilfeverfahren
      description:
      - Rechtsgrundlage des Amtshilfeersuchens gemäss Doppelbesteuerungsabkommen zwischen
        der Schweiz und Frankreich
      - Anwendbarkeit des Bundesgesetzes über die internationale Amtshilfe in Steuersachen
        auf das Verfahren
      - Zuständigkeit des Bundesverwaltungsgerichts für Beschwerden gegen Schlussverfügungen
        der Eidgenössischen Steuerverwaltung im Amtshilfeverfahren
      - Anwendbares Verfahrensrecht vor dem Bundesverwaltungsgericht
      - Parteistellung und Legitimation des Beschwerdeführers im Amtshilfeverfahren
      - Formelle Voraussetzungen für das Eintreten auf die Beschwerde
      - Umfang der Überprüfungsmöglichkeiten des Bundesverwaltungsgerichts bei der
        angefochtenen Schlussverfügung
      - Prüfungstatbestände der Beschwerde, insbesondere Verletzung von Bundesrecht,
        Sachverhaltsfeststellung und Unangemessenheit
  - number: '2.'
    text: ''
    subparagraphs:
    - number: '2.1'
      text: "Das vorliegende Amtshilfeersuchen betrifft die Steuerjahre 2018 bis 2021\
        \ und st\x025Cftzt sich auf Art. 28 DBA CH-FR (in der hier anwendbaren Fassung\
        \ gem\x025C4ss Art. 7 des Zusatzabkommens vom 27. August 2009 [AS 2010 5683;\
        \ nachfolgend: Zusatzabkommen 2009]; Art. 11 Abs. 3 des Zusatzabkommens 2009)\
        \ und auf Ziff. XI des im DBA CH-FR integrierten Zusatzprotokolls in der Fassung\
        \ gem\x025C4ss Art. 1 der Vereinbarung vom 25. Juni 2014 \x0253ber die \x02\
        53nderung des Zusatzprotokolls zum revidierten Abkommen zwischen der Schweiz\
        \ und Frankreich vom 9. September 1966 zur Vermeidung der Doppelbesteuerung\
        \ auf dem Gebiet der Steuern vom Einkommen und vom Verm\x0246gen und zur Vermeidung\
        \ von Steuerbetrug und Steuerflucht (AS 2016 1195, nachfolgend: Vereinbarung\
        \ 2014)."
      subparagraphs: []
      annotation:
        title: Anwendbarkeit der völkerrechtlichen Grundlagen für das Amtshilfeersuchen
        description:
        - Steuerjahre, auf die sich das Amtshilfeersuchen bezieht
        - Rechtsgrundlagen des Amtshilfeersuchens im Doppelbesteuerungsabkommen zwischen
          der Schweiz und Frankreich
        - Anwendung des Zusatzabkommens 2009 gemäß dessen Art. 7 und Art. 11 Abs.
          3
        - Berücksichtigung des Zusatzprotokolls im DBA CH-FR in der Fassung der Vereinbarung
          2014
    - number: '2.2'
      text: ''
      subparagraphs:
      - number: 2.2.1
        text: "Gem\x025C4ss Ziff. XI Abs. 3 des Zusatzprotokolls muss das Amtshilfegesuch\
          \ folgende Informationen enthalten: die Identit\x025C4t der in eine Pr\x02\
          5CFCfung oder Untersuchung einbezogenen Person, wobei diese Information\
          \ mittels Angabe des Namens der betreffenden Person oder weiterer Informationen,\
          \ welche ihre Identifikation erm\x0246glichen, geliefert werden kann (Bst.\
          \ a); die Zeitperiode, f\x025CFr welche die Informationen verlangt werden\
          \ (Bst. b); die Beschreibung der verlangten Informationen sowie Angaben\
          \ hinsichtlich der Form, in der der ersuchende Staat diese Informationen\
          \ vom ersuchten Staat zu erhalten w\x025FCnscht (Bst. c); den Steuerzweck,\
          \ f\x025CFr den die Informationen verlangt werden (Bst. d) und soweit bekannt,\
          \ den Namen und die Adresse des mutmasslichen Inhabers der verlangten Informationen\
          \ (Bst. e). Diese Anforderungen gehen den \x0253hnlichen Bestimmungen in\
          \ Art. 6 Abs. 2 StAhiG vor (so auch Art. 1 Abs. 2 StAhiG; statt vieler:\
          \ Urteil des BVGer A-4143/2018 vom 28. Mai 2015 E. 2.2.1)."
        subparagraphs: []
        annotation:
          title: Erforderliche Angaben im Amtshilfegesuch gemäss Zusatzprotokoll
          description:
          - Identität der in Prüfung oder Untersuchung einbezogenen Person
          - Zeitperiode, für welche die Informationen verlangt werden
          - Beschreibung der verlangten Informationen und gewünschte Form der Übermittlung
          - Steuerzweck der Informationsanforderung
          - Name und Adresse des mutmasslichen Inhabers der verlangten Informationen,
            soweit bekannt
          - Vorrang der Anforderungen des Zusatzprotokolls gegenüber ähnlichen Bestimmungen
            im Staatsvertrag über Amtshilfe
      - number: 2.2.2
        text: "Enth\x025C4lt ein Amtshilfeersuchen alle Informationen, die gem\x02\
          5C4ss dem anwendbaren \0DCbereinkommen erforderlich sind, kann das Vorliegen\
          \ einer sog. \0ABfishing expedition\0BB (vgl. hierzu E. 2.3.2) grunds\x02\
          5C4tzlich verneint werden (vgl. Urteil des BGer 2C_953/2020 vom 24. November\
          \ 2021 E. 3.3; Urteil des BVGer A-5281/2021 vom 2. Mai 2022 E. 6.1)."
        subparagraphs: []
        annotation:
          title: Prüfung der Vollständigkeit der Informationen im Amtshilfeersuchen
            und Abgrenzung zur Fishing Expedition
          description:
          - Vorliegen aller gemäss anwendbarem Übereinkommen erforderlichen Informationen
            im Amtshilfeersuchen
          - Abgrenzung des Amtshilfeersuchens von einer Fishing Expedition
      - number: 2.2.3
        text: "Die Auslegung von Amtshilfeersuchen muss im Lichte des von der ersuchenden\
          \ Beh\x0246rde verfolgten Zwecks und in einer Weise erfolgen, die den wirksamen\
          \ Informationsaustausch zwischen den Vertragsparteien nicht behindert (vgl.\
          \ Ziff. XI Abs. 4 des Zusatzprotokolls). Dies gebietet ebenso der v\x02\
          46lkergewohnheitsrechtliche Grundsatz, wonach Vertragsstaaten v\x0246lkerrechtliche\
          \ Vertr\x022ge nach Treu und Glauben zu erf\x025CCllen haben (pacta sunt\
          \ servanda, kodifiziert in Art. 26 des Wiener \0DCbereinkommens vom 23.\
          \ Mai 1969 \x0253ber das Recht der Vertr\x022ge [VRK, SR 0.111]; vgl. BGE\
          \ 147 II 116 E. 5.2; Urteil des BGer 2C_287/2019, 2C_288/2019 vom 13. Juli\
          \ 2020 E. 3). Soweit vorliegend relevant, stellen die Grunds\x022tze des\
          \ Wiener \0DCbereinkommens kodifiziertes V\x0246lkergewohnheitsrecht dar;\
          \ sie sind von den schweizerischen Beh\x0246rden zu beachten, obschon Frankreich\
          \ nicht Vertragsstaat des Wiener \0DCbereinkommens ist (vgl. BGE 146 II\
          \ 150 E. 5.3.1 m.w.H.)."
        subparagraphs: []
        annotation:
          title: Auslegung von Amtshilfeersuchen unter Beachtung völkerrechtlicher
            Grundsätze
          description:
          - Zweckorientierte Auslegung von Amtshilfeersuchen im Interesse des wirksamen
            Informationsaustauschs
          - Beachtung des völkergewohnheitsrechtlichen Grundsatzes von Treu und Glauben
            bei der Vertragserfüllung
          - Anwendung des Grundsatzes pacta sunt servanda gemäß Art. 26 des Wiener
            Übereinkommens über das Recht der Verträge
          - Relevanz kodifizierter völkergewohnheitsrechtlicher Prinzipien für die
            schweizerischen Behörden unabhängig vom Vertragsstatus anderer Staaten
      annotation:
        title: Formelle Anforderungen und Auslegungsgrundsätze für Amtshilfeersuchen
          nach internationalem Recht
        description:
        - Erforderliche Angaben in Amtshilfeersuchen gemäss Ziff. XI Abs. 3 des Zusatzprotokolls
        - Vorrang der Anforderungen des Zusatzprotokolls gegenüber Art. 6 Abs. 2 des
          Bundesgesetzes über die internationale Amtshilfe in Steuersachen
        - Prüfung des Vorliegens einer unzulässigen fishing expedition bei vollständigen
          Erfüllung der Erfordernisse des anwendbaren Übereinkommens
        - Auslegung von Amtshilfeersuchen im Hinblick auf den Zweck der ersuchenden
          Behörde
        - Beachtung des völkergewohnheitsrechtlichen Grundsatzes von Treu und Glauben
          (pacta sunt servanda) bei der Erfüllung völkerrechtlicher Verträge
        - Relevanz der kodifizierten Grundsätze des Wiener Übereinkommens für die
          Auslegung von Amtshilfeersuchen, auch gegenüber Nichtvertragsstaaten
    - number: '2.3'
      text: ''
      subparagraphs:
      - number: 2.3.1
        text: "Gem\x025C4ss Art. 28 Abs. 1 Satz 1 DBA CH-FR tauschen die zust\x02\
          5C4ndigen Beh\x0246rden der beiden Vertragsstaaten unter sich diejenigen\
          \ Informationen aus, die zur Durchf\x025CChrung des Abkommens oder zur Anwendung\
          \ oder Durchsetzung des innerstaatlichen Rechts betreffend Steuern jeder\
          \ Art und Bezeichnung, die f\x025CFr Rechnung der Vertragsstaaten oder ihrer\
          \ politischen Unterabteilungen oder lokalen K\x0246rperschaften erhoben\
          \ werden, voraussichtlich erheblich sind, soweit die diesem Recht entsprechende\
          \ Besteuerung nicht dem Abkommen widerspricht. Der Informationsaustausch\
          \ in Anwendung von Art. 28 DBA CH-FR ist nicht durch Art. 1 DBA CH-FR (pers\x02\
          46nlicher Geltungsbereich) und Art. 2 DBA CH-FR (sachlicher Geltungsbereich\
          \ bzw. unter das Abkommen fallende Steuern) eingeschr\x022nkt (Art. 28 Abs.\
          \ 1 Satz 2 DBA CH-FR)."
        subparagraphs: []
        annotation:
          title: Informationsaustausch nach Art. 28 Abs. 1 DBA Schweiz-Frankreich
            zur Steuerdurchführung und Rechtsanwendung
          description:
          - Anwendungsbereich des Informationsaustauschs zwischen den zuständigen
            Behörden der Vertragsstaaten
          - Relevanz der ausgetauschten Informationen für die Durchführung des Abkommens
          - Relevanz der ausgetauschten Informationen für die Anwendung oder Durchsetzung
            des innerstaatlichen Steuerrechts
          - Geltung des Informationsaustauschs für Steuern jeder Art und Bezeichnung,
            die für Rechnung der Vertragsstaaten oder ihrer Unterabteilungen erhoben
            werden
          - Voraussetzung der voraussichtlichen erheblichen Bedeutung der Informationen
          - Ausschluss des Widerspruchs des Informationsaustauschs mit dem Abkommen
          - Unabhängigkeit des Informationsaustauschs von den persönlichen und sachlichen
            Geltungsbereichen des Abkommens gemäss Art. 1 und Art. 2 DBA Schweiz-Frankreich
      - number: 2.3.2
        text: "Gem\x025C4ss Ziff. XI Abs. 2 des Zusatzprotokolls zum DBA CH-FR besteht\
          \ der Zweck der Verweisung auf \0Avoraussichtlich erhebliche\0A9 Informationen\
          \ in Art. 28 Abs. 1 DBA CH-FR darin, einen m\x0246glichst breiten Informationsaustausch\
          \ in Steuersachen zu gew\x022hrleisten, ohne dass die Vertragsstaaten \0\
          ABfishing expeditions\0BB (unzul\x022ssige Beweisausforschung) durchf\x02\
          5Chren oder Informationen verlangen k\x0246nnen, deren Erheblichkeit f\x02\
          5CFr die Aufkl\x022rung der Steuerangelegenheiten bestimmter Steuerpflichtiger\
          \ wenig wahrscheinlich ist (vgl. Urteil des BVGer A-4685/2021 vom 19. August\
          \ 2022 E. 3.6). Insofern bildet das Verbot der Beweisausforschung Ausdruck\
          \ des Verh\x022ltnism\x022ssigkeitsgrundsatzes (vgl. Urteil des BVGer A-4163/2019\
          \ vom 22. April 2020 E. 3.1.2)."
        subparagraphs: []
        annotation:
          title: Zweck und Schranken des Informationsaustauschs gemäss Zusatzprotokoll
            zum DBA Schweiz-Frankreich
          description:
          - Zweck der Verweisung auf voraussichtlich erhebliche Informationen in Art.
            28 Abs. 1 DBA CH-FR
          - Gewährleistung eines möglichst breiten Informationsaustauschs in Steuersachen
          - Verbot unzulässiger Beweisausforschung (fishing expeditions)
          - Beschränkung der Informationsanforderungen auf solche mit wahrscheinlicher
            Relevanz für die Steueraufklärung
          - Ausdruck des Verhältnismässigkeitsgrundsatzes im Verbot der Beweisausforschung
      - number: 2.3.3
        text: "Wurde ein Gesuch zum Zweck der Beweisausforschung gestellt, wird gem\x02\
          2ss innerstaatlichem Recht darauf nicht eingetreten (Art. 7 Bst. a StAhiG)."
        subparagraphs: []
        annotation:
          title: Prüfung der Ablehnung von Amtshilfegesuchen zur Beweisausforschung
            nach innerstaatlichem Recht
          description:
          - Anwendbarkeit von Art. 7 Buchstabe a des Staatsanwaltschaftshilfegesetzes
          - Ausschluss der Behandlung von Gesuchen mit dem Zweck der Beweisausforschung
          - Rechtsfolgen der Ablehnung von Amtshilfegesuchen zur Beweisausforschung
      - number: 2.3.4
        text: "Als nach Art. 28 Abs. 1 DBA CH-FR zur Anwendung oder Durchsetzung des\
          \ innerstaatlichen Rechts \0Avoraussichtlich erheblich\0A9 gelten Informationen,\
          \ die f\x025CFr den ersuchenden Staat notwendig sind, um eine in diesem\
          \ Staat steuerpflichtige Person dort korrekt zu besteuern (BGE 143 II 185\
          \ E. 3.3.1 und 141 II 436 E. 4.4.3; Urteil des BVGer A-4592/2018 vom 21.\
          \ M\x022rz 2019 E. 3.1.2). Um die Durchsetzung des Steuerrechts des ersuchenden\
          \ Staats zu erm\x0246glichen, k\x0246nnen gem\x022ss bundesgerichtlicher\
          \ Rechtsprechung grunds\x022tzlich sämtliche Informationen relevant sein,\
          \ die ein Vertragsstaat f\x025CFr die Steuerveranlagung seiner Steuerpflichtigen\
          \ ben\x0246tigt (vgl. BGE 143 II 185 E. 3.3.3)."
        subparagraphs: []
        annotation:
          title: Relevanz von Informationen für die Anwendung und Durchsetzung des
            innerstaatlichen Steuerrechts nach dem Doppelbesteuerungsabkommen Schweiz-Frankreich
          description:
          - Begriff der voraussichtlich erheblichen Informationen gemäss Art. 28 Abs.
            1 DBA CH-FR
          - Notwendigkeit der Informationen für die korrekte Besteuerung einer in
            einem Vertragsstaat steuerpflichtigen Person
          - Relevanz sämtlicher Informationen für die Steuerveranlagung nach bundesgerichtlicher
            Rechtsprechung
          - Bezug auf die Durchsetzung des Steuerrechts des ersuchenden Staates
      - number: 2.3.5
        text: "Die Voraussetzung der voraussichtlichen Erheblichkeit ist erf\x025CCllt,\
          \ wenn im Zeitpunkt der Einreichung des Amtshilfeersuchens eine vern\x02\
          5CFnftige M\x0246glichkeit besteht, dass sich die verlangten Informationen\
          \ als erheblich erweisen werden (BGE 143 II 185 E. 3.3.2). Keine Rolle spielt\
          \ demgegen\x025CFCber, ob sich diese Informationen nach deren \0DCbermittlung\
          \ f\x025CFr die ersuchende Beh\x0246rde als nicht erheblich herausstellen\
          \ (vgl. BGE 144 II 206 E. 4.3 und 142 II 161 E. 2.1.1; zum Ganzen: Urteil\
          \ des BVGer A-4603/2019 vom 17. August 2020 E. 2.3.3 m.w.H.)."
        subparagraphs: []
        annotation:
          title: Prüfung der voraussichtlichen Erheblichkeit der verlangten Informationen
            zum Zeitpunkt des Amtshilfeersuchens
          description:
          - Vorliegen einer vernünftigen Möglichkeit der Erheblichkeit der verlangten
            Informationen bei Einreichung des Amtshilfeersuchens
          - Unabhängigkeit der voraussichtlichen Erheblichkeit von der späteren tatsächlichen
            Relevanz der übermittelten Informationen
      - number: 2.3.6
        text: "Die voraussichtliche Erheblichkeit von Informationen muss sich bereits\
          \ aus dem Amtshilfeersuchen ergeben. Nach der Edition der verlangten Unterlagen\
          \ hat die ersuchte Beh\x0246rde zu pr\x025CFCfen, ob die betreffenden Informationen\
          \ f\x025CFr die Erhebung der Steuer voraussichtlich erheblich sind. Dem\
          \ \0Avoraussichtlich\0A9 kommt somit eine doppelte Bedeutung zu: der ersuchende\
          \ Staat muss die Erheblichkeit voraussehen und im Amtshilfeersuchen geltend\
          \ machen und der ersuchte Staat muss nur solche Informationen \x025CFCbermitteln,\
          \ die voraussichtlich erheblich sind (vgl. BGE 143 II 185 E. 3.3.2; Urteil\
          \ des BVGer A-272/2017 vom 5. Dezember 2017 E. 2.2.2)."
        subparagraphs: []
        annotation:
          title: Voraussetzungen und Bedeutung der voraussichtlichen Erheblichkeit
            von Informationen im Amtshilfeersuchen
          description:
          - Erfordernis, dass die voraussichtliche Erheblichkeit der Informationen
            bereits im Amtshilfeersuchen dargelegt wird
          - Prüfung durch die ersuchte Behörde, ob die verlangten Informationen für
            die Steuererhebung voraussichtlich erheblich sind
          - Doppelte Bedeutung des Begriffs «voraussichtlich» im Kontext der Amtshilfe
          - Verpflichtung des ersuchenden Staates zur Voraussicht und Darlegung der
            Erheblichkeit im Ersuchen
          - Beschränkung der Übermittlungspflicht der ersuchten Behörde auf voraussichtlich
            erhebliche Informationen
      - number: 2.3.7
        text: "Ob eine Information tats\x022chlich erheblich ist, h\x022ngt im Wesentlichen\
          \ vom (Verfahrens-)Recht des ersuchenden Staates ab. Nach st\x022ndiger\
          \ bundesgerichtlicher Rechtsprechung bedeutet dies freilich nicht, dass\
          \ sich der ersuchte Staat im Rahmen des Amtshilfeverfahrens zum internen\
          \ (Verfahrens-)Recht des ersuchenden Staates zu \x025C\x022ern h\x022tte.\
          \ Entsprechend kann in der Regel nur der ersuchende Staat abschliessend\
          \ feststellen, ob eine Information tats\x022chlich erheblich ist (vgl. BGE\
          \ 143 II 185 E. 3.3.2 und 142 II 161 E. 2.1.1; Urteil des BGer 2C_918/2020\
          \ vom 28. Dezember 2021 E. 4.3; statt vieler: Urteil des BVGer A-3584/2021\
          \ vom 27. Juli 2023 E. 2.7.6). Die Rolle des ersuchten Staates beschr\x02\
          2nkt sich bei der Beurteilung der voraussichtlichen Erheblichkeit daher\
          \ auf eine Pr\x025CFCfung der Plausibilit\x022t des Ersuchens (vgl. BGE\
          \ 144 II 29 E. 4.2.2 und 142 II 161 E. 2.1.1; Urteil des BGer 2C_282/2021\
          \ vom 15. Juni 2022 E. 4.2.2; Urteile des BVGer A-4144/2018 vom 28. Mai\
          \ 2019 E. 2.1.6 und A-846/2018 vom 30. August 2018 E. 2.1.4 m.w.H.). Dabei\
          \ hat die ersuchte Beh\x0246rde nicht zu entscheiden, ob der im Ersuchen\
          \ dargestellte Sachverhalt g\x022nzlich der Realit\x022t entspricht, sondern\
          \ sie muss nur \x025CFCberpr\x025CFCfen, ob die ersuchten Informationen\
          \ einen Bezug zu diesem Sachverhalt haben und ob sie m\x0246glicherweise\
          \ dazu geeignet sind, im ausl\x022ndischen Verfahren verwendet zu werden\
          \ (vgl. BGE 144 II 206 E. 4.3 und 142 II 161 E. 2.1.1; Urteile des BGer\
          \ 2C_282/2021 vom 15. Juni 2022 E. 4.2.2 und 2C_703/2020 vom 15. M\x022rz\
          \ 2021 E. 4.2.2; Urteile des BVGer A-4144/2018 vom 28. Mai 2019 E. 2.1.6\
          \ und A-846/2018 vom 30. August 2018 E. 2.1.4 m.w.H.). Soweit das nationale\
          \ Verfahrensrecht des ersuchenden Staates einer Verwertung der im Amtshilfeverfahren\
          \ ersuchten Informationen entgegensteht, hat die betroffene Person dies\
          \ im Prinzip vor den Beh\x0246rden des ersuchenden Staates geltend zu machen\
          \ (BGE 144 II 206 E. 4.6 und 142 II 161 E. 2.2; Urteil des BGer 2C_918/2020\
          \ vom 28. Dezember 2021 E. 4.3 m.w.H; Urteil des BVGer A-232/2022 vom 16.\
          \ Februar 2023 E. 2.3.4.2 m.w.H.)."
        subparagraphs: []
        annotation:
          title: Prüfung der Erheblichkeit von Informationen im Amtshilfeverfahren
          description:
          - Abhängigkeit der Erheblichkeit von Informationen vom Verfahrensrecht des
            ersuchenden Staates
          - Abgrenzung der Zuständigkeit des ersuchten Staates gegenüber dem internen
            Verfahrensrecht des ersuchenden Staates
          - Feststellung der Erheblichkeit von Informationen durch den ersuchenden
            Staat
          - Prüfung der Plausibilität des Ersuchens durch den ersuchten Staat
          - Beurteilung des Bezugs der ersuchten Informationen zum dargestellten Sachverhalt
          - Eignung der ersuchten Informationen zur Verwendung im ausländischen Verfahren
          - Zuständigkeit der betroffenen Person zur Geltendmachung von Verwertungsbeschränkungen
            im ersuchenden Staat
      - number: 2.3.8
        text: "Die \0DCbermittlung von Informationen zu Personen, die nicht formell\
          \ betroffene Personen sind, ist gem\x022ss Art. 4 Abs. 3 StAhiG unzul\x02\
          2ssig, wenn diese Informationen f\x025CFr die Beurteilung der Steuersituation\
          \ der betroffenen Person nicht voraussichtlich relevant sind oder wenn berechtigte\
          \ Interessen von Personen, die nicht betroffene Personen sind, das Interesse\
          \ der ersuchenden Seite an der \0DCbermittlung der Informationen \x025CFCberwiegen\
          \ (vgl. Urteile des BVGer A-4987/2021 vom 20. Mai 2022 E. 2.2.5; A-5447/2020\
          \ vom 6. Oktober 2021 E. 2.4.4).\nRechtsprechungsgem\x022ss ist der Begriff\
          \ der \0ABnicht betroffenen Person\0BB nach Art. 4 Abs. 3 StAhiG restriktiv\
          \ zu verstehen (vgl. BGE 142 II 161 E. 4.6.1 f.). Damit sollen in Anwendung\
          \ des Verh\x022ltnism\x022ssigkeitsprinzips Personen gesch\x025Cchtzt werden,\
          \ die nichts mit dem im Amtshilfeersuchen geschilderten Sachverhalt zu tun\
          \ haben, deren Namen also rein zuf\x022llig in den weiterzuleitenden Dokumenten\
          \ auftauchen (\0ABfruit d'un pur hasard\0BB; vgl. statt vieler: Urteil des\
          \ BGer 2C_287/2019 vom 13. Juli 2020 E. 5; Urteil des BVGer A-4987/2021\
          \ vom 20. Mai 2022 E. 2.2.6 m.w.H.). In gewissen Konstellationen ist es\
          \ unumg\x022nglich, auch \x025CFCber Personen Informationen zu erteilen,\
          \ deren Steuerpflicht im ersuchenden Staat nicht geltend gemacht wird (statt\
          \ vieler: Urteil des BVGer A-4228/2018 vom 26. August 2019 E. 2.6.3). K\x02\
          4nnen die ersuchten Informationen f\x025CFr die Steuerpflicht der im ersuchenden\
          \ Staat zu besteuernden Person voraussichtlich erheblich sein und ist ihre\
          \ \0DCbermittlung unter Verh\x022ltnism\x022ssigkeitsgesichtspunkten erforderlich,\
          \ d.h. wenn die Aussonderung, Schw\x022rzung oder anderweitige Unkenntlichmachung\
          \ der Informationen den Zweck des Amtshilfeersuchens vereiteln w\x025Crdte,\
          \ so sind sie dem ersuchenden Staat zu \0FCbermitteln (vgl. ausf\x025CChrlich\
          \ mit Beispielen: BGE 144 II 29 E. 4.2.2 ff. und 141 II 436 E. 4.2.3 f.;\
          \ Urteil des BGer 2C_615/2018 vom 26. M\x022rz 2019 E. 3.1; Urteil des BVGer\
          \ A-4987/2021 vom 20. Mai 2022 E. 2.2.6 m.w.H.)."
        subparagraphs: []
        annotation:
          title: Rechtliche Voraussetzungen und Einschränkungen bei der Übermittlung
            von Informationen zu nicht betroffenen Personen im Amtshilfeverfahren
          description:
          - Unzulässigkeit der Übermittlung von Informationen zu nicht betroffenen
            Personen nach Art. 4 Abs. 3 StAhiG
          - Relevanz der Informationen für die Beurteilung der Steuersituation der
            betroffenen Person
          - Abwägung zwischen berechtigten Interessen nicht betroffener Personen und
            Interesse der ersuchenden Seite an der Informationsübermittlung
          - Restriktive Auslegung des Begriffs der nicht betroffenen Person im Sinne
            von Art. 4 Abs. 3 StAhiG
          - Schutz von Personen, die zufällig in den Dokumenten genannt werden, im
            Rahmen des Verhältnismäßigkeitsprinzips
          - Ausnahmekonstellationen, in denen die Übermittlung von Informationen zu
            Personen ohne Steuerpflicht im ersuchenden Staat zulässig ist
          - Verhältnismäßigkeitsprüfung bei der Übermittlung von Informationen, insbesondere
            bei Aussonderung, Schwärzung oder Unkenntlichmachung
          - Rechtsprechung zur Abwägung zwischen Zweck des Amtshilfeersuchens und
            Schutzinteressen nicht betroffener Personen
      annotation:
        title: Rechtliche Voraussetzungen und Grenzen des Informationsaustauschs im
          Rahmen des Doppelbesteuerungsabkommens zwischen der Schweiz und Frankreich
        description:
        - Anwendungsbereich des Art. 28 Abs. 1 DBA Schweiz-Frankreich bezüglich Informationsaustausch
        - Zweck und Umfang des Informationsaustauschs zur Vermeidung unzulässiger
          Beweisausforschung
        - Rechtsfolgen bei Gesuchen zum Zweck der Beweisausforschung nach innerstaatlichem
          Recht
        - Begriff und Anforderungen an voraussichtlich erhebliche Informationen im
          Sinne von Art. 28 Abs. 1 DBA Schweiz-Frankreich
        - Zeitpunkt und Kriterien zur Beurteilung der voraussichtlichen Erheblichkeit
          der angeforderten Informationen
        - Rolle und Prüfpflichten der ersuchten Behörde bei der Beurteilung der voraussichtlichen
          Erheblichkeit
        - Abgrenzung der tatsächlichen Erheblichkeit von Informationen und Zuständigkeit
          der Vertragsstaaten zur abschliessenden Beurteilung
        - Beschränkungen bei der Übermittlung von Informationen zu nicht betroffenen
          Personen unter Berücksichtigung des Verhältnismässigkeitsprinzips
    - number: '2.4'
      text: ''
      subparagraphs:
      - number: 2.4.1
        text: "Ein wichtiges Element der internationalen Beh\x0246rdenzusammenarbeit\
          \ bildet das v\x0246lkerrechtliche Vertrauensprinzip. Diesem Grundsatz nach\
          \ besteht \x0253 ausser bei offensichtlichem Rechtsmissbrauch oder bei berechtigten\
          \ Fragen im Zusammenhang mit dem Schutz des schweizerischen oder internationalen\
          \ Ordre public (vgl. Art. 7 StAhiG) \x0253 prinzipiell kein Anlass, an Sachverhaltsdarstellungen\
          \ und Erkl\x022rungen anderer Staaten zu zweifeln (vgl. BGE 146 II 150 E.\
          \ 7.1 und 142 II 218 E. 3.1; Urteile des BVGer A-765/2019 vom 20. September\
          \ 2020 E. 2.2 und A-381/2018 vom 21. November 2018 E. 4.2)."
        subparagraphs: []
        annotation:
          title: Grundsatz des völkerrechtlichen Vertrauensprinzips in der internationalen
            Behördenzusammenarbeit
          description:
          - Anwendung des völkerrechtlichen Vertrauensprinzips bei der Beurteilung
            von Sachverhaltsdarstellungen und Erklärungen anderer Staaten
          - Ausnahmen vom Vertrauensprinzip bei offensichtlichem Rechtsmissbrauch
          - Ausnahmen vom Vertrauensprinzip bei berechtigten Fragen zum Schutz des
            schweizerischen oder internationalen Ordre public
          - Relevanz von Art. 7 des Staatsanwaltschaftshilfegesetzes für die Prüfung
            des Vertrauensprinzips
      - number: 2.4.2
        text: "Aufgrund des v\x0246lkerrechtlichen Vertrauensprinzips ist die ersuchte\
          \ Beh\x0246rde an die Darstellung des Sachverhalts im Amtshilfeersuchen\
          \ gebunden, sofern diese nicht wegen offensichtlicher Fehler, L\x025Ccken\
          \ oder Widerspr\x025Cche sofort entkr\x022ftet werden kann (BGE 142 II 218\
          \ E. 3.1 und 139 II 451 E. 2.2.1; Urteile des BVGer A-2259/2021 vom 18.\
          \ Februar 2022 E. 2.2 und A-3773/2018 vom 8. Februar 2019 E. 2.6). Gleiches\
          \ gilt f\x025CFr die vom ersuchenden Staat abgegebenen Erkl\x022rungen.\
          \ Werden diese sofort entkr\x022ftet, kann der ersuchte Staat ihnen nicht\
          \ mehr vertrauen (vgl. Urteile des BVGer A-2259/2021 vom 18. Februar 2022\
          \ E. 2.2 und A-7622/2016 vom 23. Mai 2017 E. 2.3). Das Vertrauensprinzip\
          \ schliesst indessen nicht aus, dass der ersuchte Staat vom ersuchenden\
          \ Staat zus\x022tzliche Erkl\x022rungen verlangt, wenn ernsthafte Zweifel\
          \ an der Einhaltung der v\x0246lkerrechtlichen Grunds\x022tze bestehen (BGE\
          \ 146 II 150 E. 7.1 und 144 II 206 E. 4.4)."
        subparagraphs: []
        annotation:
          title: Bindung an die Darstellung im Amtshilfeersuchen aufgrund des völkerrechtlichen
            Vertrauensprinzips
          description:
          - Verbindlichkeit der Sachverhaltsdarstellung im Amtshilfeersuchen für die
            ersuchte Behörde
          - Ausnahmen von der Bindung bei offensichtlichen Fehlern, Lücken oder Widersprüchen
          - Vertrauenswürdigkeit der Erklärungen des ersuchenden Staates
          - Folgen der sofortigen Entkräftung der Erklärungen für das Vertrauen des
            ersuchten Staates
          - Möglichkeit der Anforderung zusätzlicher Erklärungen bei ernsthaften Zweifeln
            an der Einhaltung völkerrechtlicher Grundsätze
      annotation:
        title: Anwendung des völkerrechtlichen Vertrauensprinzips in der internationalen
          Behördenzusammenarbeit
        description:
        - Grundsatz des völkerrechtlichen Vertrauensprinzips in der internationalen
          Behördenzusammenarbeit
        - Ausnahmen vom Vertrauensprinzip bei offensichtlichem Rechtsmissbrauch und
          Schutz des schweizerischen oder internationalen Ordre public
        - Bindung der ersuchten Behörde an die Sachverhaltsdarstellung im Amtshilfeersuchen
        - Prüfung offensichtlicher Fehler, Lücken oder Widersprüche in der Sachverhaltsdarstellung
        - Vertrauenswürdigkeit der Erklärungen des ersuchenden Staates
        - Möglichkeit der Anforderung zusätzlicher Erklärungen bei ernsthaften Zweifeln
          an der Einhaltung völkerrechtlicher Grundsätze
    - number: '2.5'
      text: ''
      subparagraphs:
      - number: 2.5.1
        text: "Informationen k\x024nnen im abkommensrechtlichen Sinne nur dann als\
          \ voraussichtlich erheblich qualifiziert werden (vgl. E. 2.3), wenn sie\
          \ (unter anderem oder ausschliesslich) Personen betreffen, deren unbeschr\x02\
          2nkte oder beschr\x022nkte Steuerpflicht im ersuchenden Staat w\x022hrend\
          \ der massgebenden Zeitspanne im Ersuchen geltend gemacht wird (vgl. Urteil\
          \ des BVGer A-1948/2019 vom 7. November 2019 E. 2.4.3)."
        subparagraphs: []
        annotation:
          title: Voraussetzungen für die Qualifikation von Informationen als voraussichtlich
            erheblich im abkommensrechtlichen Sinne
          description:
          - Erfordernis, dass Informationen Personen betreffen, deren Steuerpflicht
            im ersuchenden Staat geltend gemacht wird
          - Unterscheidung zwischen unbeschränkter und beschränkter Steuerpflicht
            der betroffenen Personen
          - Bezug zur massgebenden Zeitspanne im Ersuchen
          - Relevanz der Qualifikation von Informationen im Rahmen des Abkommensrechts
      - number: 2.5.2
        text: "Der Umstand, dass eine betroffene Person in einem Staat als steuerlich\
          \ ans\x0224ssig gilt, schliesst indes nicht aus, dass diese Ans\x0224ssigkeit\
          \ von einem anderen Staat in Abrede gestellt wird, respektive dass in anderen\
          \ Staaten tats\x022chlich eine beschr\x022nkte Steuerpflicht gegeben ist.\
          \ Die Bestimmung des steuerlichen Wohnsitzes auf internationaler Ebene ist\
          \ eine Grundsatzfrage, die eine detaillierte Pr\x025CFCfung der Situation\
          \ voraussetzt und vom ersuchten Staat im Rahmen eines Amtshilfeverfahrens\
          \ nicht gekl\x022rt werden kann. Ein m\x0246glicher Ans\x0224ssigkeitskonflikt\
          \ ist daher nicht im Rahmen eines Amtshilfeverfahrens, sondern in einem\
          \ Verst\x022ndigungsverfahren zu l\x0246sen (vgl. BGE 145 II 112 E. 2.2.2,\
          \ 142 II 217 E. 3.6 f. und 142 II 161 E. 2.2.2; Urteil des BGer 2C_109/2022\
          \ vom 30. Januar 2023 E. 4.2.1). Ein allf\x022lliges Verfahren betreffend\
          \ die Ans\x0224ssigkeitsfrage der betroffenen Person muss zudem noch nicht\
          \ entschieden worden sein, bevor ein Amtshilfeersuchen in Bezug auf die\
          \ Besteuerung gestellt werden kann (Urteil des BVGer A-4917/2019 vom 22.\
          \ Oktober 2020 E. 3.1.2)."
        subparagraphs: []
        annotation:
          title: Abgrenzung der Ansässigkeit und deren Klärung im internationalen
            Steuerrecht
          description:
          - Anerkennung der unterschiedlichen Ansässigkeitsfeststellungen zwischen
            Staaten
          - Abgrenzung zwischen beschränkter Steuerpflicht und steuerlicher Ansässigkeit
            in verschiedenen Staaten
          - Begrenzte Zuständigkeit des ersuchten Staates zur Klärung der Ansässigkeitsfrage
            im Amtshilfeverfahren
          - Notwendigkeit der Lösung von Ansässigkeitskonflikten im Verständigungsverfahren
          - Unabhängigkeit des Amtshilfeersuchens von der vorherigen Entscheidung
            über die Ansässigkeitsfrage
      - number: 2.5.3
        text: "Das Bestehen einer Steuerpflicht in einem anderen Staat als dem ersuchenden\
          \ Staat stellt sodann weder die Vermutung des guten Glaubens des ersuchenden\
          \ Staates (vgl. E. 2.2.3 und 2.4) noch die wahrscheinliche Relevanz des\
          \ Amtshilfeersuchens (vgl. E. 2.3) in Frage. Dies gilt gem\x022ss bundesgerichtlicher\
          \ Rechtsprechung insbesondere auch dann, wenn der ersuchende Staat in seinem\
          \ Amtshilfeersuchen die Steuerpflicht der betroffenen Person nicht gesondert\
          \ begr\x025Cndet, aber ansonsten alle Informationen angibt, die nach dem\
          \ anwendbaren Abkommen bzw. seinem Protokoll erforderlich sind (vgl. E.\
          \ 2.2.1). Denn diese Informationen beziehen sich insbesondere auf den angestrebten\
          \ steuerlichen Zweck, weshalb sie darauf schliessen lassen, dass der ersuchende\
          \ Staat die betroffene Person als zu seinen Steuerpflichtigen geh\x0246rend\
          \ betrachtet. Die Ans\x0224ssigkeit in einem Drittstaat reicht somit auch\
          \ nicht aus, damit die ersuchte Beh\x0246rde von der ersuchenden Beh\x02\
          46rde Erkl\x022rungen zu den Ankn\x025Cpfungspunkten an die geltend gemachte\
          \ Ans\x0224ssigkeit der betroffenen Person im ersuchenden Staat verlangen\
          \ kann (BGE 142 II 218 E. 3.1; Urteil des BGer 2C_953/2020 vom 24. November\
          \ 2021 E. 3.5 und E. 3.7). Deshalb ist es im Grundsatz unbehilflich, wenn\
          \ sich die betroffene Person im Rahmen des Amtshilfeverfahrens auf eine\
          \ (unbeschr\x022nkte) Steuerpflicht in einem anderen (als dem ersuchenden)\
          \ Staat beruft (vgl. BGE 142 II 161 E. 2.2 ff.; Urteil des BGer 2C_109/2022\
          \ vom 30. Januar 2023 E. 4.2.1; Urteil des BVGer A-4680/2021 vom 19. August\
          \ 2022 E. 3.6 in fine)."
        subparagraphs: []
        annotation:
          title: Einfluss der Steuerpflicht in Drittstaaten auf die Beurteilung des
            Amtshilfeersuchens
          description:
          - Auswirkung der Steuerpflicht in einem anderen Staat als dem ersuchenden
            Staat auf die Vermutung des guten Glaubens des ersuchenden Staates
          - Auswirkung der Steuerpflicht in einem anderen Staat als dem ersuchenden
            Staat auf die wahrscheinliche Relevanz des Amtshilfeersuchens
          - Bedeutung der vollständigen und abkommenskonformen Informationserteilung
            im Amtshilfeersuchen trotz fehlender gesonderter Begründung der Steuerpflicht
          - Relevanz der Ansässigkeit in einem Drittstaat für die Anforderungen an
            Erklärungen der ersuchenden Behörde im Amtshilfeverfahren
          - Bewertung der Berufung der betroffenen Person auf eine Steuerpflicht in
            einem anderen Staat im Rahmen des Amtshilfeverfahrens
      - number: 2.5.4
        text: "Die einzige Konstellation, in der es das Bundesgericht zul\x022sst,\
          \ dass die Schweiz als ersuchter Staat eine unbeschr\x022nkte Steuerpflicht,\
          \ auf die sich der ersuchende Staat st\x025Cftzt, \x0253berpr\x025Cft, ist\
          \ diejenige, in der die betroffene Person (auch) in der Schweiz unbeschr\x02\
          2nkt steuerpflichtig ist. In dieser Situation einer potenziellen Doppelbesteuerung\
          \ kann die Schweiz \x0253 ebenfalls unter Ber\x025Ccksichtigung des Vertrauensprinzips\
          \ (vgl. E. 2.4) \x0253berpr\x025Cfen, ob der Ankn\x025Cpfungspunkt an die\
          \ vom ersuchenden Staat angewandte Steuer einem der Kriterien zur Bestimmung\
          \ der steuerlichen Ans\x0224ssigkeit im DBA zwischen der Schweiz und dem\
          \ ersuchenden Staat entspricht. Hingegen hat die Schweiz als ersuchter Staat\
          \ nicht zu beurteilen, ob eine tats\x022chliche steuerliche Doppelans\x02\
          24ssigkeit besteht oder nicht (BGE 145 II 112 E. 3 und 142 II 161 E. 2.2.2;\
          \ Urteil des BGer 2C_953/2020 vom 24. November 2021 E. 3.6, publiziert in\
          \ SteuerRevue [StR] 77/2022 S. 166; Urteil des BVGer A-5281/2021 vom 2.\
          \ Mai 2022 E. 7.2.2; vgl. zum Ganzen: Urteil des BVGer A-4830/2021 vom 23.\
          \ Oktober 2023 E. 2.6)."
        subparagraphs: []
        annotation:
          title: Prüfung der unbeschränkten Steuerpflicht bei Amtshilfe im Kontext
            potenzieller Doppelbesteuerung
          description:
          - Voraussetzung der unbeschränkten Steuerpflicht der betroffenen Person
            in der Schweiz für die Überprüfung der Steuerpflicht des ersuchenden Staates
          - Anwendung des Vertrauensprinzips bei der Prüfung des Anknüpfungspunkts
            an die steuerliche Ansässigkeit im Doppelbesteuerungsabkommen
          - Abgrenzung der Zuständigkeit der Schweiz als ersuchter Staat bei der Beurteilung
            der tatsächlichen steuerlichen Doppelansässigkeit
      annotation:
        title: Prüfung der Relevanz und der Ansässigkeitsfragen im Amtshilfeverfahren
        description:
        - Qualifikation von Informationen als voraussichtlich erheblich im abkommensrechtlichen
          Sinne
        - Bezug der Informationen auf Personen mit unbeschränkter oder beschränkter
          Steuerpflicht im ersuchenden Staat
        - Anerkennung und Abgrenzung der steuerlichen Ansässigkeit zwischen ersuchendem
          und ersuchtem Staat
        - Abgrenzung der Zuständigkeit des ersuchten Staates bei Ansässigkeitskonflikten
          im Amtshilfeverfahren
        - Unterscheidung zwischen Amtshilfeverfahren und Verständigungsverfahren bei
          Ansässigkeitsfragen
        - Auswirkungen einer Steuerpflicht in einem Drittstaat auf die Vermutung des
          guten Glaubens des ersuchenden Staates
        - Beurteilung der wahrscheinlichen Relevanz des Amtshilfeersuchens trotz möglicher
          Ansässigkeitskonflikte
        - Beurteilung der Erklärungs- und Nachweispflichten der ersuchten Behörde
          gegenüber der ersuchenden Behörde bei Ansässigkeitsstreitigkeiten
        - Bedeutung der Berufung der betroffenen Person auf Steuerpflicht in einem
          anderen Staat im Amtshilfeverfahren
        - Bedingungen, unter denen die Schweiz als ersuchter Staat eine unbeschränkte
          Steuerpflicht überprüft
        - Prüfung der Anknüpfungskriterien zur Bestimmung der steuerlichen Ansässigkeit
          im Doppelbesteuerungsabkommen
        - Abgrenzung der Zuständigkeit der Schweiz bei der Beurteilung tatsächlicher
          Doppelansässigkeit
    annotation:
      title: Anwendungsbereich und Rechtsgrundlagen des Amtshilfeersuchens
      description:
      - Betroffene Steuerjahre des Amtshilfeersuchens
      - Anwendbare Bestimmungen des Doppelbesteuerungsabkommens zwischen der Schweiz
        und Frankreich
      - Relevante Vorschriften des Zusatzabkommens 2009
      - Anwendung des Zusatzprotokolls und der Vereinbarung 2014
  - number: '3.'
    text: "Im vorliegenden Fall ist zun\x022chst strittig und zu pr\x025CFCfen, ob\
      \ das Amtshilfeersuchen einer unzul\x022ssigen \0Abfishing expedition\0BB entspricht\
      \ (E. 3.1). Im Streit liegt zudem, ob die \0DCbermittlung von Daten vorgesehen\
      \ ist, die von der ersuchenden Beh\x0246rde gar nicht verlangt worden sind (E.\
      \ 3.2). Im Weiteren ist die Einhaltung des Subsidiarit\x022tsprinzips umstritten\
      \ (E. 3.3). Zu pr\x025CFCfen ist schliesslich die voraussichtliche Erheblichkeit\
      \ der ersuchten Informationen (E. 3.4). In diesem Zusammenhang sind auch die\
      \ Schw\x022rzungsantr\x022ge hinsichtlich verschiedener Personennamen zu beurteilen\
      \ (E. 3.5)."
    subparagraphs:
    - number: '3.1'
      text: ''
      subparagraphs:
      - number: 3.1.1
        text: "Der Beschwerdef\x025CChrer macht geltend, aufgrund der fehlenden Ans\x02\
          24ssigkeit in Frankreich komme das Gesuch um Amtshilfe einer untersagten\
          \ Beweisausforschung gleich. Weil seine Ans\x0224ssigkeit in den Jahren\
          \ 2018 bis 2021 nicht in Frankreich gewesen sei, habe die franz\x0246sische\
          \ Steuerbeh\x0246rde keinen Grund, Informationen zu seinem Einkommen und\
          \ Verm\x0246gen anzufordern."
        subparagraphs: []
        annotation:
          title: Prüfung der Zulässigkeit des Amtshilfegesuchs bei fehlender Ansässigkeit
            im ersuchten Staat
          description:
          - Relevanz der Ansässigkeit des Gesuchstellers im ersuchten Staat für die
            Zulässigkeit des Amtshilfegesuchs
          - Abgrenzung zwischen zulässiger Amtshilfe und unzulässiger Beweisausforschung
          - Begründung der Steuerbehörde für die Anforderung von Informationen zum
            Einkommen und Vermögen
      - number: 3.1.1
        text: "Dem Beschwerdef\x025CChrer ist zun\x022chst zu entgegnen, dass das\
          \ Amtshilfegesuch vom 19. April 2023 alle gem\x022ss Ziff. XI Abs. 3 des\
          \ Zusatzprotokolls erforderlichen Informationen (vgl. E. 2.2.1) enth\x02\
          2lt. Damit kann das Vorliegen einer sog. \0Abfishing expedition\0BB grunds\x02\
          2tzlich verneint werden (E. 2.2.2). Im Weiteren hat die ersuchende Beh\x02\
          46rde verschiedene Ankn\x025Cpfungspunkte f\x025CFr eine Ans\x0224ssigkeit\
          \ des Beschwerdef\x025CChrers in Frankreich geltend gemacht. Nach dem Vertrauensprinzip\
          \ ist darauf grunds\x022tzlich abzustellen. Von einer \0Abfishing expedition\0\
          BB kann keine Rede sein und die Vorinstanz ist zurecht auf das Amtshilfeersuchen\
          \ eingetreten. Die vom Beschwerdef\x025CChrer ins Recht gelegten Urkunden,\
          \ welche nachweisen sollen, dass er in den Jahren 2018 bis 2021 keine Ans\x02\
          24ssigkeit in Frankreich gehabt habe, sind unter dem Titel der voraussichtlichen\
          \ Erheblichkeit der ersuchten Informationen zu pr\x025CFCfen (E. 3.4)."
        subparagraphs: []
        annotation:
          title: Prüfung der Vollständigkeit und Rechtfertigung des Amtshilfegesuchs
            im Hinblick auf eine Abfishing expedition
          description:
          - Vorliegen aller erforderlichen Informationen gemäss Ziffer XI Absatz 3
            des Zusatzprotokolls im Amtshilfegesuch
          - Vorliegen oder Verneinung einer Abfishing expedition als unzulässiges
            Ersuchen
          - Beurteilung der Anknüpfungspunkte für eine Ansässigkeit des Beschwerdeführers
            im ersuchenden Staat
          - Anwendung des Vertrauensprinzips bei der Beurteilung des Amtshilfegesuchs
          - Prüfung der voraussichtlichen Erheblichkeit der vorgelegten Urkunden zum
            Nachweis der Ansässigkeit
      annotation:
        title: Prüfung der Zulässigkeit des Amtshilfegesuchs im Hinblick auf die Ansässigkeit
          des Beschwerdeführers
        description:
        - Behauptung der fehlenden Ansässigkeit des Beschwerdeführers in Frankreich
          als Verbot der Beweisausforschung
        - Relevanz der Ansässigkeit des Beschwerdeführers für das Amtshilfegesuch
        - Vollständigkeit und formelle Anforderungen des Amtshilfegesuchs gemäß Zusatzprotokoll
        - Abgrenzung zwischen zulässigem Amtshilfegesuch und unzulässiger Abfishing
          expedition
        - Beurteilung der vorgebrachten Anknüpfungspunkte für die Ansässigkeit des
          Beschwerdeführers in Frankreich
        - Anwendung des Vertrauensprinzips bei der Prüfung der Ansässigkeit
        - Prüfung der voraussichtlichen Erheblichkeit der ersuchten Informationen
          im Zusammenhang mit der Ansässigkeit
    - number: '3.2'
      text: ''
      subparagraphs:
      - number: 3.2.1
        text: "Der Beschwerdef\x025CChrer bringt vor, die Vorinstanz wolle im Rahmen\
          \ der Amtshilfe Informationen an die ersuchende Beh\x0246rde \0FCbermitteln,\
          \ nach welchen diese in ihrem Ersuchen gar nicht oder nicht mit letzter\
          \ Pr\x025C4zision gefragt habe. Sie wolle insoweit eine unzul\x022ssige\
          \ spontane Amtshilfe leisten. Die ersuchende Beh\x0246rde habe nur nach\
          \ Ausz\x025CFCgen eines bestimmten Bankkontos gefragt und nicht nach Ausz\x02\
          5CFCgen bzw. Transaktionen allf\x022lliger mit dem Konto verbundener Kreditkarten."
        subparagraphs: []
        annotation:
          title: Abgrenzung des Umfangs der Amtshilfe gegenüber dem Ersuchen der ersuchenden
            Behörde
          description:
          - Vorliegen und Umfang der Informationsübermittlung im Rahmen der Amtshilfe
          - Übereinstimmung der übermittelten Informationen mit dem konkreten Ersuchen
            der ersuchenden Behörde
          - Abgrenzung zwischen zulässiger Amtshilfe und unzulässiger spontaner Amtshilfe
          - Präzision der im Ersuchen angefragten Daten im Vergleich zu den tatsächlich
            übermittelten Informationen
      - number: 3.2.2
        text: "Die ersuchende Beh\x0246rde hat gem\x022ss dem Amtshilfeersuchen nach\
          \ den Verm\x0246gensaufstellungen, verschiedenen Formularen sowie den Kontoausz\x02\
          5CFCgen (\0ABles relev\x025C9s\0BB) des Kontos Nr. (Kontonummer) f\x025CFr\
          \ den Zeitraum 2018 bis 2021 gefragt. Die Vertragsstaaten des DBA CH-F haben\
          \ den Vertrag nach Treu und Glauben zu erf\x025CCllen und demnach die Erkl\x02\
          2rungen ihres Vertragspartners nach Treu und Glauben zu interpretieren (Art.\
          \ 26 VRK). Dies hat in einer Weise erfolgen, die den wirksamen Informationsaustausch\
          \ zwischen den Vertragsparteien nicht behindert (oben E. 2.2.3). Die Auffassung\
          \ der Vorinstanz, dass die Ausz\x025CFCge der Kreditkarten (inkl. Er\x02\
          46ffnungsformulare), welche mit dem genannten Bankkonto verbunden sind,\
          \ ebenfalls als ersucht zu gelten haben, ist vor diesem Hintergrund zu best\x02\
          2tigen. Die einzelnen Transaktionen, welche aus den Kreditkartenabrechnungen\
          \ ersichtlich sind, zeigen die Verwendung des Bankkontos n\x022her auf.\
          \ Dies erm\x0246glicht der ersuchenden Beh\x0246rde ein besseres Bild \x02\
          5CFCber die Verm\x0246gensverh\x022ltnisse des Beschwerdef\x025CChrers zu\
          \ gewinnen. Im Weiteren lassen sich aus den Kreditkartenausz\x025CFCgen\
          \ allenfalls auch weitere Hinweise des Beschwerdef\x025CChrers auf seine\
          \ Ans\x0224ssigkeit in Frankreich ableiten. Es handelt sich demnach bei\
          \ der vorgesehenen \0DCbermittlung der Kreditkartenausz\x025CFCge inkl.\
          \ Er\x0246ffnungsformulare nicht um eine spontane Amtshilfe."
        subparagraphs: []
        annotation:
          title: Prüfung des Umfangs und der Auslegung des Amtshilfeersuchens im Rahmen
            des Informationsaustauschs
          description:
          - Erfassung der angefragten Vermögensaufstellungen, Formulare und Kontoauszüge
            im Amtshilfeersuchen
          - Auslegung der Vertragspflichten der DBA-Vertragsstaaten nach Treu und
            Glauben gemäß Art. 26 VRK
          - Beachtung der Pflicht zur Ermöglichung eines wirksamen Informationsaustauschs
            zwischen den Vertragsparteien
          - Einbeziehung der Kreditkartenauszüge und zugehörigen Eröffnungsformulare
            als Bestandteil des Amtshilfeersuchens
          - Bewertung der Relevanz der Kreditkartentransaktionen für die Vermögensverhältnisse
            des Beschwerdeführers
          - Ermittlung möglicher Hinweise auf die Ansässigkeit des Beschwerdeführers
            anhand der Kreditkartenauszüge
          - Abgrenzung der Übermittlung der Kreditkartenauszüge von einer spontanen
            Amtshilfe
      annotation:
        title: Prüfung des Umfangs und der Zulässigkeit der Amtshilfe bei der Übermittlung
          von Informationen
        description:
        - Vorliegen eines Amtshilfeersuchens mit konkretem Informationsumfang
        - Abgrenzung zwischen ersuchter und nicht ersuchter Information im Amtshilfeersuchen
        - Auslegung des Amtshilfeersuchens nach Treu und Glauben gemäß Art. 26 Wiener
          Übereinkommen über das Recht der Verträge
        - Beurteilung, ob die Übermittlung zusätzlicher Informationen als zulässige
          Amtshilfe oder als unzulässige spontane Amtshilfe gilt
        - Relevanz der Übermittlung von Kontoauszügen und damit verbundenen Kreditkartenauszügen
          für die Vermögensaufklärung
        - Bewertung der Bedeutung der Kreditkartenauszüge für die Ermittlung der Vermögensverhältnisse
          und Ansässigkeit des Betroffenen
    - number: '3.3'
      text: ''
      subparagraphs:
      - number: 3.3.1
        text: "Der Beschwerdef\x025CChrer macht geltend, er habe entgegen der Behauptung\
          \ im Ersuchen nie eine Aufforderung der franz\x0246sischen Beh\x0246rden\
          \ erhalten, Informationen zum betreffenden Konto offenzulegen. Bis heute\
          \ habe kein schriftlicher oder m\x025Cndlicher Austausch zwischen ihm und\
          \ der franz\x0246sischen Steuerbeh\x0246rde stattgefunden."
        subparagraphs: []
        annotation:
          title: Behauptung des Beschwerdeführers zur fehlenden Aufforderung durch
            ausländische Behörden
          description:
          - Vorliegen einer Aufforderung der französischen Behörden zur Offenlegung
            von Kontoinformationen
          - Kommunikation zwischen dem Beschwerdeführer und der französischen Steuerbehörde
          - Zeitpunkt und Form des Austauschs zwischen den Parteien
      - number: 3.3.2
        text: "Vorliegend hat die ersuchende Beh\x0246rde erkl\x022rt, dass sie alle\
          \ verf\x025Cfgbaren Mittel auf ihrem Hoheitsgebiet ausgesch\x0246pft habe,\
          \ um die Informationen zu erhalten, mit Ausnahme derjenigen, die unverh\x02\
          2ltnism\x022ssige Schwierigkeiten verursachen w\x025Crdten (Ersuchen, Seite\
          \ 4, Ziff. 14 Bst. d). Zudem hat sie im Ersuchen ausgef\x025Chrt, sie habe\
          \ den Beschwerdef\x025CChrer aufgefordert, Informationen zum betreffenden\
          \ Konto offenzulegen. Dieser Aufforderung sei er aber nicht nachgekommen\
          \ (Ersuchen, Seite 3, Ziff. 11). Zun\x022fst darf davon ausgegangen werden,\
          \ dass die Frist zur Einreichung der Steuererkl\x022rung f\x025CFr die massgeblichen\
          \ Steuerperioden 2018 bis 2021 im Zeitpunkt des Amtshilfegesuches (Datum)\
          \ verstrichen war. Die Vorinstanz hat sich in der Folge zurecht mit den\
          \ oben erw\x022hnten Erkl\x022rungen der ersuchenden Beh\x0246rde begn\x02\
          5Cgt, denn es liegen keine widerspr\x025Cchlichen Elemente vor, aufgrund\
          \ derer am guten Glauben des ersuchenden Staates zu zweifeln w\x025Cre (Urteil\
          \ des BGer 2C_716/2020 vom 18. Mai 2021 E 2.2.3). Der Einwand des Beschwerdef\x02\
          5CChrers, er sei in der relevanten Zeit gar nicht in Frankreich gewesen\
          \ und es habe deshalb auch kein Austausch zwischen ihm und der Steuerbeh\x02\
          46rde in Frankreich stattfinden k\x0246nnen, ist nicht stichhaltig. Das\
          \ Ersuchen nennt zumindest eine mutmassliche Adresse in Frankreich (Adresse)\
          \ und die Frage nach dem Wohnsitz ist nicht im Amtshilfeverfahren zu untersuchen\
          \ (BGer 2C_953/2020 vom 24. November 2021 E. 3.5). Nach dem v\x0246lkerrechtlichen\
          \ Vertrauensprinzip ist davon auszugehen, dass die ersuchende Beh\x0246rde\
          \ \x0253 wie in ihrem Ersuchen ausgef\x025Chrt \x0253 den Beschwerdef\x02\
          5CChrer aufgefordert hat, Informationen zum betreffenden Konto offenzulegen.\
          \ Ob der Beschwerdef\x025CChrer von der Aufforderung tats\x022chlich Kenntnis\
          \ erhalten hat, ist deshalb nicht im vorliegenden Verfahren zu kl\x022ren.\
          \ Das Subsidiarit\x022tsprinzip wurde eingehalten."
        subparagraphs: []
        annotation:
          title: Prüfung der Ausschöpfung verfügbarer Mittel und des Subsidiaritätsprinzips
            im Amtshilfeersuchen
          description:
          - Erklärung der ersuchenden Behörde zur Ausschöpfung aller verfügbaren Mittel
            im Hoheitsgebiet
          - Vorliegen unverhältnismässiger Schwierigkeiten bei der Beschaffung bestimmter
            Informationen
          - Aufforderung des Beschwerdeführers zur Offenlegung von Kontoinformationen
            durch die ersuchende Behörde
          - Fristablauf für die Einreichung der Steuererklärungen der relevanten Steuerperioden
            zum Zeitpunkt des Amtshilfegesuchs
          - Bewertung der Glaubwürdigkeit und des guten Glaubens der ersuchenden Behörde
            anhand der vorgelegten Erklärungen
          - Beurteilung der Relevanz von Einwänden des Beschwerdeführers bezüglich
            seines Aufenthaltsorts im Zusammenhang mit dem Amtshilfeverfahren
          - Anwendung des völkerrechtlichen Vertrauensprinzips auf die Angaben der
            ersuchenden Behörde
          - Abgrenzung der Zuständigkeit des Amtshilfeverfahrens hinsichtlich der
            Klärung des Wohnsitzes des Beschwerdeführers
          - Beachtung des Subsidiaritätsprinzips bei der Durchführung des Amtshilfeersuchens
      annotation:
        title: Prüfung der tatsächlichen Aufforderung zur Offenlegung von Kontoinformationen
          und der Glaubwürdigkeit des ersuchenden Staates
        description:
        - Behauptung des Beschwerdeführers über das Ausbleiben einer Aufforderung
          durch die französischen Behörden
        - Erklärung der ersuchenden Behörde über Ausschöpfung aller verfügbaren Mittel
          zur Informationsbeschaffung
        - Darstellung der Aufforderung zur Offenlegung von Kontoinformationen durch
          die ersuchende Behörde
        - Zeitlicher Ablauf der Frist zur Einreichung der Steuererklärung für die
          relevanten Steuerperioden
        - Bewertung der Glaubwürdigkeit und des guten Glaubens gegenüber der ersuchenden
          Behörde
        - Prüfung der Relevanz des Wohnsitzes des Beschwerdeführers im Amtshilfeverfahren
        - Anwendung des völkerrechtlichen Vertrauensprinzips auf die Angaben der ersuchenden
          Behörde
        - Beurteilung der Kenntnisnahme des Beschwerdeführers von der Aufforderung
          im Verfahren
        - Beachtung des Subsidiaritätsprinzips im Amtshilfeverfahren
    - number: '3.4'
      text: ''
      subparagraphs:
      - number: 3.4.1
        text: "Der Beschwerdef\x025CChrer legt dar, er sei 2012 nach \0A6\0A6\0A6\
          \ (\0DCberseegebiet des Vereinigten K\x025C6nigreichts) ausgewandert und\
          \ habe in der vorliegend relevanten Zeit (2018 bis 2021) \x0253ber keine\
          \ pers\x0246nliche, st\x022ndige und dauerhafte Wohnst\x025C4tte in Frankreich\
          \ verf\x025Cgt. Im Amtshilfeersuchen sei erw\x022hnt, dass er Eigent\x02\
          5CBCmer einer Liegenschaft an der (Adresse), sei. 80% dieser Liegenschaft\
          \ h\x022tten jedoch seiner Ex-Frau geh\x0246rt und im Rahmen der Scheidung\
          \ seien ihr die restlichen 20% als Ausgleichszahlung zugesprochen worden.\
          \ Er habe ab der Trennung im Jahr 2015 zu keinem Zeitpunkt \x025CFCber die\
          \ besagte Liegenschaft verf\x025Cgen k\x0246nnen. Im Amtshilfeersuchen sei\
          \ ebenfalls erw\x022hnt, dass er Eigent\x025CBCmer einer weiteren Liegenschaft\
          \ an der (Adresse), sei. Hierbei handele es sich aber bloss um einen 8 m2\
          \ grossen Abstellraum. Im \0DCbrigen wisse er nicht, weshalb die ersuchende\
          \ Beh\x0246rde vermute, er wohne an der (Adresse). Er sei in den Jahren\
          \ 2018 bis 2021 keiner Erwerbst\x022tigkeit in Frankreich nachgegangen.\
          \ Er sei zwar einziger Gesellschafter der SAS F._______ mit Sitz in (...),\
          \ welche am (Datum) gegr\x025Cndet worden sei. Seit der Gr\x025Cndung habe\
          \ er jedoch von dieser Gesellschaft kein Gehalt erhalten. Der Beschwerdef\x02\
          5CChrer macht zusammengefasst geltend, die im Ersuchen vorgebrachten Anhaltspunkte\
          \ f\x025CFr eine Steuerpflicht in Frankreich seien einer Plausibilit\x02\
          2tspr\x025CFCfung nicht zug\x0224nglich. Dem Amtshilfeersuchen sei mangels\
          \ voraussichtlicher Erheblichkeit der verlangten Informationen keine Folge\
          \ zu leisten."
        subparagraphs: []
        annotation:
          title: Darlegung der tatsächlichen Wohnsitz- und Erwerbssituation im Zusammenhang
            mit der Steuerpflicht in Frankreich
          description:
          - Tatsächliche Wohnsitzverhältnisse des Beschwerdeführers im relevanten
            Zeitraum
          - Eigentumsverhältnisse und Verfügungsbefugnis über in Frankreich gelegene
            Liegenschaften
          - Ausübung oder Unterlassung einer Erwerbstätigkeit in Frankreich
          - Beteiligung an und Einkünfte aus Gesellschaften mit Sitz in Frankreich
          - Beurteilung der Plausibilität der im Amtshilfeersuchen vorgebrachten Anhaltspunkte
            für eine Steuerpflicht in Frankreich
          - Relevanz der voraussichtlichen Erheblichkeit der verlangten Informationen
            für die Amtshilfe
      - number: 3.4.2
        text: "Die Rolle des ersuchten Staates beschr\x022nkt sich bei der Beurteilung\
          \ der voraussichtlichen Erheblichkeit auf eine Pr\x025CFCfung der Plausibilit\x02\
          2t des Ersuchens. Die ersuchte Beh\x0246rde muss nur \x025CFCberpr\x025CFCfen,\
          \ ob die ersuchten Informationen einen Bezug zum im Amtshilfeersuchen geschilderten\
          \ Sachverhalt haben und ob sie m\x0246glicherweise dazu geeignet sind, im\
          \ ausl\x022ndischen Verfahren verwendet zu werden (sog. Plausibilit\x02\
          2tskontrolle, E. 2.3.7). Im vorliegenden Amtshilfeersuchen geht Frankreich\
          \ aufgrund verschiedener Ankn\x025Cpfungspunkte von einer Steuerpflicht\
          \ in Frankreich betreffend die Jahre 2018 bis 2021 aus. Der Beschwerdef\x02\
          5CChrer verf\x025Cgt \x0253ber Eigentum an zwei Immobilien in (...), wohne\
          \ mutmasslich an einer Adresse in (\0A6\0A6), sei Gesch\x022ftsleiter einer\
          \ Gesellschaft in Frankreich und habe mehrere Bankkonten bei franz\x0246sischen\
          \ Banken, die allesamt in (...) er\x0246ffnet worden seien. Auf den im Ersuchen\
          \ geschilderten Sachverhalt ist grunds\x022tzlich abzustellen (sog. v\x02\
          46lkerrechtliches Vertrauensprinzip, vgl. E. 2.4). Es kann festgehalten\
          \ werden, dass die ersuchten Informationen einen Bezug zum geschilderten\
          \ Sachverhalt im Amtshilfeersuchen haben. Die franz\x0246sischen Beh\x02\
          46rden gehen aufgrund der Ankn\x025Cpfungspunkte von einer Steuerpflicht\
          \ in Frankreich aus und die ersuchten Informationen sind m\x0246glicherweise\
          \ geeignet, im Verfahren in Frankreich zur Erhebung der geschuldeten Steuer\
          \ verwendet zu werden."
        subparagraphs: []
        annotation:
          title: Prüfung der Plausibilität und des Bezugs der ersuchten Informationen
            im Amtshilfeersuchen
          description:
          - Beurteilung der Plausibilität des Amtshilfeersuchens durch die ersuchte
            Behörde
          - Überprüfung des Bezugs der ersuchten Informationen zum im Amtshilfeersuchen
            geschilderten Sachverhalt
          - Eignung der ersuchten Informationen zur Verwendung im ausländischen Verfahren
          - Anwendung des völkerrechtlichen Vertrauensprinzips bei der Beurteilung
            des Sachverhalts
      - number: 3.4.3
        text: "Der Beschwerdef\x025CChrer wendet ein, die Ausf\x025Cchrungen im Amtshilfeersuchen\
          \ seien falsch und reicht verschiedene Beweismittel ein. Nach der Rechtsprechung\
          \ kann der ersuchte Staat den Erkl\x022rungen des ersuchenden Staats dann\
          \ nicht mehr vertrauen, wenn diese sofort entkr\x022ftet werden (vgl. statt\
          \ vieler: Urteile des BVGer A-2259/2021 vom 18. Februar 2022 E. 2.2). Es\
          \ liegt dabei an der betroffenen Person, den Sachverhalt mittels Urkunden\
          \ klar und entscheidend zu widerlegen (vgl. statt vieler: Urteil des A-2427/2024\
          \ vom 22. November 2024 E. 2.4.2 mit Hinweisen). Dies gelingt dem Beschwerdef\x02\
          5CChrer indessen nicht. Die von ihm eingereichte Trennungsurkunde vom \0\
          A6\0A6\0A6 (Beschwerdebeilage 3) zeigt bloss auf, dass G._______ seit dem\
          \ (Datum) (\0ABdate de la s\x025Cparation\0BB) vom Beschwerdef\x025CChrer\
          \ getrennt ist. In keiner Weise enth\x022lt sie Angaben \x025CFCber einen\
          \ Eigentums\x025CFCbergang an einer Liegenschaft. Es ist demnach weiterhin\
          \ davon auszugehen, dass er in den Jahren 2018 bis 2021 (Verkauf am [Datum])\
          \ \x0253ber (Mit-)Eigentum an dieser Liegenschaft (Adresse) verf\x025Cgt\
          \ hat. Zudem ist ein weiteres Eigentum an einem Abstellraum (Adresse); Beschwerdebeilage\
          \ 4) unbestritten. Insofern war der Beschwerdef\x025CChrer aufgrund der\
          \ Eigentumsverh\x022ltnisse in Frankreich in der relevanten Zeit zumindest\
          \ beschr\x022nkt steuerpflichtig.\nIm \0DCbrigen f\x025Chrt selbst die Vollmacht\
          \ des jetzigen Vertreters (Beschwerdebeilage 2) als Adresse des Beschwerdef\x02\
          5CChrers die im Amtshilfeersuchen (als mutmasslich) genannte Adresse (\0\
          A6\0A6) auf. Insofern best\x022tigt der Beschwerdef\x025CChrer damit zumindest\
          \ einen aktuellen Bezug zu dieser Adresse in Frankreich. Weitere relevante\
          \ Beweismittel legte der Beschwerdef\x025CChrer nicht ins Recht.\nDer Beschwerdef\x02\
          5CChrer konnte die Ausf\x025Cchrungen der ersuchenden Beh\x0246rde folglich\
          \ nicht sofort entkr\x022ften und es ist auf diese abzustellen. Es liegen\
          \ demnach Ankn\x025Cpfungspunkte f\x025CFr seine Steuerpflicht in Frankreich\
          \ vor. Auch eine m\x0246gliche Steuerpflicht in \0A6\0A6 schliesst eine\
          \ Steuerpflicht des Beschwerdef\x025CChrers in Frankreich nicht aus. Die\
          \ Bestimmung der steuerlichen Ans\x0224ssigkeit ist eine materielle Frage,\
          \ die eine detaillierte Pr\x025CFCfung der Situation voraussetzt und von\
          \ der Schweiz als ersuchter Staat im Rahmen der Amtshilfe nicht behandelt\
          \ werden kann (Urteil des BGer 2C_953/2020 vom 24. November 2021 E. 3.7)."
        subparagraphs: []
        annotation:
          title: Prüfung der Glaubwürdigkeit der Angaben im Amtshilfeersuchen und
            der steuerlichen Ansässigkeit
          description:
          - Vertrauenswürdigkeit der Ausführungen im Amtshilfeersuchen bei sofortiger
            Widerlegung
          - Beweisführung der betroffenen Person zur Widerlegung des Sachverhalts
            mittels Urkunden
          - Bewertung der vorgelegten Beweismittel hinsichtlich Eigentumsverhältnissen
            an Liegenschaften
          - Feststellung der beschränkten Steuerpflicht aufgrund von Eigentumsverhältnissen
            in Frankreich
          - Ermittlung eines aktuellen Bezugs des Beschwerdeführers zu einer Adresse
            in Frankreich
          - Berücksichtigung weiterer relevanter Beweismittel des Beschwerdeführers
          - Anknüpfungspunkte für eine Steuerpflicht in Frankreich trotz möglicher
            Steuerpflicht in der Schweiz
          - Abgrenzung der materiellen Frage der steuerlichen Ansässigkeit von der
            Amtshilfe
      - number: 3.4.4
        text: "Aus dem Verweis auf das Urteil des Bundesverwaltungsgerichts A-3374/2018\
          \ vom 3. April 2019 vermag der Beschwerdef\x025CChrer nichts zu seinen Gunsten\
          \ abzuleiten. Im Unterschied zum Sachverhalt, der diesem Urteil zugrunde\
          \ liegt, macht der Beschwerdef\x025CChrer keine unbeschr\x022nkte Steuerpflicht\
          \ in der Schweiz geltend. Denn die einzige Konstellation, in der die Rechtsprechung\
          \ eine Vorabw\x025Crdigung des steuerrechtlichen Wohnsitzes im Rahmen des\
          \ Amtshilfeverfahrens ausnahmsweise zul\x022sst, bedingt, dass die betroffene\
          \ Person in der Schweiz unbeschr\x022nkt steuerpflichtig ist (statt vieler:\
          \ Urteil des BGer 2C_109/2022 vom 30. Januar 2023 E. 4.5.3)."
        subparagraphs: []
        annotation:
          title: Abgrenzung der Anwendbarkeit der Rechtsprechung zur unbeschränkten
            Steuerpflicht im Amtshilfeverfahren
          description:
          - Relevanz des Urteils A-3374/2018 für den vorliegenden Fall
          - Voraussetzung der unbeschränkten Steuerpflicht in der Schweiz für eine
            Vorabwürdigung des steuerrechtlichen Wohnsitzes
          - Unterschiede im Sachverhalt hinsichtlich der Steuerpflicht des Beschwerdeführers
          - Bedingungen für die Ausnahmetatbestände der Rechtsprechung im Amtshilfeverfahren
      annotation:
        title: Prüfung der voraussichtlichen Erheblichkeit und Plausibilität des Amtshilfeersuchens
          im Zusammenhang mit der Steuerpflicht in Frankreich
        description:
        - Darstellung und Prüfung der tatsächlichen Wohnsitzverhältnisse und Eigentumsverhältnisse
          des Beschwerdeführers in Frankreich im relevanten Zeitraum
        - Beurteilung der Plausibilität der im Amtshilfeersuchen enthaltenen Anknüpfungspunkte
          für eine Steuerpflicht in Frankreich
        - Bewertung der Glaubwürdigkeit und Widerlegung der Angaben im Amtshilfeersuchen
          durch den Beschwerdeführer anhand eingereichter Beweismittel
        - Abgrenzung der Zuständigkeit des ersuchten Staates bei der materiellen Bestimmung
          der steuerlichen Ansässigkeit
        - Rechtliche Würdigung einschlägiger Rechtsprechung zur Vorabwägung der Steuerpflicht
          im Amtshilfeverfahren
    - number: '3.5'
      text: "Der Beschwerdef\x025CChrer stellt schliesslich Schw\x022rzungsantr\x02\
        2ge hinsichtlich verschiedener Personen. Weil alle diese Personen hingegen\
        \ nicht rein zuf\x022llig (\0ABfruit d'un pur hasard\0BB; E. 2.3.8) in den\
        \ Ausz\x025CFCgen des Kontos respektive der Kreditkarten vermerkt sind, k\x02\
        4nnen sie gem\x022ss der Rechtsprechung nicht geschw\x022rzt werden. Dies\
        \ gilt auch f\x025CFr die Namen der in den Ausz\x025CFCgen erw\x022hnten Anw\x02\
        2lte. Es ist unbekannt, in welcher Beziehung der Beschwerdef\x025CChrer mit\
        \ diesen Personen stand. Es kann nicht ausgeschlossen werden, dass es sich\
        \ um gesch\x022ftliche Beziehungen gehandelt hat und diese Informationen f\x02\
        5CFr die Steuerpflicht des Beschwerdef\x025CChrers in Frankreich voraussichtlich\
        \ erheblich sein k\x0246nnen."
      subparagraphs: []
      annotation:
        title: Prüfung der Zulässigkeit von Schwärzungsanträgen bei nicht zufällig
          genannten Personen in Kontoauszügen
        description:
        - Anwendbarkeit der Rechtsprechung zur Schwärzung von Personen, die nicht
          rein zufällig in Kontoauszügen erscheinen
        - Prüfung der Beziehung des Beschwerdeführers zu den genannten Personen
        - Relevanz der geschäftlichen Beziehungen für die Steuerpflicht des Beschwerdeführers
        - Beurteilung der Erheblichkeit der Informationen für die Steuerpflicht in
          Frankreich
    - number: '3.6'
      text: "Zusammenfassend ist der Sachverhalt gen\x025CFCgend erstellt und die\
        \ von der Vorinstanz vorgesehene \0DCbermittlung gem\x022ss der Schlussverf\x02\
        5C6gung vom 11. Oktober 2023 zu best\x022tigen. Die Beschwerde ist damit vollumf\x02\
        2nglich abzuweisen."
      subparagraphs: []
      annotation:
        title: Bestätigung der Sachverhaltserstellung und der Übermittlungsanordnung
        description:
        - Genügende Erstellung des Sachverhalts durch die Vorinstanz
        - Bestätigung der von der Vorinstanz vorgesehenen Übermittlung gemäß Schlussverfügung
        - Entscheidung über den Ausgang der Beschwerde
    annotation:
      title: Prüfung der Zulässigkeit und Reichweite des Amtshilfeersuchens
      description:
      - Vorliegen einer unzulässigen Abfishing expedition
      - Übermittlung von Daten, die nicht vom ersuchenden Behörden verlangt wurden
      - Einhaltung des Subsidiaritätsprinzips bei der Amtshilfe
      - Voraussichtliche Erheblichkeit der ersuchten Informationen
      - Beurteilung von Schwärzungsanträgen bezüglich personenbezogener Daten
  - number: '4.'
    text: ''
    subparagraphs:
    - number: '4.1'
      text: "Ausgangsgem\x022ss hat der unterliegende Beschwerdef\x025CChrer die Verfahrenskosten\
        \ zu tragen (Art. 63 Abs. 1 VwVG). Die Verfahrenskosten sind auf Fr. 5\x02\
        019\x020000.-- festzusetzen (vgl. Art. 2 Abs. 1 i.V.m. Art. 4 des Reglements\
        \ vom 21. Februar 2008 \x0253ber die Kosten und Entsch\x022digungen vor dem\
        \ Bundesverwaltungsgericht [VGKE, SR 173.320.2]). Der einbezahlte Kostenvorschuss\
        \ in gleicher H\x024Fe ist zur Bezahlung der Verfahrenskosten zu verwenden."
      subparagraphs: []
      annotation:
        title: Festsetzung und Tragung der Verfahrenskosten
        description:
        - Zuständigkeit für die Tragung der Verfahrenskosten nach Art. 63 Abs. 1 VwVG
        - Festsetzung der Höhe der Verfahrenskosten unter Berücksichtigung des Reglements
          über Kosten und Entschädigungen vor dem Bundesverwaltungsgericht
        - Verwendung des einbezahlten Kostenvorschusses zur Begleichung der Verfahrenskosten
    - number: '4.2'
      text: "Eine Parteientsch\x022digung ist nicht zuzusprechen (vgl. Art. 64 Abs.\
        \ 1 VwVG e contrario und Art. 7 Abs. 1 VGKE e contrario sowie Art. 7 Abs.\
        \ 3 VGKE)."
      subparagraphs: []
      annotation:
        title: Voraussetzungen für die Zusprechung einer Parteientschädigung
        description:
        - Anwendbarkeit von Art. 64 Abs. 1 VwVG auf Parteientschädigungen
        - Relevanz von Art. 7 Abs. 1 VGKE für die Parteientschädigung
        - Bedeutung von Art. 7 Abs. 3 VGKE für die Zusprechung der Parteientschädigung
        - Ausschlussgründe für die Zusprechung einer Parteientschädigung
    annotation:
      title: Entscheidung über Verfahrenskosten und Parteientschädigung
      description:
      - Zuständigkeit und Verpflichtung zur Tragung der Verfahrenskosten
      - Festsetzung der Höhe der Verfahrenskosten
      - Verwendung des einbezahlten Kostenvorschusses zur Deckung der Verfahrenskosten
      - Entscheidung über den Anspruch auf Parteientschädigung
  - number: '5.'
    text: "Dieser Entscheid auf dem Gebiet der internationalen Amtshilfe in Steuersachen\
      \ kann gem\x022ss Art. 83 Bst. h des Bundesgesetzes vom 17. Juni 2005 \x0253ber\
      \ das Bundesgericht (BGG, SR 173.110) innerhalb von 10 Tagen nur dann mit Beschwerde\
      \ in \x0246ffentlich-rechtlichen Angelegenheiten an das Bundesgericht weitergezogen\
      \ werden, wenn sich eine Rechtsfrage von grunds\x022tzlichter Bedeutung stellt\
      \ oder wenn es sich aus anderen Gr\x025Cnden um einen besonders bedeutenden\
      \ Fall im Sinn von Art. 84 Abs. 2 BGG handelt (Art. 84a und Art. 100 Abs. 2\
      \ Bst. b BGG). Ob dies der Fall ist, entscheidet das Bundesgericht."
    subparagraphs: []
    annotation:
      title: Rechtsmittelbelehrung und Zulässigkeitsvoraussetzungen der Beschwerde
        an das Bundesgericht
      description:
      - Anwendbarkeit von Art. 83 Bst. h BGG auf den Entscheid in internationalen
        Amtshilfe-Steuersachen
      - Frist von 10 Tagen für die Einreichung der Beschwerde in öffentlich-rechtlichen
        Angelegenheiten
      - 'Voraussetzungen für die Zulässigkeit der Beschwerde: Vorliegen einer Rechtsfrage
        von grundsätzlicher Bedeutung'
      - 'Voraussetzungen für die Zulässigkeit der Beschwerde: Vorliegen eines besonders
        bedeutenden Falls gemäss Art. 84 Abs. 2 BGG'
      - Entscheidungskompetenz des Bundesgerichts über das Vorliegen der Zulässigkeitsvoraussetzungen
  is_structured: true
- name: sachverhalt
  content:
  - number: A.
    text: ''
    subparagraphs:
    - number: A.a
      text: 'Am (Datum) richtete die französische Steuerbehörde, die Direction Nationale
        des Vérifications de Situations Fiscales (nachfolgend: ersuchende Behörde)
        betreffend A._______ (nachfolgend: betroffene Person) gestützt auf Art. 28
        des Abkommens vom 9. September 1966 zwischen der Schweiz und Frankreich zur
        Vermeidung der Doppelbesteuerung auf dem Gebiet der Steuern vom Einkommen
        und vom Vermögen und zur Vermeidung von Steuerbetrug und Steuerflucht (SR
        0.672.934.91, DBA CH-FR) ein Amtshilfeersuchen an die Eidgenössische Steuerverwaltung
        (ESTV; nachfolgend auch: Vorinstanz).'
      subparagraphs: []
      annotation:
        title: Einleitung des Amtshilfeersuchens durch die französische Steuerbehörde
        description:
        - Identifikation der ersuchenden Behörde und der betroffenen Person
        - Rechtsgrundlage des Amtshilfeersuchens nach dem Doppelbesteuerungsabkommen
          zwischen der Schweiz und Frankreich
        - Adressierung des Amtshilfeersuchens an die Eidgenössische Steuerverwaltung
    - number: A.b
      text: 'Die ersuchende Behörde führte im Amtshilfeersuchen aus, die betroffene
        Person werde von den französischen Steuerbehörden für die Jahre 2018 bis 2021
        einer Steuerprüfung unterzogen. Die betroffene Person sei Eigentümerin einer
        Immobilie in (…) sowie zu 20% Miteigentümerin einer weiteren Immobilie in
        (…); letztere sei am (Datum) verkauft worden. Zudem sei die betroffene Person
        seit (…) Geschäftsführerin und alleinige Gesellschafterin einer Unternehmung
        mit Sitz in (...) und verfüge über mehrere Bankkonten, welche in den (...)
        Filialen eröffnet worden seien. Aufgrund eines Überweisungsauftrags habe die
        französische Behörde Kenntnis davon, dass die betroffene Person über das Schweizer
        Bankkonto Nr. (Kontonummer) bei der Bank B._______ (nachfolgend: Bank 1) verfüge.
        Hinsichtlich dieses Kontos ersuchte die französische Behörde um verschiedene
        Informationen.'
      subparagraphs: []
      annotation:
        title: Darstellung der steuerlichen und wirtschaftlichen Verhältnisse der
          betroffenen Person im Amtshilfeersuchen
        description:
        - Angabe der steuerlichen Prüfung der betroffenen Person durch ausländische
          Steuerbehörden
        - Beschreibung des Immobilienbesitzes und dessen Veränderungen der betroffenen
          Person
        - Darstellung der unternehmerischen Tätigkeit und Beteiligungsverhältnisse
          der betroffenen Person
        - Angabe der Bankkonten der betroffenen Person und deren geographische Verteilung
        - Begründung des Informationsersuchens anhand konkreter Hinweise auf Kontoinhaberstellung
    annotation:
      title: Darstellung des Amtshilfeersuchens der französischen Steuerbehörde an
        die Eidgenössische Steuerverwaltung
      description:
      - Erhebung des Amtshilfeersuchens gestützt auf das Doppelbesteuerungsabkommen
        zwischen der Schweiz und Frankreich
      - Identifikation der betroffenen Person und deren steuerliche Situation in Frankreich
      - Angaben zu Immobilienbesitz und -veräusserung der betroffenen Person
      - Angaben zur unternehmerischen Tätigkeit und Beteiligungsverhältnissen der
        betroffenen Person
      - Angaben zu Bankkonten der betroffenen Person in der Schweiz und konkretes
        Informationsersuchen zu einem bestimmten Konto
  - number: B.
    text: ''
    subparagraphs:
    - number: B.a
      text: Mit Editionsverfügung vom 25. April 2023 forderte die ESTV die Bank 1
        auf, ihr die ersuchten Informationen zuzustellen sowie die im Ausland ansässige
        betroffene Person über das laufende Amtshilfeverfahren zu informieren.
      subparagraphs: []
      annotation:
        title: Anordnung der Informationsübermittlung und Benachrichtigung im Amtshilfeverfahren
        description:
        - Veranlassung der Übermittlung ersuchter Informationen durch die ESTV an
          die Bank
        - Anordnung der Benachrichtigung der im Ausland ansässigen betroffenen Person
          über das Amtshilfeverfahren
    - number: B.b
      text: 'Mit Editionsverfügung von 16. Juni 2023 forderte die ESTV die C._______
        (nachfolgend: Bank 2) auf, ihr Informationen zuzustellen.'
      subparagraphs: []
      annotation:
        title: Anordnung der Informationsherausgabe durch die Eidgenössische Steuerverwaltung
        description:
        - Erlass einer Editionsverfügung durch die Eidgenössische Steuerverwaltung
        - Adressierung der Editionsverfügung an die betroffene Bank
        - Anforderung der Übermittlung von Informationen durch die Bank
    - number: B.c
      text: Die Banken 1 und 2 kamen der Aufforderung fristgerecht nach.
      subparagraphs: []
      annotation:
        title: Erfüllung der Aufforderung durch die Banken
        description:
        - Fristgerechte Reaktion der Banken auf die Aufforderung
        - Identifikation der beteiligten Banken bei der Erfüllung der Aufforderung
    annotation:
      title: Verfahren zur Informationsanforderung und Mitteilung im Amtshilfeverfahren
      description:
      - Erteilung von Editionsverfügungen zur Anforderung von Informationen durch
        die ESTV
      - Adressierung der Editionsverfügungen an betroffene Banken
      - Anordnung der Information der im Ausland ansässigen betroffenen Person über
        das Amtshilfeverfahren
      - Fristgerechte Erfüllung der Informationsanforderungen durch die Banken
  - number: C.
    text: ''
    subparagraphs:
    - number: C.a
      text: Die ESTV erteilte der Vertretung der betroffenen Person am 18. Juli 2023
        Akteneinsicht und die Möglichkeit zur Stellungnahme.
      subparagraphs: []
      annotation:
        title: Erteilung von Akteneinsicht und Stellungnahmemöglichkeit durch die
          ESTV
        description:
        - Gewährung der Akteneinsicht an die Vertretung der betroffenen Person
        - Bereitstellung der Möglichkeit zur Stellungnahme durch die Vertretung
        - Zeitpunkt der Erteilung der Akteneinsicht und Stellungnahmemöglichkeit
    - number: C.b
      text: Die Vertretung der betroffenen Person nahm am 10. August 2023 und 18.
        September 2023 Stellung. Sie widersetzte sich der Amtshilfe.
      subparagraphs: []
      annotation:
        title: Verfahrensstand und Stellungnahme der betroffenen Person zur Amtshilfe
        description:
        - Einholung der Stellungnahme der Vertretung der betroffenen Person
        - Datum der Stellungnahmen im Verfahren
        - Einwand gegen die Durchführung der Amtshilfe durch die betroffene Person
    annotation:
      title: Verfahrensablauf bei Akteneinsicht und Stellungnahmen der betroffenen
        Person
      description:
      - Erteilung der Akteneinsicht an die Vertretung der betroffenen Person
      - Gewährung der Möglichkeit zur Stellungnahme
      - Einreichung von Stellungnahmen durch die Vertretung der betroffenen Person
      - Vorbringen eines Widerspruchs gegen die Amtshilfe durch die Vertretung
  - number: D.
    text: Die ESTV erliess am 11. Oktober 2023 eine Schlussverfügung. Sie verfügte
      die Leistung der ersuchten Amtshilfe (Dispo.-Ziff. 1). Sie übermittle die Informationen
      zum Bankkonto bei der Bank 1 sowie Informationen zu vier Kreditkarten bei der
      Bank 2 (Dispo.-Ziff. 2). Die ESTV werde die ersuchende Behörde darauf hinweisen,
      dass die genannten Informationen im ersuchenden Staat nur in Verfahren gegen
      die betroffene Person verwendet werden dürften (Dispo.-Ziff. 3).
    subparagraphs: []
    annotation:
      title: Verfügung über die Erbringung und Verwendung der Amtshilfeinformationen
      description:
      - Erlass der Schlussverfügung durch die Eidgenössische Steuerverwaltung
      - Anordnung der Leistung der ersuchten Amtshilfe
      - Bestimmung der zu übermittelnden Informationen zu Bankkonto und Kreditkarten
      - Hinweis an die ersuchende Behörde zur zulässigen Verwendung der übermittelten
        Informationen
  - number: E.
    text: ''
    subparagraphs:
    - number: E.a
      text: 'Am 10. November 2023 erhob die betroffene Person (nachfolgend auch: Beschwerdeführer)
        gegen die Schlussverfügung der ESTV vom 11. Oktober 2023 Beschwerde an das
        Bundesverwaltungsgericht mit folgenden Anträgen:

        1. Es sei die Schlussverfügung der ESTV vom 11. Oktober 2023 aufzuheben und
        es sei keine Amtshilfe zu leisten.

        2. Subeventualiter sei die Sache an die ESTV zur Einholung des Nachweises
        der Zustellung sowie Vornahme der gesetzeskonformen Anpassungen und Schwärzung
        zurückzuweisen.

        3. Sub-Subeventualiter seien die Informationen und die Annex 1 bis 4 wie folgt
        zu schwärzen bzw. anzupassen und erst in revidierter Form oder gar nicht auszutauschen:

        Antwort auf Frage a) hat wie folgt zu lauten:

        "Selon les informations fournies par la banque B._______, Monsieur A._______
        est titulaire et ayant droit économique du compte (Kontonummer) ouvert Ie
        (Datum). Veuillez trouver, en annexe 1, les états de fortune et les relevés
        de ledit compte et en annexe 2 le formulaire A. Ledit compte n''a pas été
        clôturé pendant la période concernée."

        Streichung von:

        Aussi, Monsieur A._______ est titulaire de 4 cartes de crédit auprès C._______,
        liées à la relation bancaire (Kontonummer) susmentionnée, avec ces identifications:

        VISA Gold n. (Kontonummer)

        MC Gold n. (Kontonummer)

        VISA Cl n. (Kontonummer)

        MC Cl n. (Kontonummer)

        Veuillez trouver, en annexe 3, les relevés de compte desdites cartes de crédit
        et en annexe 4 les relatifs formulaires d''ouverture.

        Annex 1

        Schwärzung der Überweisungen betreffend folgende Personen:

        D._______ (S. 8, S. 91, S. 124, S. 148, S. 149, S. 229, S. 242);

        E._______ (S. 244);

        Maître F._______ (S. 73, S. 82, S. 92),

        Maître G._______ (S. 73, S. 92),

        Maître H._______ (S. 73, S. 197, S. 243),

        I._______ (S. 73, S. 92).

        Annex 3

        Annex 3 ist nicht auszutauschen.

        Annex 4

        Annex 4 ist nicht auszutauschen.

        4. Alles unter Kosten- und Entschädigungsfolgen zulasten des Bundes.'
      subparagraphs: []
      annotation:
        title: Darlegung der Beschwerdeanträge gegen die Schlussverfügung der ESTV
        description:
        - Antrag auf Aufhebung der Schlussverfügung der ESTV vom 11. Oktober 2023
        - Antrag auf Verweigerung der Amtshilfe
        - Antrag auf Rückweisung an die ESTV zur Nachweiserhebung der Zustellung
        - Antrag auf gesetzeskonforme Anpassungen und Schwärzungen der Dokumente
        - Antrag auf Schwärzung und Anpassung spezifischer Informationen und Annexdokumente
        - Antrag auf Kosten- und Entschädigungsfolgen zulasten des Bundes
    - number: E.b
      text: Zur Begründung bringt der Beschwerdeführer insbesondere vor, er habe in
        den Jahren 2018 bis 2021 in (…) (Überseegebiet des Vereinigten Königreichs)
        gelebt. Er habe in diesen Jahren über keine relevante Wohnstätte in Frankreich
        verfügt. Das Zentrum seiner wirtschaftlichen Interessen habe sich in den Jahren
        2018 bis 2021 nicht in Frankreich befunden. Entgegen der Behauptung im Ersuchen
        habe er nie eine Aufforderung der französischen Steuerverwaltung erhalten,
        Informationen zum Konto Nr. (Kontonummer) offenzulegen. Weil keine Ansässigkeit
        bestehe, komme das Amtshilfeersuchen einer «fishing expedition» gleich. Im
        Übrigen sei nach den Kreditkartenabrechnungen und Eröffnungsunterlagen gar
        nicht gefragt worden. Insofern liege eine unzulässige spontane Amtshilfe vor.
        Es sei zudem nicht ersichtlich, inwiefern Angaben über die Identität von Zahlungsempfängern
        für die französischen Steuerbehörden relevant sein könnten.
      subparagraphs: []
      annotation:
        title: Vorbringen zur Wohnsitz- und Wirtschaftssitzverhältnissen sowie zur
          Zulässigkeit des Amtshilfeersuchens
        description:
        - Behauptung des fehlenden Wohnsitzes in Frankreich in den Jahren 2018 bis
          2021
        - Behauptung des fehlenden Zentrums der wirtschaftlichen Interessen in Frankreich
          in den Jahren 2018 bis 2021
        - Bestreiten des Erhalts einer Aufforderung zur Offenlegung von Kontoinformationen
          durch die französische Steuerverwaltung
        - Behauptung der Unzulässigkeit des Amtshilfeersuchens als «fishing expedition»
          mangels Ansässigkeit
        - Behauptung der unzulässigen spontanen Amtshilfe aufgrund fehlender Nachfrage
          nach Kreditkartenabrechnungen und Eröffnungsunterlagen
        - Infragestellung der Relevanz von Angaben zur Identität von Zahlungsempfängern
          für die französischen Steuerbehörden
    annotation:
      title: Darlegung der Beschwerdeanträge und Begründung der Beschwerdeführerin
        gegen die Schlussverfügung der ESTV
      description:
      - Anträge der Beschwerdeführerin auf Aufhebung der Schlussverfügung der ESTV
      - Anträge auf Rückweisung zur Einholung von Zustellungsnachweis und gesetzeskonformer
        Anpassung sowie Schwärzung
      - Anträge auf Schwärzung und Anpassung von Informationen und Annexen im Amtshilfeverfahren
      - Begründung der Beschwerdeführerin zur fehlenden Ansässigkeit in Frankreich
        in den Jahren 2018 bis 2021
      - Begründung zur Abwesenheit einer Aufforderung der französischen Steuerverwaltung
        zur Offenlegung der Kontoinformationen
      - Behauptung der unzulässigen spontanen Amtshilfe und deren Abgrenzung von zulässigem
        Amtshilfeersuchen
      - Infragestellung der Relevanz der Angaben über Identität von Zahlungsempfängern
        für die französischen Steuerbehörden
