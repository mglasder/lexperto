task: "Erstelle den ersten Absatz des Urteils betreffend Amtshilfe in Steuersachen. In diesem Absatz wird festgehalten, wann (Datum), basierend auf welcher gesetzlichen Grundlage (dies ist in der Regel ein Artikel im Doppelbesteuerungsabkommen zwischen dem Land der ausländischen bzw. ersuchenden Behörde und der Schweiz, der sich mit der Amtshilfe befasst), betreffend welche Person (dies ist die sogenannte «betroffene Person»; über diese möchte die ausländische Behörde letztlich Informationen erhalten, in der Regel um sie der Besteuerung im Land der ersuchenden Behörde zuzuführen) die ausländische Behörde (dies ist die sogenannte «ersuchende Behörde») das Amtshilfeersuchen an die Eidgenössische Steuerverwaltung stellt. Gegebenenfalls möchte die ersuchende Behörde mithilfe des Amtshilfeersuchens Informationen über eine andere Person erhalten (dies ist dann die sogenannte «Informationsinhaberin», in der Regel eine schweizerische Gesellschaft (wird dann auch als schweizerische Gesellschaft bezeichnet), welche nicht die betroffene Person ist."
example: "Halte dich bei den Formulierungen möglichst nahe an folgendem Beispiel:\n Am 1. September 2024 richtete die zuständige österreichische Steuerbehörde, das Central Liaison Office for International Cooperation, Bundesministerium für Finanzen, Brehmstrasse 14, 1110 Wien (nachfolgend: CLO oder ersuchende Behörde), gestützt auf Art. 26 des Abkommens vom 30. Januar 1974 zwischen der Schweizerischen Eidgenossenschaft und der Republik Österreich zur Vermeidung der Doppelbesteuerung auf dem Gebiete der Steuern vom Einkommen und vom Vermögen (SR 0.672.916.31, nachfolgend: DBA CH-AT) ein Amtshilfeersuchen an die Eidgenössische Steuerverwaltung (ESTV) betreffend X GmbH (nachfolgend auch: betroffene Person). Als Informationsinhaberin wurde die Y AG (nachfolgend: schweizerische Gesellschaft) genannt."