task: "Allgemeine Ausführungen zu sogenannten 'nicht betroffenen Personen': Ausführungen, unter welchen Umständen Informationen zu nicht betroffenen Personen übermittelt werden dürfen und was unter einer nicht betroffenen Person zu verstehen ist"
examples:
  - "Die Übermittlung von Informationen zu Personen, die nicht formell betroffene Personen sind, ist gemäss Art. 4 Abs. 3 StAhiG unzulässig, wenn diese Informationen für die Beurteilung der Steuersituation der betroffenen Person nicht voraussichtlich relevant sind oder wenn berechtigte Interessen von Personen, die nicht betroffene Personen sind, das Interesse der ersuchenden Seite an der Übermittlung der Informationen überwiegen (vgl. Urteile des BVGer A-4987/2021 vom 20. Mai 2022 E. 2.2.5; A-5447/2020 vom 6. Oktober 2021 E. 2.4.4).    Rechtsprechungsgemäss ist der Begriff der «nicht betroffenen Person» nach Art. 4 Abs. 3 StAhiG restriktiv zu verstehen (vgl. BGE 142 II 161 E. 4.6.1 f.). Damit sollen in Anwendung des Verhältnismässigkeitsprinzips Personen geschützt werden, die nichts mit dem im Amtshilfeersuchen geschilderten Sachverhalt zu tun haben, deren Namen also rein zufällig in den weiterzuleitenden Dokumenten auftauchen («fruit d'un pur hasard»; vgl. statt vieler: Urteil des BGer 2C_287/2019 vom 13. Juli 2020 E. 5; Urteil des BVGer A-4987/2021 vom 20. Mai 2022 E. 2.2.6 m.w.H.). In gewissen Konstellationen ist es unumgänglich, auch über Personen Informationen zu erteilen, deren Steuerpflicht im ersuchenden Staat nicht geltend gemacht wird (statt vieler: Urteil des BVGer A-4228/2018 vom 26. August 2019 E. 2.6.3). Können die ersuchten Informationen für die Steuerpflicht der im ersuchenden Staat zu besteuernden Person voraussichtlich erheblich sein und ist ihre Übermittlung unter Verhältnismässigkeitsgesichtspunkten erforderlich, d.h. wenn die Aussonderung, Schwärzung oder anderweitige Unkenntlichmachung der Informationen den Zweck des Amtshilfeersuchens vereiteln würde, so sind sie dem ersuchenden Staat zu übermitteln (vgl. ausführlich mit Beispielen: BGE 144 II 29 E. 4.2.2 ff.; 141 II 436 E. 4.2.3 f.; Urteil des BGer 2C_615/2018 vom 26. März 2019 E. 3.1; Urteil des BVGer A-4987/2021 vom 20. Mai 2022 E. 2.2.6 m.w.H.)."
mandatory: false
requirement_for_analysis: "Nein, nur wenn geltend gemacht wird, es handle sich bei den ersuchten Informationen (zumindest teilweise) um Informationen über sogenannte 'nicht betroffene Personen'"
