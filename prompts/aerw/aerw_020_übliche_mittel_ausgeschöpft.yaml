task: "Prüfung, ob die ersuchende Behörde die üblichen Mittel ausgeschöpft hat"
examples:
  - "Die Beschwerdeführerin macht eine Verletzung des Subsidiaritätsprinzips (E. 3.2.2) geltend, wenn sie vorbringt, dass die ersuchende Behörde die üblichen innerstaatlichen Mittel nicht ausgeschöpft habe. Aus der Schlussverfügung vom (Datum) gehe nicht hervor, ob die ersuchende Behörde allfällige ihr nach innerstaatlichem Recht zur Verfügung stehende Mittel ausgeschöpft hat, um die gewünschten Informationen zu erlangen. Die Information, dass sie (die Beschwerdeführerin) ein kantonales Ruling habe, sei öffentlich zugänglich (in den über die U.S. Securities and Exchange Commission erhältlichen Jahresberichten ihrer amerikanischen Muttergesellschaft Z. Inc für die Jahre 2020 und 2021 [Beschwerdebeilage 7]) und hätte mittels einfacher Recherche im Internet gefunden werden können. Daher sei die Amtshilfe an Italien zu verweigern.  Im Amtshilfeersuchen hat die GdF erklärt, dass alle auf dem eigenen Staatsgebiet zur Verfügung stehenden Mittel ausgeschöpft worden seien, mit Ausnahme solcher, die mit unverhältnismässigem Aufwand verbunden gewesen wären (vgl. Sachverhalt Bst. A.d). Diese Erklärung der GdF hat die ESTV auch in ihrer Schlussverfügung vom (Datum) wiedergegeben. Ferner hat die GdF den Sachverhalt im Rahmen der innerstaatlichen Untersuchung so präzise abgeklärt, dass sie gestützt auf diesen das vorliegende Amtshilfeersuchen stellen konnte.  Mit dem Vorbringen, dass die Information betreffend das kantonale Ruling der Beschwerdeführerin öffentlich zugänglich sei, gelingt es der Beschwerdeführerin nicht, ernsthafte Zweifel an der Richtigkeit der Erklärung der GdF betreffend die Ausschöpfung der üblichen innerstaatlichen Mittel zu begründen bzw. die Erklärung sofort zu entkräften. Gemäss bundesgerichtlicher Rechtsprechung kann von einer ausländischen Behörde unter dem Titel des Subsidiaritätsprinzips nicht erwartet werden, sich mit der Funktionsweise und dem Inhalt der hiesigen öffentlichen Register vertraut zu machen (Urteil des BGer 2C_615/2018 vom 26. März 2019 E. 7.4). Entsprechend kann dies auch nicht in Bezug auf die Funktionsweise und den Inhalt von weiteren, aus Sicht der ersuchenden Behörde ausländischen öffentlichen Registern verlangt werden. Ohnehin liesse sich den öffentlich zugänglichen Jahresberichten der Z. Inc für die Jahre 2020 und 2021 lediglich entnehmen, dass die Beschwerdeführerin über ein kantonales Ruling verfügt. Über den Inhalt eines allfälligen Rulings, wie ihn die ersuchende Behörde im Amtshilfeersuchen anfordert («copia dell'eventuale accordo di ruling, o altro documento equipollente»; vgl. Sachverhalt Bst. A.c), lassen sich den genannten Jahresberichten keine näheren Informationen entnehmen.  Soweit die Beschwerdeführerin mit ihrem Vorbringen impliziert, die GdF würde allenfalls Informationen verlangen, in deren Besitz sie schon ist, kann diese daraus ebenfalls nichts zu ihren Gunsten ableiten. Informationen können nämlich auch dann als voraussichtlich erheblich zur Anwendung oder Durchsetzung des innerstaatlichen Rechts qualifiziert werden, wenn sie zwecks Überprüfung schon vorhandener, aber nicht völlig zweifelsfreier Erkenntnisse der Behörden des ersuchenden Staates verlangt werden (vgl. zu diesem sog. Verifikationszweck Urteile des BVGer A-5447/2020 vom 6. Oktober 2021 E. 3.2.2.3, A-4811/2019 vom 26. April 2021 E. 5.1, A-765/2019 vom 20. September 2019 E. 3.3.2.3 m.w.H. [bestätigt durch Urteil des BGer 2C_864/2019 vom 17. August 2020]). Somit ist das Subsidiaritätsprinzip vorliegend eingehalten."
mandatory: false
requirement_for_analysis: "Die Beschwerdeführerin macht gelted, dass das Subsidiaritätsprinzip verletzt sei."
