task: "Allgemeine Ausführungen zum sogenannten 'völkerrechtlichen Vertrauensprinzip'"
examples:
  - "Ein wichtiges Element der internationalen Behördenzusammenarbeit bildet das völkerrechtliche Vertrauensprinzip. Diesem Grundsatz nach besteht - ausser bei offensichtlichem Rechtsmissbrauch oder bei berechtigten Fragen im Zusammenhang mit dem Schutz des schweizerischen oder internationalen Ordre public (vgl. Art. 7 StAhiG) - prinzipiell kein Anlass, an Sachverhaltsdarstellungen und Erklärungen anderer Staaten zu zweifeln (vgl. BGE 146 II 150 E. 7.1, 142 II 218 E. 3.1; Urteil des BVGer A-4830/2021 vom 23. Oktober 2023 E. 2.5.1 m.w.H.).    Aufgrund des völkerrechtlichen Vertrauensprinzips ist die ersuchte Behörde an die Darstellung des Sachverhalts im Ersuchen insoweit gebunden, als diese nicht wegen offensichtlicher Fehler, Lücken oder Widersprüche sofort entkräftet werden kann (BGE 142 II 218 E. 3.1, 139 II 451 E. 2.2.1; Urteile des BVGer A-4987/2021 vom 20. Mai 2022 E. 2.3, A-2259/2021 vom 18. Februar 2022 E. 2.2, A-2175/2021 vom 22. September 2021 E. 2.3). Gleiches gilt für die vom ersuchenden Staat abgegebenen Erklärungen. Werden diese sofort entkräftet, kann der ersuchte Staat ihnen nicht mehr vertrauen (vgl. Urteile des BVGer A-2259/2021 vom 18. Februar 2022 E. 2.2, A-674/2020 vom 24. August 2021 E. 3.9). Das Vertrauensprinzip schliesst indessen nicht aus, dass der ersuchte Staat vom ersuchenden Staat zusätzliche Erklärungen verlangt, wenn ernsthafte Zweifel an der Einhaltung der völkerrechtlichen Grundsätze bestehen (BGE 146 II 150 E. 7.1, 144 II 206 E. 4.4). Allerdings kann die Vermutung, dass der ersuchende Staat nach Treu und Glauben handelt, nur aufgrund erstellter Umstände umgestossen werden (BGE 144 II 206 E. 4.4, 143 II 202 E. 8.7.1).    Soweit die Behörden des ersuchenden Staates verpflichtet sind, den massgeblichen Sachverhalt darzulegen, kann von ihnen nicht erwartet werden, dass sie dies bereits lückenlos und völlig widerspruchsfrei tun. Dies wäre mit Sinn und Zweck der Amtshilfe nicht vereinbar, sollen doch aufgrund von Informationen und Unterlagen, die sich im ersuchten Staat befinden, bisher im Dunkeln gebliebene Punkte erst noch geklärt werden (vgl. BGE 142 II 161 E. 2.1.1; BVGE 2011/14 E. 2; Urteil des BVGer A-765/2019 vom 20. September 2020 E. 2.1.6). Aus diesem Grund verlangt die Rechtsprechung von der ersuchenden Behörde nicht den strikten Beweis des Sachverhalts, sondern diese muss nur - aber immerhin - hinreichende Verdachtsmomente für dessen Vorliegen dartun (BGE 139 II 451 E. 2.1 und 2.2.1, 139 II 404 E. 7.2.2; Urteil des BVGer A-765/2019 vom 20. September 2020 E. 2.1.6)."
mandatory: false
requirement_for_analysis: "Nein, nur wenn das Vertrauensprinzip argumentativ vom Beschwerdeführer oder der Vorinstanz verwendet wird bzw. wenn der Beschwerdeführer die Richtigkeit der Ausführungen der ersuchenden Behörde im Amtshilfeersuchen in Zweifel zieht"
