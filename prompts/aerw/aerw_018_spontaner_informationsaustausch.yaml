task: "Allgemeine Ausführungen zum sogenannten 'spontanen Informationsaustausch'"
examples:
  - "Im Rahmen der Erfüllung eines internationalen Amtshilfeersuchens in Steuersachen liegt ein spontaner Informationsaustausch vor, wenn Informationen von der ersuchten Behörde übermittelt werden, die voraussichtlich erheblich sind, jedoch von der ersuchenden Behörde nicht angefordert wurden (BGE 147 II 116 E. 5.1; Urteil des BGer 2C_1087/2016 vom 31. März 2017 E. 3.3; vgl. auch die Definition in Art. 3 Bst. d StAhiG). Die Vornahme eines spontanen Informationsaustausches ist nicht dem Ermessen der Bundesverwaltung überlassen, sondern setzt eine ausdrückliche gesetzliche Grundlage im innerstaatlichen Recht voraus (BGE 147 II 116 E. 5.1; Urteil des BGer 2C_1087/2016 vom 31. März 2017 E. 3.3.1).    Die Feststellung, ob eine Information ersucht wurde oder nicht - und damit Amtshilfe auf Ersuchen oder spontaner Natur vorliegt -, ist eine Frage der Auslegung des Amtshilfeersuchens (BGE 147 II 116 E. 5.2). Diese Auslegung muss im Lichte des von der ersuchenden Behörde verfolgten Zwecks erfolgen und darf den wirksamen bzw. möglichst weitgehenden Informationsaustausch nicht behindern (BGE 147 II 116 E. 5.2; Bst. ebis Ziffer 3 des Zusatzprotokolls zum DBA CH-IT). Mit anderen Worten: Der ersuchte Staat muss die Amtshilfeersuchen nach dem völkerrechtlichen Prinzip von Treu und Glauben auslegen (BGE 147 II 116 E. 5.2)."
mandatory: false
requirement_for_analysis: "Nein, nur wenn geltend gemacht wird, es liege ein spontaner Informationsaustausch vor"
