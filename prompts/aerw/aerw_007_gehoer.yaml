task: "Rechtliches Gehör: Prüfung, ob die Vorinstanz das rechtliche Gehör des Beschwerdeführers verletzt hat"
examples:
  - "In einem ersten Schritt ist auf die formelle Rüge der Verletzung des rechtlichen Gehörs einzugehen. Die Beschwerdeführerin rügt, die Vorinstanz habe das rechtliche Gehör verletzt, indem sie ihr das von der ersuchenden Behörde eingereichte Amtshilfeersuchen vom (Datum) nicht vor Erlass der angefochtenen Schlussverfügung vom (Datum) zugestellt habe.    Gemäss Art. 29 Abs. 2 der Bundesverfassung der Schweizerischen Eidgenossenschaft vom 18. April 1999 (BV, SR 101) haben die Parteien Anspruch auf rechtliches Gehör. Das Recht auf Akteneinsicht ist Teil dieses verfassungsrechtlichen Anspruchs (BGE 140 V 464 E. 4.1, 135 II 286 E. 5.1; Urteil des BGer 2C_112/2015 vom 27. August 2015 E. 2). Auf spezialgesetzlicher Ebene enthält das Steueramtshilfegesetz Vorschriften, die aus dem verfassungsrechtlichen Anspruch auf rechtliches Gehör abgeleitet sind. Dazu zählt insbesondere Art. 14 Abs. 1 StAhiG, wonach die ESTV die betroffene Person über die wesentlichen Teile des Ersuchens informiert. Zu diesen Vorschriften gehört ferner auch die Regelung von Art. 14 Abs. 2 StAhiG, nach welcher die ESTV die weiteren Personen, von deren Beschwerdeberechtigung sie nach Art. 19 Abs. 2 StAhiG ausgehen muss, über das Amtshilfeverfahren informiert (vgl. zum Ganzen: Urteil des BVGer A-360/2017 vom 5. April 2017 E. 2.3). Nach der bundesgerichtlichen Rechtsprechung ist die ESTV gemäss Art. 14 Abs. 2 StAhiG nur gehalten, die vom Amtshilfeverfahren nicht betroffenen Personen, deren Name aber in den zur Übermittlung vorgesehenen Unterlagen erscheint, über den Bestand dieses Verfahrens zu informieren, wenn deren Beschwerderecht im Sinne von Art. 19 Abs. 2 StAhiG aus den Akten klarerweise hervorgeht bzw. «evident» ist (vgl. BGE 146 I 172 E. 7.3.1 f.; Urteil des BGer 2C_687/2019 vom 13. Juli 2020 E. 6.2 und 6.3.1).    Die Vorinstanz hat die Beschwerdeführerin mit Schreiben vom (Datum) über den wesentlichen Inhalt des Amtshilfeersuchen informiert (vgl. Sachverhalt Bst. A.f). Das Bundesverwaltungsgericht hat den betreffenden Inhalt mit dem tatsächlichen Inhalt des Amtshilfeersuchen verglichen, was zum Ergebnis führt, dass die Vorinstanz in Übereinstimmung mit Art. 14 Abs. 1 StAhiG der Beschwerdeführerin den wesentlichen Inhalt schriftlich korrekt mitgeteilt und ihr auch Gelegenheit gegeben hat, sich rechtsgenügend dazu zu äussern und Beweismittel zu bezeichnen. Eine Verletzung des rechtlichen Gehörs liegt deshalb nicht vor."
mandatory: false
requirement_for_analysis: "Nein, nur wenn beantragt bzw. geltend gemacht"
