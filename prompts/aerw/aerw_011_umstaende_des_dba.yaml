task: "Prüfung, unter welchen Umständen die ersuchende Behörde gemäss dem anwendbaren DBA ein Amtshilfeersuchen stellen kann"
examples:
  - "Gemäss Bst. ebis Ziff. 1 des Zusatzprotokolls zum DBA CH-IT besteht Einvernehmen darüber, dass der ersuchende Vertragsstaat ein Begehren um Austausch von Informationen erst dann stellt, wenn er alle in seinem innerstaatlichen Steuerverfahren vorgesehenen üblichen Mittel zur Beschaffung der Informationen ausgeschöpft hat (sog. Subsidiaritätsprinzip).    Aufgrund des völkerrechtlichen Vertrauensprinzips (nachfolgend E. 3.5) besteht rechtsprechungsgemäss kein Anlass, an einer von der ersuchenden Behörde abgegebenen Erklärung der Ausschöpfung aller üblichen innerstaatlichen Mittel zu zweifeln, es sei denn, es liegt ein gegen die Einhaltung des Subsidiaritätsprinzips sprechendes sowie ein ernsthafte Zweifel an der Richtigkeit der Erklärung begründendes konkretes Element vor (vgl. BGE 144 II 206 E. 3.3.2; Urteile des BVGer A-2324/2021 vom 26. Oktober 2022 E. 2.3.3, A-4987/2021 vom 20. Mai 2022 E. 2.4.2, A-6744/2019 vom 15. Dezember 2020 E. 2.5.2)."
mandatory: true
