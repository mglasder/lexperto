task: "Allgemeine Ausführungen zum sogenannten 'Subsidiaritätsprinzip'"
examples:
  - Gemäss Ziff. IV Abs. 1 des Protokolls zum DBA CH-ES «besteht Einvernehmen darüber, dass der ersuchende Vertragsstaat ein Begehren um Austausch von Informationen erst dann stellt, wenn er zur Beschaffung der Informationen alle in seinem innerstaatlichen Steuerverfahren vorgesehenen üblichen Mittel, die nicht mit unverhältnismässigen Schwierigkeiten verbunden sind, ausgeschöpft hat» (sog. Subsidiaritätsprinzip).    Aufgrund des völkerrechtlichen Vertrauensprinzips (nachfolgend E. 2.7) besteht rechtsprechungsgemäss kein Anlass, an einer von der ersuchenden Behörde abgegebenen Erklärung der Ausschöpfung aller üblichen innerstaatlichen Mittel zu zweifeln, es sei denn, es liegt ein gegen die Einhaltung des Subsidiaritätsprinzips sprechendes sowie ein ernsthafte Zweifel an der Richtigkeit der Erklärung begründendes konkretes Element vor (vgl. BGE 144 II 206 E. 3.3.2; Urteile des BVGer A-2324/2021 vom 26. Oktober 2022 E. 2.3.3, A-4987/2021 vom 20. Mai 2022 E. 2.4.2, A-6744/2019 vom 15. Dezember 2020 E. 2.5.2).    Was beim innerstaatlichen Steuerverfahren unter den «üblichen Mitteln» (E. 2.5.1) zur Beschaffung der Informationen zu verstehen ist, wird im DBA CH-ES nicht weiter definiert. Aus der Auslegung der fraglichen Bestimmung nach völkerrechtlichen Regeln ergibt sich, dass nicht das Ausschöpfen «sämtlicher» möglicher Mittel durch den ersuchenden Staat verlangt wird (Urteile des BVGer A-840/2022 vom 19. Januar 2023 E. 2.3.3, A-3755/2020 vom 14. Juli 2022 E. 4.2.3). Vielmehr kann ein Mittel nicht mehr als «üblich» bezeichnet werden, wenn es dem ersuchenden Staat - im Vergleich zu einem Amtshilfeersuchen - einen unverhältnismässigen Aufwand verursachen würde oder wenn die Erfolgschancen als sehr gering einzuschätzen sind. Dem ersuchenden Staat wird somit eine gewisse Freiheit belassen, um zu entscheiden, in welchem Zeitpunkt er ein Amtshilfeersuchen stellen möchte (Urteile des BVGer A-840/2022 vom 19. Januar 2023 E. 2.3.3, A-5650/2021 vom 2. November 2022 E. 3.2.6). Selbst wenn es der ersuchenden Behörde möglich wäre, eine betroffene Person mittels Zwangsmassnahmen zur Herausgabe der Informationen aufzufordern, führt dies nicht dazu, dass (noch) kein Amtshilfeersuchen gestellt werden darf (A-5650/2021 vom 2. November 2022 E. 3.2.6).    Zur Wahrung des Subsidiaritätsprinzips ist etwa eine Befragung der betroffenen Person nicht notwendig, bevor ein Amtshilfeersuchen gestellt wird (Urteile des BVGer A-4603/2019 vom 17. August 2020 E. 2.4.2, A-5648/2014 vom 12. Februar 2015 E. 7). Es genügt, wenn der ersuchende Staat anhand innerstaatlich vorgesehener Mittel das Ermittlungsobjekt hinreichend präzisiert hat, so dass die Leistung von Amtshilfe ermöglicht wird (Urteile des BVGer A-4603/2019 vom 17. August 2020 E. 2.4.2, A-4991/2016 vom 29. November 2016 E. 5.2 und 11). Auch kann einem ersuchenden Staat nicht verwehrt werden, mit dem Steuerpflichtigen weiter in Kontakt zu bleiben bzw. diesen zu befragen, auch wenn bereits ein Amtshilfeersuchen gestellt worden ist (vgl. BGE 144 II 206 E. 3.3.1; Urteile des BVGer A-3755/2020 vom 14. Juli 2022 E. 4.2.3, A-3716/2015 vom 16. Februar 2016 E. 5.2.2)."
mandatory: false
requirement_for_analysis: "Nein, nur wenn das Subsidiaritätsprinzip argumentativ vom Beschwerdeführer oder der Vorinstanz verwendet wird bzw. wenn der Beschwerdeführer geltend macht, die ersuchende Behörde hätte die üblichen Mittel nicht ausgeschöpft, um an die ersuchten Informationen zu gelangen"
