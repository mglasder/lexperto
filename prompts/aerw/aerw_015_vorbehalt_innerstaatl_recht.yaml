task: "Allgemeine Ausführungen über den sogenannten 'Vorbehalt des innerstaatlichen Rechts' (d.h. es können nur jene Informationen an die ersuchende Behörde erteilt werden, die von den Schweizer Behörden auch unter Schweizer Recht bzw. nach Schweizer Verwaltungspraxis beschafft werden könnten)"
examples:
  - "Art. 28 Abs. 3 DBA CH-FR sieht vor, dass ein Vertragsstaat nicht verpflichtet ist, «a) Verwaltungsmassnahmen durchzuführen, die von den Gesetzen und der Verwaltungspraxis dieses oder des anderen Vertragsstaats abweichen; b) Informationen zu erteilen, die nach den Gesetzen oder im üblichen Verwaltungsverfahren dieses oder des anderen Vertragsstaats nicht beschafft werden können [...]».    Der in Art. 28 Abs. 3 Bst. a und b DBA CH-FR formulierte Vorbehalt des innerstaatlichen Rechts bezieht sich, soweit es um die Beschaffung von Informationen in Bezug auf direkte Steuern bei einer in der Schweiz steuerpflichtigen Person geht, auf die Art. 123-129 des Bundesgesetzes vom 14. Dezember 1990 über die direkte Bundessteuer (DBG, SR 642.11; BGE 142 II 69 E. 4; Xavier Oberson, in: Danon/Gutmann/Oberson/Pistone [Hrsg.], Modèle de Convention fiscale OCDE concernant le revenu et la fortune, Commentaire, 2014, Art. 26 Rz. 115 f.; Donatsch/Heimgartner/Meyer/Simonek, Internationale Rechtshilfe, unter Einbezug der Amtshilfe im Steuerrecht, 2. Aufl. 2015, S. 250 f.). Die abweichende Bestimmung von Art. 28 Abs. 5 DBA CH-FR ist im vorliegenden Zusammenhang nicht anwendbar.    Das DBG unterscheidet zwischen einer generellen, dem Steuerpflichtigen obliegenden Mitwirkungspflicht (Art. 126 DBG) und spezifischen, gewissen Dritten obliegenden Mitwirkungspflichten (Art. 127-129 DBG). Verlangt der ersuchende Staat Informationen über eine in der Schweiz steuerpflichtige Person, so treffen diese die Mitwirkungspflichten des Steuerpflichtigen gemäss Art. 124-126 DBG und zwar unabhängig davon, ob sie auch im ersuchenden Staat als steuerpflichtige Person gilt (vgl. BGE 142 II 69 E. 5.1.2 f. und 5.3). Die Mitwirkungspflicht erstreckt sich allerdings nicht auf Auskünfte über Geschäftsbeziehungen, die nicht für die Veranlagung dieser Person von Bedeutung sein könnten, sondern ausschliesslich für die Veranlagung ihrer Geschäftspartner (Urteil des BVGer A-8018/2016 vom 8. November 2017 E. 2.4.2; Daniel Holenstein, in: Zweifel/Beusch/Matteotti [Hrsg.], Kommentar zum Schweizerischen Steuerrecht, Internationales Steuerrecht [nachfolgend: Kommentar Internationales Steuerrecht], Art. 26 Rz. 285 und 290).    Die steuerpflichtige Person hat im Verfahren der internationalen Amtshilfe in Steuersachen der Steuerverwaltung gemäss Art. 126 DBG auch Informationen zur Veranlagung einer Drittperson zu übermitteln, sofern diese Informationen ihre eigene Veranlagung beeinflussen können. Dies kann beispielsweise bei verdeckten Gewinnausschüttungen oder einem Durchgriff der Fall sein (BGE 142 II 69 E. 5.1.4 und 5.3; Urteil des BGer 2C_954/2015 vom 13. Februar 2017 E. 7.4; Urteil des BVGer A-5936/2017 vom 19. Juli 2018 E. 2.6.2)."
mandatory: false
requirement_for_analysis: "Nein, nur wenn geltend gemacht wird, die ersuchten Informationen könnten nach Schweizer Recht gar nicht beschafft werden bzw. es bestünde keine Informationspflicht oder Mitwirkungspflicht betreffend die ersuchten Informationen"
