task: "Erstelle den dritten Absatz des Urteils betreffend Amtshilfe in Steuersachen. In diesem Absatz wird festgehalten, um welche Informationen die ersuchende Behörde die ESTV ersucht. Diese Informationen werden im Amtshilfeersuchen in der Regel genau spezifiziert und im dritten Absatz des Urteils wortwörtlich (d.h. in der entsprechenden Sprache gemäss Amtshilfeersuchen) wiedergegeben."
example: "Halte dich bei den Formulierungen möglichst nahe an folgendem Beispiel:\n”Das CLO hat die ESTV für den Zeitraum vom 1. Juli 2020 bis 30. Juni 2022 um nachstehende Informationen über die schweizerische Gesellschaft ersucht: ...”"

