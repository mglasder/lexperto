task: "Erstelle den vierten Absatz des Urteils betreffend Amtshilfe in Steuersachen. In diesem Absatz wird festgehalten, inwiefern die ersuchende Behörde im Amtshilfeersuchen erklärt hat, dass bestimmte Voraussetzungen (gemäss dem entsprechenden DBA bzw. gemäss StAhiG) betreffend das Amtshilfeersuchen erfüllt sind. Diese Erklärung der ersuchenden Behörde ist in der Regel dem Amtshilfeersuchen selbst zu entnehmen und wird von der ESTV in der Schlussverfügung gegebenenfalls wiedergegeben. Typischerweise geht es um folgende Punkte: das Ersuchen entspricht dem innerstaatlichen Recht und der Verwaltungspraxis der ersuchenden Behörde; die ersuchten Informationen könnten unter vergleichbaren Umständen nach dem Recht der ersuchenden Behörde und im üblichen Rahmen ihrer Verwaltungspraxis eingeholt werden; alle auf dem Staatsgebiet der ersuchenden Behörde zur Verfügung stehenden Mittel wurden ausgeschöpft, mit Ausnahme solcher, die mit unverhältnismässigem Aufwand verbunden gewesen wären; sämtliche durch das Ersuchen erhaltenen Auskünfte werden vertraulich behandelt und nur für solche Zwecke verwendet, die im zugrundeliegenden Abkommen genehmigt wurden.\n\nIm vierten Absatz des Urteils wird die Erklärung der ersuchenden Behörde nicht wortwörtlich wiedergegeben."
example: "Halte dich bei den Formulierungen möglichst nahe an folgendem Beispiel:\n«Die ersuchende Behörde erklärte, dass das Ersuchen ihrem innerstaatlichen Recht, ihrer Verwaltungspraxis und dem zugrundeliegenden Abkommen entspreche; dass die Informationen unter vergleichbaren Umständen nach ihrem Recht und im üblichen Rahmen ihrer Verwaltungspraxis eingeholt werden könnten; dass alle auf dem eigenen Staatsgebiet zur Verfügung stehenden Mittel ausgeschöpft worden seien, mit Ausnahme solcher, die mit unverhältnismässigem Aufwand verbunden gewesen wären; dass sämtliche durch das vorliegende Ersuchen erhaltenen Auskünfte vertraulich behandelt und nur für solche Zwecke verwendet werden würden, die im zugrundeliegenden Abkommen genehmigt worden seien.»"
